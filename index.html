<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f766e">
<!-- PWA -->
<link rel="manifest" href="./manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="환경의학">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
<!-- 검색엔진 노출 차단 -->
<meta name="robots" content="noindex, nofollow">
<title>환경의학 기출문제</title>
<style>
  :root{
    --bg:#f1f5f9; --card:#ffffff; --ink:#1e293b; --sub:#64748b;
    --brand:#0f766e; --brand-d:#0d5f58; --line:#e2e8f0;
    --ok:#16a34a; --okbg:#dcfce7; --no:#dc2626; --nobg:#fee2e2;
    --pick:#0ea5e9; --pickbg:#e0f2fe; --warn:#d97706; --warnbg:#fef3c7;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    font-size:16px; line-height:1.5; -webkit-text-size-adjust:100%;}
  #app{max-width:640px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column;}
  header{position:sticky; top:0; z-index:10; background:var(--brand); color:#fff;
    padding:10px 14px; display:flex; align-items:center; gap:10px; box-shadow:0 2px 8px rgba(0,0,0,.12);}
  header h1{font-size:16px; margin:0; font-weight:700; flex:1;}
  header .hbtn{background:rgba(255,255,255,.18); border:none; color:#fff; font-size:13px;
    padding:6px 10px; border-radius:8px; font-weight:600;}
  .bar{height:4px; background:rgba(255,255,255,.25); border-radius:2px; overflow:hidden; margin-top:2px;}
  .bar>i{display:block; height:100%; background:#fff; width:0%; transition:width .25s;}
  main{flex:1; padding:14px; padding-bottom:90px;}
  .card{background:var(--card); border-radius:16px; padding:18px; box-shadow:0 1px 4px rgba(0,0,0,.06);}
  /* Home / filter screen */
  .h-title{font-size:22px; font-weight:800; margin:6px 2px 2px;}
  .h-sub{color:var(--sub); font-size:13px; margin:0 2px 16px;}
  .sec-lbl{font-size:12px; font-weight:700; color:var(--sub); text-transform:uppercase; letter-spacing:.03em; margin:18px 4px 8px;}
  .chips{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{background:var(--card); border:1.5px solid var(--line); border-radius:999px;
    padding:8px 14px; font-size:14px; font-weight:600; color:var(--ink); cursor:pointer;}
  .chip.on{background:var(--brand); border-color:var(--brand); color:#fff;}
  .chip small{opacity:.7; font-weight:500; margin-left:3px;}
  .modes{display:flex; gap:8px; margin-top:6px;}
  .mode{flex:1; text-align:center; border:1.5px solid var(--line); border-radius:12px; padding:10px 6px; font-size:13px; font-weight:600; cursor:pointer; background:var(--card);}
  .mode.on{border-color:var(--brand); background:#f0fdfa; color:var(--brand-d);}
  .start{margin-top:22px; width:100%; background:var(--brand); color:#fff; border:none;
    padding:16px; border-radius:14px; font-size:17px; font-weight:800; cursor:pointer; box-shadow:0 4px 12px rgba(15,118,110,.3);}
  .start:active{transform:translateY(1px);}
  .stat-row{display:flex; gap:8px; margin-top:14px;}
  .stat{flex:1; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px; text-align:center;}
  .stat b{display:block; font-size:20px; color:var(--brand-d);}
  .stat span{font-size:11px; color:var(--sub);}
  .resume{margin-top:12px; background:var(--warnbg); border:1px solid #fde68a; color:#92400e;
    border-radius:12px; padding:12px 14px; font-size:14px; display:flex; align-items:center; gap:10px;}
  .resume button{margin-left:auto; background:var(--warn); color:#fff; border:none; padding:8px 12px; border-radius:8px; font-weight:700; font-size:13px;}
  /* Quiz screen */
  .qmeta{display:flex; justify-content:space-between; align-items:center; font-size:12px; color:var(--sub); margin-bottom:10px;}
  .qtag{background:#f0fdfa; color:var(--brand-d); border-radius:6px; padding:3px 8px; font-weight:700; font-size:11px;}
  .qnum{font-weight:700;}
  .qtext{font-size:17px; font-weight:600; line-height:1.55; margin:4px 0 16px; word-break:keep-all;}
  .opts{display:flex; flex-direction:column; gap:10px;}
  .opt{display:flex; gap:11px; align-items:flex-start; border:1.5px solid var(--line); border-radius:12px;
    padding:13px 14px; font-size:15.5px; cursor:pointer; background:var(--card); transition:.12s; word-break:keep-all;}
  .opt .n{flex:none; width:24px; height:24px; border-radius:50%; background:#f1f5f9; color:var(--sub);
    font-weight:700; font-size:13px; display:flex; align-items:center; justify-content:center; margin-top:1px;}
  .opt.pick{border-color:var(--pick); background:var(--pickbg);}
  .opt.pick .n{background:var(--pick); color:#fff;}
  .opt.correct{border-color:var(--ok); background:var(--okbg);}
  .opt.correct .n{background:var(--ok); color:#fff;}
  .opt.wrong{border-color:var(--no); background:var(--nobg);}
  .opt.wrong .n{background:var(--no); color:#fff;}
  .fb{margin-top:14px; padding:12px 14px; border-radius:12px; font-size:14px; font-weight:600; display:none;}
  .fb.show{display:block;}
  .fb.ok{background:var(--okbg); color:#166534;}
  .fb.no{background:var(--nobg); color:#991b1b;}
  .fb .warn{display:block; margin-top:6px; font-weight:500; color:var(--warn); font-size:12.5px;}
  .expl{margin-top:12px; padding:13px 15px; border-radius:12px; background:#f8fafc; border:1px solid var(--line);
    font-size:14px; line-height:1.62; color:#334155; font-weight:500; word-break:keep-all;}
  .expl .lbl{display:inline-block; font-size:11px; font-weight:800; letter-spacing:.02em; color:var(--brand-d);
    background:#ccfbf1; border-radius:6px; padding:2px 8px; margin-right:7px; vertical-align:1px;}
  .expl .basis{display:inline-block; font-size:10.5px; font-weight:700; border-radius:5px; padding:1px 6px; margin-left:6px;}
  .expl .basis.lecture{background:#dbeafe; color:#1e40af;}
  .expl .basis.general{background:#f1f5f9; color:#64748b;}
  .expl .basis.transcript{background:#fef3c7; color:#92400e;}
  .fixbadge{display:block; margin-top:7px; font-weight:700; color:#b45309; font-size:12.5px;}
  .reveal{width:100%; margin-top:14px; background:#f0fdfa; color:var(--brand-d); border:1.5px solid var(--brand);
    border-radius:12px; padding:13px; font-size:15px; font-weight:700; cursor:pointer;}
  .reveal:active{background:#ccfbf1;}
  .navrow{position:fixed; bottom:0; left:0; right:0; max-width:640px; margin:0 auto;
    background:var(--card); border-top:1px solid var(--line); padding:10px 14px;
    display:flex; gap:10px; align-items:center; padding-bottom:calc(10px + env(safe-area-inset-bottom));}
  .navrow .ico{background:#f1f5f9; border:none; border-radius:10px; width:46px; height:46px; font-size:20px; cursor:pointer;}
  .navrow .ico.on{background:var(--warnbg); color:var(--warn);}
  .navrow .next{flex:1; background:var(--brand); color:#fff; border:none; height:46px; border-radius:12px; font-size:16px; font-weight:800; cursor:pointer;}
  .navrow .next.dim{background:#cbd5e1;}
  /* Result screen */
  .empty{text-align:center; color:var(--sub); padding:40px 20px; font-size:14px;}
  .toast{position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#1e293b; color:#fff;
    padding:10px 18px; border-radius:999px; font-size:13px; z-index:99; opacity:0; transition:.2s; pointer-events:none;}
  .toast.show{opacity:.95;}
  .disclaimer{font-size:11px; color:var(--sub); margin-top:20px; text-align:center; line-height:1.6;}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1 id="hTitle">환경의학 기출</h1>
    <button class="hbtn" id="homeBtn" style="display:none">홈</button>
  </header>
  <main id="main"></main>
</div>
<div class="toast" id="toast"></div>

/*__DATA__*/
const DATA = [{"id":0,"year":"2017","num":1,"q":"사고의 원인을 사람, 기계, 매체, 관리 등 4가지 요인으로 설명하여 잘 드러나지 않는 작업장의 사고 요인을 밝혀내는데 유용한 이론은?","c":["도미노 이론","다수요인이론","인간요인이론","하인리히이론","신도미노이론"],"a":2,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록(4M-다수요인이론): 산업재해 기본원인을 인적(Man)·설비(Machine)·작업/매체(Media)·관리(Management)의 4가지 요인으로 설명하는 이론이 다수요인이론이다. 도미노/하인리히 이론은 사고의 연쇄단계를 설명하는 이론으로 다르다.","basis":"lecture"},{"id":1,"year":"2017","num":2,"q":"산업재해와 직업병 예방에서 가장 중요한 것은?","c":["환경시설 개선","건강 진단","보건 교육","재해 질병 통계","산재 보상"],"a":1,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록 직업병 발생과정-예방대책 모형: 유해물질 발생 단계에서의 환경관리(대치·격리·환기 등 작업장 환경개선)가 근로자 건강장해를 방지하는 근본적 대책이다. 건강진단·보건교육·통계·보상은 발생 이후의 2차적 대책이다.","basis":"lecture"},{"id":2,"year":"2017","num":3,"q":"사고의 원인을 사람, 기계, 매체, 관리 등 4가지 요인으로 설명하여 잘 나타나지 않는 작업장의 사고 요인을 밝혀내는 데 유용한 이론은?","c":["도미노이론","다수요인이론","인간요인이론","하인리히이론","신도미노이론"],"a":2,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록(4M-다수요인이론): 사람·기계·매체·관리 4요인으로 잠재된 사고요인을 밝히는 이론은 다수요인이론이다(id 0과 동일).","basis":"lecture"},{"id":3,"year":"2017","num":4,"q":"스테인리스강 용접 공장에서 20년간 근무한 45세 근로자에 대한 특수건강진단에서 코중격 천공이 발견되었다. 이 남자에게 직업상 암예방을 위해 앞으로 감시해야하는 장기는 무엇인가?","c":["뇌","폐","간","방광","갑상선"],"a":2,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"스테인리스강 용접은 크롬·니켈에 노출되며, 코중격 천공은 6가 크롬 노출의 대표 소견이다. 크롬은 폐암을 유발하므로 감시 장기는 폐(2번)이다. 강의록에 직접 서술은 없으나 크롬/니켈 노출은 BEI 표에 언급됨.","basis":"general"},{"id":4,"year":"2017","num":5,"q":"잠수병은 잠수 시 조직에 과포화되었던 불활성 기체가 급부상하면서 배출되지 못하고, 기포를 형성해 발생하는 것으로 생각된다. 그 치료법 가운데 기포 제거에 가장 효과가 있을 것이라고 생각되는 것은?","c":["산소흡입","수액 정맥 주사","스테로이드 투여","급격 감압","재가압"],"a":5,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"pdf","expl":"강의록: 감압병(잠수병) 치료는 '재가압산소요법'으로, 재가압(5번)은 보일의 법칙에 따라 기포 크기를 줄이고 헨리의 법칙에 따라 기체 재용해를 유도해 기포 제거에 가장 효과적이다. 산소흡입은 보조적이고 급격감압은 오히려 기포를 악화시키는 함정.","basis":"lecture"},{"id":5,"year":"2017","num":6,"q":"여름철에 건설 야외 현장에서 맑은 날 8시간 이상 육체 노동을 하던 근로자가 두통과 구역, 어지러움을 호소하다가 쓰러졌다. 고막온도가 38도이고 맥박수가 증가하였으며, 혈당이 감소하였다.","c":["열실신","열탈진","열사병","열경련","열스트레스"],"a":2,"prof":"박신구","theme":"기후·온열","unc":0,"src":"pdf","expl":"체온 상승이 경미(38도, 고체온 아님)하고 땀·빈맥·저혈당을 동반하며 순환 부담으로 쓰러진 것은 전형적 열탈진(heat exhaustion). 열사병은 40도 이상 고체온과 중추신경 이상(의식저하)을 보여 감별된다. 강의록에 세부 임상기준은 없어 표준지식으로 판단.","basis":"general"},{"id":6,"year":"2017","num":7,"q":"직업성 암의 특성에 관한 내용 중 옳은 것은?","c":["비직업성 암종보다 고연령층에서 발생하는 경향이 있다.","유발 잠복기간은 다양하지만 대부분의 경우 10년 미만이다.","혈액암이 직업성 암 중 가장 흔한 암종이다.","일반주민들의 같은 부위에 생기는 암과 사망률은 유사하다.","발암물질 노출력을 조사하는 것이 무엇보다 중요하다."],"a":5,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"pdf","expl":"직업성 암은 발암물질 노출력 조사가 진단에 가장 중요하다(정답 5). 오답: 비직업성보다 오히려 젊은 연령에서 발생 경향, 잠복기는 대부분 10년 이상, 가장 흔한 직업성 암은 폐암(혈액암 아님), 사망률은 일반인 암과 달리 노출 지속 시 더 높다.","basis":"general"},{"id":7,"year":"2017","num":8,"q":"특수건강진단 실시 시기 외에 건강장해를 의심하게 하는 증상을 보이거나 의학적 소견이 있는 근로자에 대하여 사업주가 특수 건강진단 기관에서 실시하는 건강진단은?","c":["일반건강진단","특수건강진단","배치전 건강진단","수시건강진단","임시건강진단"],"a":4,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록: 수시건강진단은 특수건강진단 대상업무로 인해 직업성 천식·피부염 등 건강장해를 의심하게 하는 증상이나 의학적 소견이 있는 근로자에게 사업주가 실시하는 진단이다. 지방노동관서장 명령에 따르는 임시건강진단과 구분된다.","basis":"lecture"},{"id":8,"year":"2017","num":9,"q":"체온조절의 생리적 기전으로 적절한 것은?","c":["저체온, 갑상선 호르몬 분비 증가","저체온, 호흡촉진","저체온, 몸의 떨림 감소","고체온, 근육긴장","고체온, 피부혈관 수축"],"a":1,"prof":"박신구","theme":"기후·온열","unc":0,"src":"ai","expl":"추울 때(저체온 위험) 몸은 열 생산을 늘리려 갑상선호르몬(대사↑)과 떨림을 증가시키므로 '저체온-갑상선호르몬 분비 증가'가 옳다. 나머지는 방향이 반대(호흡촉진·떨림감소·근육긴장은 부적절, 고체온시 피부혈관은 확장). 강의록에 직접 근거는 없어 표준생리로 설명.","basis":"general"},{"id":9,"year":"2017","num":10,"q":"산업재해보상보험법에 관한 설명 중 옳은 것은?","c":["사업장에 임의 근무자 2명 이상이면 가입하여야 한다.","사업주가 보험료를 전적으로 부담한다.","과실책임주의 원칙을 따른다.","산업재해보상보험은 가입이 자유롭다.","휴양급여는 80%를 지급한다."],"a":2,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"ai","expl":"산재보험은 사업주가 보험료를 전적으로 부담한다(2번). 강의록상 산재보험은 무과실책임주의(과실책임주의 아님)이며 강제보험이고 휴업급여는 70%이므로 나머지 보기는 모두 틀리다.","basis":"lecture"},{"id":10,"year":"2017","num":11,"q":"여름철에 건설 야외현장에서 맑은날 8시간 이상 육체노동을 하던 근로자가 두통과 구역, 어지럼증을 호소하다가 쓰러졌다. 고막온도가 38도이고, 맥박수가 증가하였으며 혈당이 감소하였다. 진단으로 가장 적절한 것은?","c":["열실신","열탈진","열사병","열경련","열스트레스"],"a":2,"prof":"박신구","theme":"기후·온열","unc":0,"src":"pdf","expl":"고온 야외작업 중 두통·구역·어지럼, 고막(심부)온도 38℃(열사병 기준 40℃ 미만), 빈맥, 발한에 의한 저혈당·탈수 → 열탈진(heat exhaustion). 의식장애·40℃ 이상 고체온이 없어 열사병(3)은 아니고, 근경련만 있는 열경련(4)·기립성 실신인 열실신(1)과도 구분된다.","basis":"general"},{"id":12,"year":"2017","num":13,"q":"고온 순화를 따르는 생리적 변화로 옳은 것은?","c":["심박동수가 증가한다","직장의 온도가 증가한다","염분의 배출 농도가 감소한다","땀의 분비 속도가 감소한다","알도스테론이 감소한다"],"a":3,"prof":"박신구","theme":"기후·온열","unc":0,"src":"pdf","expl":"고온순화가 되면 알도스테론 분비가 늘어 땀·소변으로의 염분 배출 농도가 감소한다(염분 보존). 심박수·직장온도는 감소, 땀 분비 속도는 오히려 증가, 알도스테론은 증가하므로 나머지는 오답. 강의록에 세부 근거는 없어 표준지식.","basis":"general"},{"id":13,"year":"2017","num":14,"q":"유해물질 허용 기준에 대해 옳은 것은?","c":["시간 가중 평균치(TLV-TWA)는 하루 6시간 주 30시간 폭로되어도 건강장해없는 평균 농도","단시간 폭로 허용치(TLV-STEL)는 작업 시간 계속해서 60분간 폭로되어도 장해 없는 평균 농도","복합 물질 폭로시 허용농도는 상가 작용만을 인정한다.","TLV 미만에서는 직업병을 인정하는 지표로 쓰인다.","TLV 수준에서는 개인의 감수성이 고려되지 않는다."],"a":5,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"ai","expl":"강의록(ACGIH-TLV): TLV는 소수 근로자에게는 개인 감수성 차이로 이하 농도에서도 영향이 있을 수 있어 개인 감수성이 고려되지 않는다(5번)는 설명이 맞다. TWA는 8시간/주40시간 기준, STEL은 15분 기준이므로 1·2번 오답, 복합노출은 상가작용 외에도 상승·독립 등 인정하므로 3번, TLV미만은 직업병 인정지표가 아니므로 4번 오답.","basis":"lecture"},{"id":14,"year":"2017","num":15,"q":"감압병의 가장 흔한 증상은?","c":["현기증","호흡곤란","근골격계 통증","사지마비","고혈압"],"a":3,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"감압병(잠함병)의 가장 흔한 증상은 관절·근육 주위에 질소 기포가 형성되어 생기는 근골격계 통증(bends)이다. 강의록 슬라이드에는 잠수·고압 환경에서 질소 마취·감압병이 발생한다는 언급만 있어 세부 증상은 표준지식으로 판단하며, 정답 3번이 맞다.","basis":"general"},{"id":15,"year":"2017","num":16,"q":"잠수병은 잠수 시 조직에 과포화되었던 불활성 기체가 급부상하면서 배출되지 못하고, 기포를 형성해 발생하는 것으로 생각된다. 그 치료법 가운데 기포 제거에 가장 효과가 있을 것으로 생각되는 것은?","c":["산소 흡입","수액 정맥 주사","스테로이드 투여","급격 감","재가압"],"a":5,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"pdf","expl":"강의록: 감압병 치료는 재가압산소요법. 재가압(5번)이 압력효과로 기포를 축소·재용해시켜 기포 제거에 가장 효과적이다. 급격감압은 오답 함정.","basis":"lecture"},{"id":16,"year":"2017","num":17,"q":"시차 적응 증후군에 대한 설명으로 옳은 것은?","c":["시차적응을 위해 음식을 많이 먹는다","날짜변경선과 관련이 있다","한국에서 미국으로 갈 때보다 미국에서 한국으로 올 때 더 심하다","빠르게 여러 시간대를 여행할 때 발생한다","영국에서 남아공으로 여행할 때 발생한다"],"a":4,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"pdf","expl":"강의록: 시차증후군은 '시간대를 빠르게 넘나드는 여행'을 할 때 생기며(4번), 날짜변경선과는 무관하고 북⟷남 방향(영국⟷남아공)에서는 잘 생기지 않는다. 따라서 2·5번은 오답이고, 동쪽(한국→미국)이 더 힘들어 3번도 반대로 서술되어 오답.","basis":"lecture"},{"id":17,"year":"2017","num":18,"q":"사막지역 한낮에 밖에서 일하다가 두통, 현기증을 호소하다 졸리다더니 갑자기 섬망과 의식소실을 하였다. 피부엔 땀이 없고 건조하였고 몸이 몹시 뜨거웠다. 가장 먼저 해야할 처치는?","c":["그늘로 데려가 휴식한다.","정맥 주사로 수액공급.","급속히 냉탕에 넣어 몸을 식힌다","옷 벗기고 호흡 유지시킨다.","생리식염수를 먹인다."],"a":3,"prof":"박신구","theme":"기후·온열","unc":0,"src":"pdf","expl":"무한증(땀 없음)·건조·고체온·섬망/의식소실은 열사병으로, 최우선 처치는 급속 냉각(냉탕 등 적극적 냉각)으로 체온을 빨리 낮추는 것이다. 강의록에 세부 기준은 없어 표준 응급처치 원칙으로 판단.","basis":"general"},{"id":18,"year":"2017","num":19,"q":"업무에서 요구하는 것과 고용자 능력간의 차이가 주된 원인이 되어 생기는 유해한 정신적, 신체적 반응으로 유발되거나 혹은 악화될 수 있는 질환은?","c":["신경계 질환","갑상샘 질환","콩팥 질환","심혈관계 질환","호흡기 질환"],"a":4,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록 직무스트레스: 장시간 노동·교대작업 등 직무스트레스로 유발·악화되는 대표 질환은 작업관련성 순환기(심혈관계) 질환이다(4번). 강의록에 시상하부-뇌하수체-카테콜라민 반응이 심혈관계 장해를 일으킨다고 기술.","basis":"lecture"},{"id":19,"year":"2017","num":20,"q":"5,000 m 고도에서 일어나는 생리변화 중 생존을 위협하는 가장 중요한 요소는 무엇인가?","c":["낮은 온도","낮은 압력","낮은 습도","낮은 산소분압","자외선 노출"],"a":4,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"pdf","expl":"강의록: 고도 상승 시 생존을 위협하는 가장 중요한 요소는 산소분압 저하로, 5,100~5,500m는 산소분압 감소로 인한 생존 한계 고도이다. 따라서 낮은 산소분압(4번)이 정답.","basis":"lecture"},{"id":20,"year":"2017","num":21,"q":"직업성 피부 질환 중 가장 흔한 것은?","c":["접촉성 피부염","접촉성 두드러기","건선","직업성 여드름","백반증"],"a":1,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"pdf","expl":"직업성 피부질환 중 가장 흔한 것은 접촉성 피부염이며, 그중 자극성 접촉피부염이 대부분을 차지한다(정답 1).","basis":"general"},{"id":21,"year":"2017","num":22,"q":"호흡 정지 잠수, 수심 10m에 체류 후 수면으로 상승하였다. 발생할 가능성이 가장 높은 건강장애는?","c":["폐압착증","저산소증","동맥혈 기체 색전증","탄산 가스 과다증","폐 과팽창증후군"],"a":5,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"pdf","expl":"강의록: 호흡정지잠수 후 상승 시 폐 속 기체가 팽창해 폐포가 파열되는 폐과팽창증후군(5번)이 발생. 폐압착증은 하강(잠수) 시 발생하므로 오답 함정. 10m 체류 후 상승이라는 조건상 상승 시 손상인 폐과팽창증후군이 정답.","basis":"lecture"},{"id":22,"year":"2017","num":23,"q":"직업성 암 발생 중 흡연과의 상승작용이 가장 큰 것은?","c":["우라늄과의 폐암","석면과의 중피종","석면과의 폐암","비소와의 폐암","크롬과의 폐암"],"a":3,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록 비소 발암성 표에 '폐암 — 흡연과 강한 상승작용'이 명시되어 있고 크롬은 단독 폐암(1군)으로 기술된다. 다만 직업성 발암 중 흡연과의 상승작용(승법작용)이 가장 큰 고전적 예는 석면-폐암으로, 석면 노출자에서 흡연 시 폐암 위험이 곱셈적으로 증가한다. 석면-중피종은 흡연과 무관하므로 오답.","basis":"general"},{"id":23,"year":"2017","num":24,"q":"기관지 천식을 초래하는 물질은?","c":["암모니아","이산화황","오존","이소시아네이트","포름알데하이드"],"a":4,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"이소시아네이트는 대표적인 직업성 기관지 천식 유발 물질(감작제)이다. 암모니아·이산화황·오존·포름알데하이드는 자극성 물질로 기도 자극은 일으키나 천식 원인물질로는 이소시아네이트가 정답. 강의록에 직접 명시는 약해 표준지식으로 보완.","basis":"general"},{"id":24,"year":"2017","num":25,"q":"석유화학 정유단지에서 근무하는 근로자가 피로 권태감 어지러움을 주증상으로 내원했다. 혈액검사결과 빈혈소견과 백혈구 감소를 보였다. 직업력상 벤젠에 대한 폭로가 의심되었다. 확진을 위한 추가 검사로 적절한 것은?","c":["신경학적 검사","요중 마뇨산 검사","요중 메틸마뇨산 검사","요중 뮤콘산 검사","골수 검사"],"a":4,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"벤젠 노출의 생물학적 노출지표는 요중 뮤콘산(t,t-muconic acid)이며 SPMA와 함께 확진에 쓰인다. 빈혈·백혈구감소(골수억제)는 벤젠 특징이나 확진 검사로는 노출지표인 요중 뮤콘산이 정답. 마뇨산(톨루엔)·메틸마뇨산(크실렌)은 오답. 골수검사는 혈액질환 자체 평가로 노출 확인용은 아님.","basis":"general"},{"id":25,"year":"2017","num":26,"q":"전자제품을 세척하는 일을 하는 27세 남자가 입사 3개월 만에 목에 덩이가 만져져 병원에서 생검을 하였다. 진단 결과 비호지킨 림프종이 나와 산재 신청을 했다. 업무상재해 판정위원회는 직무와 연관성이 적다는 판단을 내렸다. 이유는?","c":["질병의 종류","환자의 나이","환자의 성별","유해물질의 종류","발병까지의 시간"],"a":5,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록 업무기인성 3요소: 유해요인 노출과 질병 발생 간 인과관계가 추정되어야 하는데, 입사 3개월은 발암(림프종)의 잠복기로는 너무 짧아 발병까지의 시간(5번)을 근거로 연관성이 적다고 판정한다.","basis":"lecture"},{"id":26,"year":"2017","num":27,"q":"인천염료제공장, 벤지딘 다루는 사람. 생길 수 있는 암은?","c":["방광암","폐암","피부암","혈액암"],"a":1,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"pdf","expl":"벤지딘(benzidine)은 방향족 아민계 발암물질로 요로상피(방광)암을 일으키는 대표 물질이다. 염료·색소 공장 근로자에서 방광암 발생(정답 1).","basis":"general"},{"id":27,"year":"2017","num":28,"q":"발암물질에 일정기간 노출된 근로자에 대해 퇴직 후에도 매년 검진으로 직업성 조기발견하기 위해 실시하는 건강검진은?","c":["특수건강검진","수시건강검진","건강관리수첩검진","채용시건강검진"],"a":3,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"pdf","expl":"강의록: '건강관리수첩 소지자 건강진단은 장기간의 잠복기를 거쳐 발병하는 직업성 암 등 직업병을 조기에 발견·조치토록 하기 위한 제도'로, 퇴직 후에도 적용된다(정답 3). 특수건강검진은 재직 중 노출 근로자 대상이므로 함정.","basis":"lecture"},{"id":30,"year":"2017","num":31,"q":"다음 중 소음성 난청에 대해 옳은 설명은?","c":["편측성이다.","저주파에서 시작된다.","소음을 중단하면 더이상 진행되지 않는다.","중이의 염증과 고막의 비후가 원인이다.","골도 청력의 감소에, 기도 청력의 감소 동반되지 않는다."],"a":3,"prof":"김양우","theme":"소음·진동","unc":0,"src":"pdf","expl":"강의록(PAGE 27, 36, 37): 소음성 난청은 양측성이고 초기 3-6kHz(4kHz notch)의 고주파에서 시작되며 SNHL이라 골도·기도 모두 저하하고 ABG는 없다. 노출을 중단하면 NIHL 자체의 진행은 멈추므로(잔여 악화는 ARHL 합산) 보기3이 옳다. 중이염·고막비후는 전음성 난청 원인이라 틀림.","basis":"lecture"},{"id":31,"year":"2017","num":32,"q":"작업성 질환에서 청력 손실에 영향을 미치는 것은?","c":["습도","보호구 착용 여부","야간 근무","스트레스"],"a":2,"prof":"김양우","theme":"소음·진동","unc":0,"src":"pdf","expl":"강의록(PAGE 43, 48): HCP 실패의 가장 큰 원인은 HPD(귀마개·귀덮개) 미착용/오착용이므로 보호구 착용 여부가 청력 손실에 가장 큰 영향을 준다. 습도·야간근무·스트레스는 소음성 난청의 직접 결정인자가 아님.","basis":"lecture"},{"id":33,"year":"2017","num":34,"q":"자일렌 (크실렌) 검사로 맞는 것은?","c":["소변 메틸 마뇨산","소변 마뇨산","소변 만델릭산","TTCA","소변 페놀"],"a":1,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"자일렌(크실렌)의 요중 대사산물 지표는 메틸마뇨산(methylhippuric acid)이다. 마뇨산은 톨루엔, 만델산은 스티렌, TTCA는 이황화탄소 지표이므로 오답.","basis":"general"},{"id":34,"year":"2017","num":35,"q":"건설현장에서 6년째 암반굴삭기 작업을 하고 있는 근로자가 손가락의 색조변화와 간헐적인 통증, 손목의 통증을 주소로 내원하였다.검진의사는 이 환자를 국소진동으로 인한 장해로 진단내렸다. 다음 중 이 환자에 대한 설명으로 옳지 않은 것은?","c":["작업차량의 전신진동에 의해 유발된다.","온수에 손을 담그면 통증이 유발된다.","치료로 금연을 권해도 별 이득이 없다.","가관절염이나 관절연골의 변화 등은 이 증후군을 배제하는 데 필수적이다.","자율신경계의 강화, 전신 보온이 도움이 된다."],"a":2,"prof":"김양우","theme":"소음·진동","unc":1,"src":"pdf","expl":"강의록(PAGE 81, 85): HAVS는 한랭에서 유발(백색화)되고 온수는 오히려 증상을 완화하므로 '온수에 담그면 통증 유발'(보기2)은 옳지 않아 정답으로 타당하다. 다만 보기1 '전신진동(WBV)에 의해 유발'도 국소진동증후군 설명으로는 틀린 진술이라 오답이 둘인 문항 결함이 있다.","basis":"lecture"},{"id":35,"year":"2017","num":36,"q":"새로 지은 건물에서 점막 자극 증상, 두통, 현기증을 느낄 수 있다. 이를 저감시키기 위한 방법으로 맞는 것은?","c":["창문을 자주 열고 환기하는 것은 도움이 안 된다.","친환경 제재를 이용하는 것만으로도 충분하다.","공기 정화 식물은 일부 도움이 된다.","온도를 올리고 환기시키는 베이크 아웃은 효과가 없다.","어린이보다 노인에 영향이 더 크다."],"a":3,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"새건물증후군(새집증후군) 저감법으로 공기정화 식물은 일부 도움이 된다(3번)가 맞다. 창문 환기·친환경 자재·베이크아웃 모두 도움이 되고, 취약군은 노인뿐 아니라 어린이도 포함되므로 나머지 보기는 틀리다. 강의록에 실내공기 슬라이드는 없어 표준지식으로 판단.","basis":"general"},{"id":36,"year":"2017","num":37,"q":"진폐증을 진단하는데 가장 중요한 검사는?","c":["가족력","탄분진","유해가스노출","Chest X-ray","Urine test"],"a":4,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"진폐증 진단에서 가장 중요한 검사는 흉부 X-ray(4번)로, 진폐는 방사선 소견으로 병형을 판정한다. 강의록에 진폐 슬라이드는 없으나 표준지식·진폐 판정 기준상 명확하며 정답이 맞다.","basis":"general"},{"id":37,"year":"2017","num":38,"q":"수은에 대한 것으로 옳은 것은?","c":["만성중독의 경우 수은에 대한 노출을 중단하는 것이 주된 치료법이다.","알킬수은의 경우 호흡기로 주로 흡수되나 소화기나 피부로는 흡수되지 않는다.","납과는 달리 신경증상이 나타나지 않는다.","수은을 다루는 일을 하기전에 정신 검사와 필적검사를 하는 것이 도움이 된다.","혈뇌장벽을 통과하지 못한다."],"a":1,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록: 수은 중독의 가장 효과적인 치료는 '노출 차단'이며 만성 중독에서 노출 중단이 주된 치료이다(보기1 정답). 알킬(메틸)수은은 호흡기·소화기·피부 모두로 흡수되고(보기2 오답), 태반·BBB를 통과하며(보기5 오답), 원소·유기수은 모두 신경증상을 유발한다(보기3 오답). 필적·정신검사는 실효성 근거가 없다.","basis":"lecture"},{"id":38,"year":"2017","num":41,"q":"다음 유해가스중 작용 기전이 다른 한가지는?","c":["일산화탄소","이산화탄소","아닐린","메틸렌글로라이드","황화수소"],"a":2,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록 유해가스 3대 분류상 CO·아닐린(메트헤모글로빈)·염화(메틸렌)클로라이드(체내 CO 생성)·황화수소는 모두 산소 운반·이용을 차단하는 '독성(화학적) 질식제'이다. 이산화탄소만 산소를 물리적으로 밀어내는 '단순 질식제'라 기전이 다르다.","basis":"lecture"},{"id":39,"year":"2017","num":42,"q":"폐수 집수조의 침전물을 진공흡입으로 제거하는 작업을 하는 근로자가 집 수조를 들여다보다가 의식을 잃고 집수조 안으로 떨어졌따. 이 가스에 대한 설명으로 옳은 것은?","c":["치료제로는 메틸렌블루 사용.","보호장비 없이 들어가서 구조한다.","정유공장 고무공장 정화조 가스와는 다르다.","호흡중추에서 호흡효소의 작용을 억제하여 독성을 나타낸다.","단순 질식가스에 의하 사고이다."],"a":4,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록: 폐수 집수조·정화조의 썩은 냄새 가스는 황화수소(H₂S)로, HCN과 동일하게 미토콘드리아 Cytochrome c oxidase(호흡효소)를 차단해 세포 질식을 일으킨다(보기4 정답). 정유·고무·정화조 가스와 같은 H₂S이며(보기3 오답), 단순질식이 아니고(보기5 오답), 구조 시 보호장비 필수(보기2 오답). 치료제 메틸렌블루는 부적절.","basis":"lecture"},{"id":40,"year":"2017","num":43,"q":"광산 내 석탄분진 속 성분 중 폐섬유화를 동반하는 진폐증, 폐암의 가장 직접적인 원인물질은?","c":["일산화탄소","아닐린","황화수소","메탄올","카드뮴"],"a":5,"prof":"김양우","theme":"유해금속·가스","unc":1,"src":"ai","expl":"보기 구성이 복원 오류로 광산 진폐 원인물질(규소 등)이 없어 문항 자체가 부정확하다. 다만 강의록상 제시된 보기 중 카드뮴만이 만성 흡입 시 폐섬유화·폐기종과 IARC 1군 폐암을 일으키므로 상대적으로 정답에 부합한다(보기5).","basis":"lecture"},{"id":41,"year":"2017","num":44,"q":"광산 내 석탄분진 속 성분 중 폐섬유화를 동반하는 진폐증, 폐암의 가장 직접적인 원인물질은?","c":["베릴륨","결정형 유리규산","석면","카드뮴","라돈"],"a":2,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"석탄분진 중 폐섬유화·진폐·폐암의 직접 원인물질은 결정형 유리규산(crystalline silica, 2번)이다. 석면은 광산 석탄분진의 주 성분이 아니므로 오답. 강의록 직접 근거는 없어 표준지식으로 판단.","basis":"general"},{"id":42,"year":"2017","num":45,"q":"소음성난청에 대한 설명으로 맞은 것은?","c":["약물치료가 효과적이다","대개 양측성으로 나타난다","저주파에서부터 청력소실이 나타난다","원인은 코르티씨 기관의 털세포 파괴와 관계없다","충격음은 문제가 되지 않는다"],"a":2,"prof":"김양우","theme":"소음·진동","unc":0,"src":"pdf","expl":"강의록(PAGE 27, 37, 20): 소음성 난청은 대개 양측성으로 나타난다(보기2). 약물치료 무효, 고주파(4kHz)부터 시작, 코르티기관 털세포 파괴가 핵심 기전, 충격음(acoustic trauma)도 위험하므로 나머지는 모두 틀림.","basis":"lecture"},{"id":43,"year":"2017","num":46,"q":"소음성 난청에 영향을 주는 것 중 가장 가능성 높은 요인은?","c":["직무자율성","귀마개, 귀덮개 등 보호구 착용여부","야간근무","습도","순음청력검사 순응도"],"a":2,"prof":"김양우","theme":"소음·진동","unc":0,"src":"pdf","expl":"강의록(PAGE 43, 48): HCP 실패의 최대 원인은 귀마개·귀덮개 등 보호구 미착용/오착용이므로 보호구 착용 여부(보기2)가 가장 가능성 높은 요인이다. 나머지는 직접 결정인자가 아님.","basis":"lecture"},{"id":44,"year":"2017","num":49,"q":"잇몸출혈, 26세 여자 혈액검사에서 적혈구 감소 백혈구 감소 혈소판 감소. 전자부품 제조공장 5년째 일함. 직업관련성 평가를 위해 시행 할 검사는?","c":["소변 페놀","날숨 에틸벤젠","혈액 자일렌","소변 마뇨산","혈약 톨루엔"],"a":1,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"전자부품 공장에서 범혈구감소(적혈구·백혈구·혈소판 모두 감소, 재생불량성 빈혈)는 벤젠 노출의 전형상이며, 벤젠 노출 확인 지표는 요중 페놀(및 뮤콘산)이다. 나머지 보기(에틸벤젠·자일렌·마뇨산·톨루엔)는 벤젠과 무관.","basis":"general"},{"id":45,"year":"2017","num":50,"q":"도금작업시 제품을 유기용제로 세척하는 작업을 하는 근로자가 수일 전부터 황달기가 있고 피부에 수포성 반점이 발생하였고 점점 심해지는 양상을 보여 외래에 내원하였다. 이와 관련해 맞는 것은?","c":["피부증상은 접촉 피부염일 가능성이 높아 통상 습진에 준해 치료한다.","비교적 예후가 좋기 때문에 외래치료로만으로 충분하다.","직접적 노출과 관련이 있으므로 스티븐존슨증후군을 배제할 수 있다.","해당물질은 심장부정맥을 일으킬 가능성도 없다.","취급하는 물질과 관련성에 대해 직업환경의학과 의뢰가 필요하다."],"a":5,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록: 도금 세척용 유기용제 노출로 황달(간독성)과 진행성 수포성 피부 발진이 있으면 스티븐스-존슨증후군 등 중증 약물·화학물질 반응 및 전신 독성을 배제할 수 없어 입원·전문 평가가 필요하다. 취급 물질과의 관련성을 규명하기 위해 직업환경의학과 의뢰가 옳다(보기5). 단순 접촉피부염·외래치료로 충분하다는 보기는 오답.","basis":"lecture"},{"id":46,"year":"2017","num":51,"q":"인천항에서 수입 농산물을 훈증 소독하던 근로자가 상하지 감각저하, 근력저하를 주소로 내원했다. 가장 가능성 높은 물질은?","c":["벤젠","메틸브로마이드","잔류살충제","곡물분진","아플라톡신"],"a":2,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"강의록(메틸브로마이드 훈증제 섹션): 수입 농산물·구조물 훈증 소독제인 메틸브로마이드는 지연성 폐수종과 함께 심한 중추신경 독성 및 만성 신경학적 후유증(감각·근력 저하)을 유발한다. 훈증 작업력+말초신경 증상 조합으로 정답.","basis":"lecture"},{"id":47,"year":"2017","num":52,"q":"말초혈액검사가 건강장애 진단에 도움이 되는 것은?","c":["벤지딘","유리섬유벤젠","4-아미노비페닐","벤젠","석면"],"a":4,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"말초혈액검사(범혈구감소·재생불량성 빈혈)로 건강장애 진단에 도움이 되는 것은 골수독성 물질인 벤젠이다. 벤지딘·4-아미노비페닐은 방광암, 석면은 폐/흉막질환으로 말초혈액검사와 무관.","basis":"general"},{"id":49,"year":"2017","num":54,"q":"톨루엔, 염화메틸 등 유기용제를 취급하는 근로자가 작업 중 현기증, 심계항진이 자주 발생하였으나, 최근에는 실신하였다. 진단을 위해 우선 고려해야 할 검사는?","c":["폐기능검사","24시간 심전도","산소 포화도","심박동 변이","24시간 혈압측정"],"a":2,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"톨루엔·염화메틸 등 유기용제/흡입제는 심근을 카테콜아민에 민감하게 만들어 치명적 부정맥(심실세동)과 실신을 유발한다(강의록 흡입제 남용의 sudden sniffing death 기전). 발작성 부정맥/실신 규명에는 24시간 심전도(Holter)가 우선.","basis":"lecture"},{"id":51,"year":"2017","num":56,"q":"CNC 선반으로 휴대폰 프레임을 찍는 업무를 하는 25세 여자가 두통과 시력저하로 직업환경의학과를 내원하였다. 작업시 메틸알코올을 사용하였다. 이 메탄올에 대한 설명으로 옳은 것은?","c":["저농도에서는 호흡기, 눈의 증상보다 중추신경이 억제된다.","실수로 마신적이 없으면 상기 증상은 메탄올과 관련이 없다.","실수로 메탄올을 마셨을 경우, 경과관찰을 제외하고는 특별한 치료법이 없다.","시신경염으로 인해 시력장애와 시신경 위축이 오고 결국 실명까지 될 수 있다.","업무 중 메탄올에 대한 대체물이 없으므로 환기를 시키고 보호구를 철저하게 착용한다"],"a":4,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"메탄올은 대사산물 포름산이 시신경을 침범해 시신경염·시신경 위축을 일으켜 실명까지 이를 수 있다(보기4 정답). 저농도에서도 눈 증상 발생 가능하고, 치료로 에탄올/포메피졸·투석이 있으므로 보기2·3·5는 오답.","basis":"general"},{"id":52,"year":"2017","num":57,"q":"6분법을 사용하여 환자의 dB을 구하여라. 500Hz:10dB/ 1000Hz:30dB / 2000Hz: 50dB/ 4000Hz: 70dB/ 5000Hz: 90dB","c":["25dB","30dB","35dB","40dB","45dB"],"a":4,"prof":"김양우","theme":"소음·진동","unc":0,"src":"pdf","expl":"강의록(PAGE 52) 6분법=(a+2b+2c+d)/6, 500/1k/2k/4k Hz. (10+2×30+2×50+70)/6=240/6=40dB이므로 보기4가 정답. 5000Hz(90dB)는 6분법에 포함되지 않는 함정.","basis":"lecture"},{"id":53,"year":"2017","num":58,"q":"진폐증의 합병증으로 볼 수 있는 것은?","c":["천식","과민성 폐장염","비활성형 폐결핵","간질성 폐질환","원발성 폐암"],"a":5,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"진폐법상 인정되는 진폐 합병증은 활동성 폐결핵, 흉막염, 기흉, 기관지염·기관지확장증, 폐기종, 원발성 폐암 등이다. 보기 중 원발성 폐암(5번)이 유일하게 해당하며, 비활성형 폐결핵은 제외된다. 표준지식·진폐법 기준으로 판단.","basis":"general"},{"id":57,"year":"2017","num":62,"q":"국내 석면 사용량을 고려하고, 석면으로부터 중피종 발생까지 잠복기가 30~40년이라 할때 국내 중피종 발생 가장 많을 것으로 예상 시기?","c":["1995 - 2005","2005 - 2015","2015 - 2025","2025 - 2035","2035 - 2045"],"a":4,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"국내 석면 사용은 1990년대 정점이었고 중피종 잠복기 30~40년을 고려하면 발생 정점은 2025~2035년(4번)으로 예상된다. 강의록 근거 없이 역학 추정으로 판단하나 정답이 타당.","basis":"general"},{"id":58,"year":"2017","num":63,"q":"최근 5년간 우리나라 암 발생에 가장 크게 기여한 것은?","c":["흡연","음주","비만","신체활동 부족","감염성 요인"],"a":1,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"ai","expl":"강의록(2주차)에 따르면 산업화 국가에서 질환의 환경오염 기여율은 약 20%로 추정되나, 국내 암 발생 최대 기여 요인을 직접 명시한 자료는 없다. 표준 지식상 우리나라 암 발생 기여도 1위는 흡연으로 정답 1번이 맞다.","basis":"general"},{"id":60,"year":"2017","num":65,"q":"교대근무하는 여성에서 잘 걸리는 암은?","c":["자궁경부암","위암","갑상선암","유방암","대장암"],"a":4,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"pdf","expl":"교대(야간)근무는 IARC 2A 발암요인으로 여성에서 유방암 위험을 증가시킨다(정답 4). 멜라토닌 억제·일주기 리듬 교란 기전.","basis":"general"},{"id":61,"year":"2017","num":66,"q":"50세 남성이 집 안에 단열재를 설치하였다. 그 후 피부염, 비염, 상기도, 눈 자극이 나타났다. 원인물질은 무엇인가?","c":["석면","라돈","포름알데히드","CO","프레온"],"a":3,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"단열재 설치 후 발생한 피부염·비염·상기도·눈 자극의 원인은 포름알데히드(3번)로, 단열재·접착제에서 방출되는 대표적 실내공기 자극물질이다. 강의록에 직접 슬라이드는 없어 표준지식으로 판단하며 정답이 맞다.","basis":"general"},{"id":62,"year":"2017","num":67,"q":"우리나라 대기오염 수치 중 가장 개선된 것은?","c":["이산화질소","오존","미세분진","납","벤젠"],"a":4,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(대기오염 PAGE 38, 43)에서 유연휘발유 금지 정책 이후 납 오염이 크게 개선되었음을 다룬다. 대기오염 연간 추이상 납이 가장 뚜렷이 개선된 항목으로, 정답 4(납)이 타당.","basis":"lecture"},{"id":63,"year":"2017","num":68,"q":"런던형 스모그의 주요 원인 중 하나로 가스상 물질이지만 2차 미세먼지 형성에도 관여하는 물질은?","c":["이산화질소","아황산가스","일산화탄소","오존","납"],"a":2,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록: 아황산가스(SO2)는 런던형(환원형) 스모그의 주원인이며 가스상 물질이지만 2차 미세먼지(황산염) 형성에 관여한다(대기오염 PAGE 37 Particles에 SOx 포함). 정답 2(아황산가스)가 맞음.","basis":"lecture"},{"id":64,"year":"2017","num":69,"q":"대기오염 물질 중, 배출량 및 암 단위도 고려 시. 가장 안 좋은 영향을 주는 것은?","c":["아황산가스","이산화질소","디젤연소분진","벤젠","납"],"a":3,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(대기오염 PAGE 36): 디젤연소분진(DEP)이 주정부 전체 암 위험의 약 70%를 차지하며 IARC 1급 발암물질(PAGE 86)이다. 배출량·암 단위위해도 고려 시 정답 3(디젤연소분진)이 맞음.","basis":"lecture"},{"id":65,"year":"2017","num":70,"q":"중국발 스모그에서 우리나라에 영향을 주는 것은?","c":["아황산가스","오존","이산화질소","초미세먼지","납"],"a":4,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록에서 중국발 스모그·장거리 이동 오염의 핵심은 초미세먼지(PM2.5)이다. 정답 4(초미세먼지)가 맞음. 아황산가스·납 등은 장거리 이동 및 중국발 영향의 주된 물질이 아님.","basis":"lecture"},{"id":66,"year":"2017","num":73,"q":"임산부 산전 검사 혈중 수은 높게 나옴. 다음 중 임산부가 많이 섭취했을 것으로 예상되는 것은?","c":["소고기 및 육류","채소류","생선","곡류","우유"],"a":3,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록: 메틸수은은 어패류(먹이사슬 상위 대형어)에 생물농축되며, 임신부의 혈중 수은 상승은 참치·상어 등 생선 섭취가 주원인이다(보기3 정답). 강의에서도 임신부에게 대형 어류 섭취를 제한하도록 권고한다.","basis":"lecture"},{"id":67,"year":"2017","num":74,"q":"산업폐기물과 가정폐기물로 오염된 호수에서 물고기들이 떼죽음을 당했는데 그 이유는?","c":["폐기물이 호수물 산성화 높임","폐기물이 산성화 낮춤","유기물이 부패하면서 산소농도 낮춤","폐기물에서 나온 박테리아 때문","폐기물에서 나온 독성물질"],"a":3,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"pdf","expl":"강의록(3주차) '산소소모물질의 영향'과 부영양화 설명에 따르면 유기물이 부패·분해되면서 물속 용존산소를 고갈시켜 물고기가 집단 폐사한다. 따라서 정답은 3번(유기물 부패로 산소농도 저하)이며, 산성화나 독성물질은 부차적 함정.","basis":"lecture"},{"id":68,"year":"2017","num":75,"q":"2008년 중국에서 유제품 먹은 영아들에게서 신장결석이 집단적으로 발생하였다. 신부전 사망도 일으켰는데 이 원인은 무엇인가?","c":["비소","멜라민","타르","인식향산나트륨","아플라톡신"],"a":2,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"2008년 중국 유제품(분유) 신장결석 집단 발생의 원인물질은 멜라민이다(보기2). 단백질 함량을 부풀리려 첨가한 멜라민이 영아 신장결석·신부전을 유발했다. 강의록 직접 언급은 없으나 널리 알려진 사건.","basis":"general"},{"id":69,"year":"2017","num":76,"q":"비브리오 콜레라와 무관한 것은?","c":["fatality rate가 낮다","Incubation period가 2-3일이다.","세균독소가 그 원인이다.","Gastro-enteritis 증상을 일으킨다.","체온은 정상, 맥박은 느리다"],"a":2,"prof":"임종한","theme":"식품오염·식중독","unc":0,"src":"pdf","expl":"강의록상 비브리오는 독소형/세균성 식중독으로 위장관염(gastro-enteritis) 증상을 일으키며 치명률이 낮다. 세균성 식중독의 잠복기는 보통 수 시간~하루로 짧아 '잠복기 2-3일'은 무관한 설명이라 정답. 다만 '체온 정상, 맥박 느리다'는 전형적 표현이 아니어서 함정이나 잠복기가 더 명백한 오답이다.","basis":"lecture"},{"id":70,"year":"2017","num":77,"q":"최근 문제가 된 닭진드기 제거를 위해 사용하는 계란에 포함된 피프로닐과 비펜트린은 어느 계열에 속하는가?","c":["메틸브로마이드","Carbamate","Phenoxy계","Pyrethroid","유기인제"],"a":4,"prof":"임종한","theme":"식품오염·식중독","unc":0,"src":"pdf","expl":"강의록: 피프로닐(fipronil), 비펜트린(bifenthrin)은 합성 피레스로이드계(pyrethroid) 화합물로 분류된다. 따라서 정답은 4번 Pyrethroid.","basis":"lecture"},{"id":71,"year":"2017","num":78,"q":"플라스틱 용기, 뚜껑, 수도관의 내장 코팅제 등으로 사용되며 환경 호르몬 역할을 하는 물질은?","c":["비스페놀 A","DES","알킬페놀","스티렌","파라벤"],"a":1,"prof":"김환철","theme":"내분비장애물질","unc":0,"src":"pdf","expl":"강의록(PAGE 7)에서 비스페놀A는 '플라스틱 용기, 음료캔, 병마개, 수도관의 내장코팅제, 치과치료시 이용되는 코팅제'로 용출이 우려되는 물질로 명시된다. 따라서 정답은 비스페놀 A.","basis":"lecture"},{"id":72,"year":"2017","num":79,"q":"다음 중 방사선 손상의 확률적 영향에 맞는 것을 고르시오","c":["태아 사망","선천 기형","유전 돌연변이","발육 부전","정신 지체"],"a":3,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(방사선 PAGE 14, 19): 확률적(stochastic) 영향은 암 발생과 유전적(생식세포 돌연변이) 영향이고, 태아사망·기형·발육부전·정신지체는 결정론적 영향이다. 따라서 정답 3(유전 돌연변이)이 맞음.","basis":"lecture"},{"id":73,"year":"2017","num":80,"q":"전리 방사선에서 단위 질량당 흡수된 에너지 양을 나타내는 단위를 고르시오","c":["Bq","Gy","Sv","Roentgen","Curie"],"a":2,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(방사선 PAGE 9): 흡수선량 D는 단위 질량당 흡수에너지이며 표준단위는 그레이(Gy, 1Gy=1J/Kg). Bq는 초당 붕괴수, Sv는 등가/유효선량. 정답 2(Gy)가 맞음.","basis":"lecture"},{"id":74,"year":"2017","num":85,"q":"WHO에서 발표한 교대근무의 암 발생 가능성?","c":["1","2A","2B","3","관계없음"],"a":2,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"pdf","expl":"WHO 산하 IARC는 교대근무(circadian disruption 동반 야간작업)를 Group 2A(인체 발암 추정)로 분류하였다(정답 2).","basis":"general"},{"id":75,"year":"2017","num":86,"q":"Chest X-ray의 방사선 피폭 농도는?","c":["0.08-0.1 mSv","0.1-0.8 mSv","0.8-3.0 mSv","5.0-10.0 mSv","10.0-50.0 mSv"],"a":1,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(방사선 PAGE 20): 흉부 X선 피폭량은 0.08 mSv로 제시됨. 따라서 0.08-0.1 mSv 범위인 정답 1이 맞음.","basis":"lecture"},{"id":76,"year":"2017","num":89,"q":"식품첨가물 아황산염에 가장 민감한 질환자는?","c":["천식","당뇨","고혈압","심혈관질환","근골격계질환"],"a":1,"prof":"임종한","theme":"식품오염·식중독","unc":0,"src":"pdf","expl":"아황산염(표백제, 아황산나트륨)은 천식 환자에서 기관지 수축을 유발해 가장 민감하게 반응한다. 강의록의 표백제 아황산나트륨 항목 및 표준지식상 정답은 1번 천식.","basis":"lecture"},{"id":77,"year":"2017","num":90,"q":"기후 변화에 의해 가장 많이 발생할 것을 예상되는 것은?","c":["극한 기상현상으로 인한 사망과 질병, 부상의 증가","영양 결핍의 증가","설사성 질병 증가","말라리아","대기오염 수준의 변화로 인한 순환계-호흡기 질환의 증가"],"a":4,"prof":"김양우","theme":"방사선·대기오염","unc":1,"src":"pdf","expl":"기후변화 건강영향 중 대기오염 수준 변화로 인한 순환기-호흡기 질환 증가가 가장 많이 예상되나, 이 문항 보기 순서상 정답은 4(말라리아)로 표기됨. 강의록에 순위 근거가 명확치 않아 애매하며(다른 판본 156·166은 순환기-호흡기 계열), 확정 근거 부족.","basis":"general"},{"id":78,"year":"2017","num":91,"q":"지구 규모의 환경문제에 대한 설명 중 옳은 것은?","c":["황산-산성비, 질소산화물-피부암, 흑색종, 피부노화","대류권 오존 파괴 - CFC -vit. D 감소, 골다공증","황사 - 모래먼지 증가 - 토지 및 수질 오염 증가","열대우림- 화전경작 - 소화기 질환 증가","온실효과 - 탄산가스, 메탄, CFC - 기후 변화"],"a":5,"prof":"임종한","theme":"위해성평가·온난화","unc":0,"src":"pdf","expl":"강의록: 온실효과는 이산화탄소·메탄·CFC(염화불화탄소)·N2O 등 온실기체가 지구 복사열(적외선)을 흡수해 기후변화를 일으키는 현상이므로 5번이 옳다. 오존층 파괴는 대류권이 아니라 성층권에서 CFC에 의해 일어나며(비타민D 등 영향은 자외선 관련), 산성비는 질산·황산이 원인으로 피부암과 무관해 나머지 보기는 틀리다.","basis":"lecture"},{"id":79,"year":"2017","num":92,"q":"지구 온난화의 원인에 대한 설명이다. 옳은 것은?","c":["21세기 말까지 0.6-1.2도 정도의 기온변화가 예상된다.","탄소연료의 고갈로 인해 선진국에 영향이 클 것이다.","기혼변화가 미치는 영향이 우리가 예상했던 것보다 더욱 크게 작용할 것이다.","____ 농도는 화산활동, 태양활동에 의해 영향 받는다.(?)","바젤협약을 통해 국제적으로 대책을 생성, 대응 중이다."],"a":3,"prof":"임종한","theme":"위해성평가·온난화","unc":0,"src":"pdf","expl":"강의록: IPCC 등은 온난화의 영향이 예상보다 더 크고 빠르게 작용할 것으로 비관적 전망을 제시하므로 3번이 옳다. 강의록은 21세기 말 기온이 최고 6.4도까지 상승한다고 하여 1번(0.6~1.2도)은 과소, 온난화 대응 협약은 바젤협약(유해폐기물)이 아니라 기후변화협약이라 5번도 틀리다.","basis":"lecture"},{"id":80,"year":"2017","num":93,"q":"유기물이 호기성 미생물에 의해 생물학전 분해될 때 필요한 산소량을 의미하는 것은?","c":["생물학적 산소요구량","화학적 산소요구량","용존 산소양","산소 포화도","수소이온농도"],"a":1,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"pdf","expl":"강의록(3주차) 수질오염 지표에서 생물화학적 산소요구량(BOD)은 유기물이 호기성 미생물에 의해 분해될 때 필요한 산소량으로 정의된다. 산화제로 산화할 때 필요한 양은 COD이므로 정답은 1번(BOD).","basis":"lecture"},{"id":81,"year":"2017","num":94,"q":"70년대 유산방지제로 사용된 DES 체내 작용 기전은?","c":["호르몬 유사","호르몬 봉쇄","호르몬 촉발","기존 호르몬과 상호작용","대사 방해"],"a":1,"prof":"김환철","theme":"내분비장애물질","unc":0,"src":"pdf","expl":"강의록(PAGE 9, 19)에서 DES(diethylstilbestrol)는 70년대 유산방지제로 쓰인 합성에스트로겐으로, 정상호르몬과 유사하게 수용체에 결합하는 모방작용(mimic)을 하는 대표물질(PCBs, BPA, DES)로 분류된다. 따라서 '호르몬 유사'가 정답.","basis":"lecture"},{"id":82,"year":"2018","num":1,"q":"건물 화재 시 많이 발생하는 유해가스로 미토콘드리아의 시토크롬 산화효소에 작용하여 산소 이용을 방해함으로써 독성을 나타내는 것은?","c":["일산화탄소","암모니아","아닐린","시안화물","황화수소"],"a":4,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록: 화재 연기에서 폴리우레탄·양모 등 질소 함유물 연소로 발생하는 시안화물(HCN)이 미토콘드리아 Cytochrome c oxidase에 결합해 세포의 산소 이용을 차단한다(보기4 정답). 일산화탄소는 산소 '운반'을 차단하는 기전으로 구분된다.","basis":"lecture"},{"id":83,"year":"2018","num":2,"q":"IARC group 1분류에 해당하는 것은?","c":["수은","톨루엔","카페인","간접흡연","휴대폰"],"a":4,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"IARC Group 1(인체 발암 확실) 해당은 간접흡연(2차 흡연)이다(보기4). 강의록상 카페인·휴대폰은 1군이 아니며, 톨루엔·수은도 1군 발암물질로 분류되지 않으므로 간접흡연이 정답.","basis":"general"},{"id":84,"year":"2018","num":3,"q":"톨루엔의 생체 내 대사산물로 노출 측정을 위해 사용되는 것은?","c":["소변 중 마뇨산","소변 중 뮤콘산","소변 중 메틸마뇨산","소변 중 만델산","소변 중 PPCA"],"a":1,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"톨루엔의 요중 대사산물 노출지표는 마뇨산(hippuric acid)이다. 뮤콘산은 벤젠, 메틸마뇨산은 크실렌, 만델산은 스티렌 지표이므로 오답.","basis":"general"},{"id":85,"year":"2018","num":4,"q":"48세 여자 환자가 두통, 피로, 감각 저하, 운동 시 호흡 곤란, 시야 협착을 주소로 병원을 방문하였다. 직업력상 지난 15년간 셀로판 제조 공장에서 근무하였다. 검사 결과 망막병증, 죽상동맥경화증 등이 관찰되었다. 다음 중 가장 가능성이 높은 원인 물질은?","c":["이황화탄소","벤젠","스틸렌","일산화탄소","노말헥산"],"a":1,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"셀로판(비스코스 레이온) 제조 노출 물질은 이황화탄소(CS2)이며, 망막병증·죽상동맥경화(혈관병증)·말초신경병증·정신증상이 특징이다. 강의록에도 CS2가 이독성 유기용제로 언급됨. 다른 용제는 이 혈관·망막병증 조합을 설명 못함.","basis":"general"},{"id":86,"year":"2018","num":5,"q":"52세 여자가 3개월 전부터 양쪽 발가락의 감각이 저하되고 최근부터는 발의 근력도 떨어졌다. 직업상 접착제를 20년간 사용해 왔다. 업무 중 노출된 물질을 확인하기 위해서 검사해야 할 대사 산물은?","c":["2,5-헥산디온","만델산","마뇨산","페놀","메틸마뇨산"],"a":1,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"접착제(신발·가구) 사용 20년, 원위부 대칭성 말초신경병증은 노말헥산(및 MnBK) 노출이며, 노출 확인 대사산물은 2,5-헥산디온이다. 만델산(스티렌)·마뇨산(톨루엔)·메틸마뇨산(크실렌)은 오답.","basis":"general"},{"id":87,"year":"2018","num":6,"q":"잇몸 출혈, 26세 여자 혈액검사에서 적혈구, 백혈구, 혈소판 모두 감소. 전자부품 제조공장에서 5년째 일함. 직업 관련성 평가를 위해 시행할 검사는?","c":["소변 뮤콘산","날숨 에틸벤젠","혈액 자일렌","소변 마뇨산","혈액 톨루엔"],"a":1,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"전자부품 공장 범혈구감소(재생불량성 빈혈)는 벤젠 노출이며, 노출 확인 검사는 요중 뮤콘산(t,t-muconic acid)이다. 에틸벤젠·자일렌·마뇨산·톨루엔은 벤젠과 무관.","basis":"general"},{"id":88,"year":"2018","num":7,"q":"가구 제조공장에서 근무하는 22세 여자가 기침과 호흡곤란을 호소하였다. 이 여자는 두 달 전부터 근무를 시작했는데 지난주에 처음으로 증상이 나타났고 주말에 증상이 호전되었다가 월요일에 출근하면서 다시 증상이 악화되었다. 작업관련성 평가를 위해 시행해야 하는 검사는?","c":["가슴X선촬영","가슴 컴퓨터촬영","가래 호산구수","기관지내시경","최대 날숨 유속검사"],"a":5,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"월요일 출근 시 악화·주말 호전의 전형적 직업성 천식 양상으로, 작업관련성 평가에는 근무 중/후 측정하는 최대날숨유속검사(PEFR, 5번)가 적절하다. 표준 직업성 천식 진단 접근으로 판단.","basis":"general"},{"id":89,"year":"2018","num":8,"q":"40세 남자가 압축공기를 이용하여 수중 40m에서 잠수를 하던 중 술에 취한 것처럼 제멋대로 행동을 하였다. 이러한 증상을 예방하기 위한 조치는?","c":["압축공기의 압력이 수압과 같도록 한다","압축공기에 질소 대신 헬륨을 사용한다","압축공기 중 산소농도를 30%로 한다","압축공기 중 산소농도를 10%로 한다","압축공기 중 질소농도를 90%로 한다."],"a":2,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"pdf","expl":"강의록: 수심 30~60m에서 질소마취(황홀감, Martini rule)가 나타나며 예방은 질소 대신 헬륨 등 불활성기체 사용(혼합기체잠수). 헬륨은 마취작용이 질소의 1/4~1/5로 적다. 따라서 헬륨 사용(2번)이 정답.","basis":"lecture"},{"id":90,"year":"2018","num":9,"q":"우리나라에서 2000년대 이후 요양 승인자가 크게 증가한 직업성 질환으로 작업관련성을 평가하기 위해서는 작업공정, 작업량, 작업자세 등에 대한 조사가 필요한 것은?","c":["소음성 난청","특정 화학물질 중독","근골격계 질환","뇌심혈관 질환","유기용제 중독"],"a":3,"prof":"김양우","theme":"소음·진동","unc":0,"src":"pdf","expl":"강의록(PAGE 9)에서 근골격계 질환은 작업공정·작업량·작업자세 조사가 필요한 대표 작업관련성 질환으로 다뤄지며, 2000년대 이후 요양승인이 크게 증가한 것은 근골격계 질환(보기3)이다. 소음성 난청은 오래된 인정 1위 직업병이지만 작업자세 조사와는 성격이 다름.","basis":"general"},{"id":91,"year":"2018","num":10,"q":"55세 여자가 고산지대를 등반하던 중 구토, 호흡곤란, 심계항진 등의 증상이 발생하였다. 이 여자에게 나타날 수 있는 합병증은?","c":["뇌출혈","폐부종","심근경색","폐색전증","급성콩팥기능상실"],"a":2,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"고산지대 등반 중 구토·호흡곤란·심계항진은 급성고산병이며, 진행 시 나타날 수 있는 합병증은 고지폐부종(2번)이다. 뇌부종도 가능하나 보기 중 폐부종이 정답. 강의록 근거 없이 표준지식으로 판단.","basis":"general"},{"id":92,"year":"2018","num":11,"q":"정화조 관리 작업을 하는 근로자가 정화조를 관리하다가 의식을 잃고 안으로 떨어졌다. 어떤 원인 물질이 가장 크게 작용하였는가?","c":["황화수소","이산화질소","오존","메탄","사염화탄소"],"a":1,"prof":"임종한","theme":"위해성평가·온난화","unc":0,"src":"pdf","expl":"정화조·하수구 등 밀폐공간의 유기물 부패 시 발생하는 황화수소(H2S)는 고농도에서 후각 마비와 즉각적 의식소실(knockdown)을 일으켜 추락·질식 사고의 주원인이 되므로 1번이 옳다. 강의록에 직접 근거는 없으나 표준 직업환경의학 지식으로 명확하다.","basis":"general"},{"id":93,"year":"2018","num":12,"q":"여름철 건설 야외 현장에서 맑은 날 8시간 이상 육체 노동을 하던 근로자가 두통과 구역, 어지러움을 호소하다가 쓰러졌다. 고막 온도가 38도이고 맥박수가 증가하였고 혈당이 감소했다. 다음 중 가장 먼저 해야 할 처치는?","c":["겨드랑이에 얼음 팩을 대어 준다.","얼음물에 넣어준다.","미지근한 물을 뿌리고 선풍기를 틀어 준다.","해열제를 먹인다.","경과 관찰"],"a":5,"prof":"박신구","theme":"기후·온열","unc":1,"src":"pdf","expl":"이 사례(38도·발한·저혈당)는 열탈진으로, 보기의 적극적 냉각(얼음물·아이스팩)이나 해열제는 부적절하고 시원한 곳 휴식·수액이 원칙이라 '경과 관찰'을 답으로 본 듯하나 보기 구성이 애매하다. 강의록에 처치 기준이 없어 확정 곤란.","basis":"general"},{"id":94,"year":"2018","num":13,"q":"우리나라 산업재해 보상보험에는 사업주가 법을 위반하지 않았어도 업무상 질병이 발생하면 보상하도록 되어있다. 이와 관련된 산업재해 보상은?","c":["정률 보상방식","사회보험방식","현실우선방식","강제보험방식","무과실 책임주의"],"a":5,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록: 산재보상보험은 사업주 과실 여부와 무관하게 업무상 재해를 보상하는 무과실 책임주의(5번)를 원리로 한다.","basis":"lecture"},{"id":95,"year":"2018","num":14,"q":"전자제품을 세척하는 일을 하는 27세 남자가 입사 3개월 만에 목에 덩이가 만져져 병원에서 생검을 하였다. 진단 결과 비호지킨 림프종이 나와 산재보험을 신청했다. 업무상 재해 판정위원회는 직무와 연관성이 적다는 판단을 내렸다. 이유는?","c":["질병의 종류","환자의 나이","환자의 성별","유해물질의 종류","발병까지의 시간"],"a":5,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록 업무기인성: 입사 3개월은 비호지킨 림프종의 잠복기로 너무 짧아 발병까지의 시간(5번)을 이유로 직무 연관성이 적다고 판정한다(id 25와 동일).","basis":"lecture"},{"id":96,"year":"2018","num":15,"q":"45세 남자가 고깃집에서 숯불을 피우다 가슴통증 후 의식소실로 내원하였다. 진단에 필요한 것은?","c":["요중 마뇨산","요중 마콘산(복원 오류같아여)","요중 메틸마뇨산","요중 페놀","혈중 일산화탄소헤모글로빈"],"a":5,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록: 숯불(조개탄) 등 탄소 연료 불완전연소로 발생한 일산화탄소 중독이며, 진단에는 혈중 일산화탄소헤모글로빈(COHb) 측정이 표준이다(보기5). 일반 펄스옥시미터는 거짓 정상이므로 Co-oximeter로 COHb를 확인해야 한다.","basis":"lecture"},{"id":97,"year":"2018","num":16,"q":"40세 여성 근로자가 발작성 경련성 복통, 황달, 소변색 변화, 전신 쇠약을 주소로 내원하였다. 합성피혁을 제조하는 공장에서 근무한지 2개월이 되었고, 채용시 건강진단에서 정상 간기능 소견이 나왔다. 병원에서 수행한 간기능 검사에서 AST 583 ALT 539 GGT 49IU. 입원 1일 째 의식이 혼미해졌다. 원인 물질은 무엇인가?","c":["염화비닐","이소프로필알코올","디메틸포름아마이드","다환적 방향적 탄화수소","메틸부틸케톤"],"a":3,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"합성피혁 제조에서 급성 독성간염(AST/ALT 급상승)과 간성혼수를 일으키는 유기용제는 디메틸포름아마이드(DMF)이다. 염화비닐은 간혈관육종(만성), PAH는 발암, 메틸부틸케톤은 신경병증으로 급성 전격성 간염 양상과 부합하지 않음.","basis":"general"},{"id":98,"year":"2018","num":17,"q":"하인리히 법칙의 비율은?","c":["1:30:300","1:10:300","1:29:300","1:29:100","1:10:100"],"a":3,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록: 하인리히 법칙은 주요재해:경미재해:유사재해 = 1:29:300 이다(3번). 큰 사고 1건 전에 29건의 경상, 300건의 무상해 사고가 선행한다는 법칙.","basis":"lecture"},{"id":99,"year":"2018","num":18,"q":"근무지에서 원하는 능력과 개인의 능력 차이로 인한 신체적, 정신적인 요인으로 발생하는 질환은?","c":["근골격계 질환","심혈관계 질환","신경계 질환","피부과적 질환","호흡기계 질환"],"a":2,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록 직무스트레스: 업무 요구와 개인 능력의 불균형(직무스트레스)으로 유발·악화되는 대표 질환은 심혈관계 질환(2번)이다.","basis":"lecture"},{"id":100,"year":"2018","num":19,"q":"전자제품 공장에서 일하던 36세 여자 근로자가 피로, 권태감, 어지러움을 호소하여 내원하였다. 얼굴이 창백해지는 빈혈소견을 보였고, 혈액검사결과 에서 헤모글로빈과 백혈구 수치 감소를 보였다. 이 환자의 증상을 유발한 원 인 물질을 알기 위한 검사로 적절한 것은?","c":["골수 검사","신경 전도 검사","요중 마뇨산","요중 메틸마뇨산","요중 뮤콘산"],"a":5,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"빈혈·백혈구감소(골수억제)로 벤젠 노출이 의심되며, 노출 원인물질 확인 검사는 요중 뮤콘산이다. 골수검사·신경전도검사는 노출 확인용이 아니고, 마뇨산(톨루엔)·메틸마뇨산(크실렌)은 벤젠과 무관.","basis":"general"},{"id":101,"year":"2018","num":20,"q":"직업성 암의 특성에 관한 내용 중 옳은 것은?","c":["비직업성 암종보다 고연령층에서 발생한다.","유발잠복기간은 다양하지만 대부분 10년 미만이다.","혈액암이 직업성 암종 중 가장 흔하다.","일반주민들의 같은 부위에 생기는 암과 사망률이 비슷하다.","발암물질 노출력에 대한 조사가 무엇보다 중요하다."],"a":5,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"pdf","expl":"id 6과 동일 문항. 정답은 '발암물질 노출력 조사가 무엇보다 중요하다'(정답 5). 나머지 보기는 직업성 암 특성에 대한 반대 서술이라 오답.","basis":"general"},{"id":102,"year":"2018","num":21,"q":"[박신구] 초보 잠수자가 15m의 수심에서 수중 생물을 관찰하던 중 상어에 놀라 급히 수면으로 상승하였다. 수면 도착 후 수분이 경과되지 않아 의식 상실에 빠졌다. 가장 가능성이 높은 원인은?","c":["질소마취","폐과확장증","저산소증","동맥혈 기체 색전증","탄산가스 과다증"],"a":4,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"pdf","expl":"강의록: 상승 중 또는 수면 도착 후 10분 이내 발작·의식상실은 동맥혈 기체 색전증(4번)의 전형적 소견으로, 잠수장애 중 치명률이 가장 높다. 폐과확장증은 색전증의 선행 손상이지만 수 분 내 의식상실의 직접 원인은 색전증.","basis":"lecture"},{"id":103,"year":"2018","num":22,"q":"[박신구] 히말라야를 등산할 때 높은 고도에서 일어나는 생리변화 중 생존에 가장 중요한 요인은?","c":["낮은 온도","낮은 압력","낮은 습도","낮은 산소분압","자외선 노출"],"a":4,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"pdf","expl":"강의록: 고고도에서 생존에 가장 중요한 요인은 산소분압 저하. 낮은 산소분압(4번)이 정답.","basis":"lecture"},{"id":104,"year":"2018","num":23,"q":"[박신구] 유해물질 허용 기준에 대해 옳은 것은?","c":["시간 가중 평균치(TLV-TWA)는 하루 6시간 주 30시간 폭로되어도 건강장해없는 평균 농도","단시간 폭로 허용치(TLV-STEL)는 작업 시간 계속해서 60분간 폭로되어도 장해 없는 평균 농도","TLV 수준에서는 개인의 감수성이 고려되지 않아서 직업병을 인정하는 지표로 쓰이지는 않는다.","TLV는 대기오염 평가 및 관리에 적용될 수 있다.","복합 물질 폭로시 허용농도는 독립 작용과 상승 작용만을 인정한다."],"a":3,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록: TLV는 개인 감수성 차이 때문에 직업병 인정 지표로 쓰이지 않는다(3번)는 설명이 옳다. TWA는 8시간·주40시간(6시간/30시간 아님), STEL은 15분(60분 아님) 기준이라 1·2번 오답, TLV는 대기오염 관리에 적용될 수 없어 4번 오답, 복합노출 평가는 상가작용 기준이므로 5번 오답.","basis":"lecture"},{"id":105,"year":"2018","num":24,"q":"[박신구] 작업관련성 혈액 질환 중 작용 기전이 유사한 것은?","c":["톨루이딘-벤젠","수은-전리방사선","벤젠-전리방사선","나프탈렌-납","톨루이딘-수은"],"a":2,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록: 벤젠은 조혈기계(골수) 손상으로 재생불량성 빈혈·백혈병을 일으키며, 전리방사선도 골수를 직접 타격해 혈액질환을 유발한다 — 두 물질의 조혈독성 기전이 유사하다(보기3). 톨루이딘·나프탈렌은 메트헤모글로빈혈증/용혈 계열로 기전이 다르다.","basis":"general"},{"id":106,"year":"2018","num":25,"q":"30세 남자, 2주 전 용광로 작업을 시작하였다. 갈증을 호소하고 체온 37.9도, 혈압 140/100, 호흡수 25 회/분, 심박수 131회/분이고 입술이 마르는 증상을 보였다. 이 업자의 검사 소견상용광로 작업을 즉시 멈 춰야 하는 근거는?","c":["체온","심박수","호흡수","혈압","입술마름"],"a":5,"prof":"박신구","theme":"기후·온열","unc":1,"src":"pdf","expl":"용광로 신규작업자의 탈수 징후(입술마름) 및 빈맥(131회)·빈호흡은 열스트레스 과부하 신호다. 정답은 입술마름(탈수)을 근거로 제시했으나, 지속적 심박수 상승(생리적 모니터링 기준)을 정답으로 볼 여지도 있어 보기 판단이 애매하다. 강의록 근거 없음.","basis":"general"},{"id":107,"year":"2018","num":26,"q":"다음중 우리나라에서 발생한 진폐증의 합병증으로 가장 흔한 것은?","c":["폐결핵","폐심장증","폐공기증","폐암","공기가슴증"],"a":1,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"우리나라 진폐증의 가장 흔한 합병증은 폐결핵(활동성 결핵, 1번)이다. 진폐 환자에서 결핵 동반이 가장 빈번하다는 표준지식·진폐 통계로 판단하며 정답이 맞다.","basis":"general"},{"id":108,"year":"2018","num":27,"q":"[박신구 > 김환철] 다음 중 소음성난청에 대한 설명으로 옳은 것은?","c":["주로 편측성으로 나타난다","저주파에서 난청이 시작된다","소음을 중단하면 난청진행은 되지 않는다","주로 중이염이나 고막의 비후가 원인이다","골도 청력감소만큼 기도 청력의 감소는 나타나지 않는다"],"a":3,"prof":"김양우","theme":"소음·진동","unc":0,"src":"pdf","expl":"강의록(PAGE 27, 37): 소음성 난청은 양측성, 고주파(4kHz) 시작, SNHL이므로 노출을 중단하면 NIHL 진행은 멈춘다(보기3)가 옳다. 중이염·고막비후는 전음성 원인이라 틀림.","basis":"lecture"},{"id":109,"year":"2018","num":28,"q":"[박신구 ] 시차적응증후군에 대한 설명으로 옳은 것은?","c":["시차적응을 위해 비행기 안에서 음식을 많이 먹어둔다","날짜변경선과 밀접한 관련이 있다","시간대를 빠르게 넘나드는 여행을 할 때 주로 생긴다","한국에서 미국으로 갈 때가 미국에서 한국으로 올 때보다 적응이 더 쉽다.","영국에서 남아공처럼 북남으로 여행힐 때 주로 발생한다"],"a":3,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"ai","expl":"강의록: 시차증후군은 시간대를 빠르게 넘나드는 여행 시 발생(3번). 날짜변경선과 무관, 북남 방향은 잘 안 생기며, 동쪽(한국→미국)이 서쪽보다 적응이 어려우므로 4번은 반대 서술로 오답.","basis":"lecture"},{"id":110,"year":"2018","num":29,"q":"15년 동안 굴진부에서 압추공기 착압기를 사용한 근로자가 손가락 색조변화와 간헐적 통증, 손목의 통증 등을 주소로 내원했다. 의사가 이 환자의 국소진동으로 인한 장해로 진단하였다. 이 환자에 대한 설명으로 옳은 것은?","c":["보기","관절염과 비슷한 증상이 있다.","흡연과 관계가 없다.","뜨거운 물에 넣었을 때 통증이 악화된다.","이 질환의 특이적인 증상으로 레이노 증후군이 있다."],"a":2,"prof":"김양우","theme":"소음·진동","unc":0,"src":"pdf","expl":"강의록(PAGE 80): HAVS는 다표적 손상으로 손목·팔꿈치 골관절염(OA) 등 관절 증상을 동반하므로 '관절염과 비슷한 증상'(보기2)이 옳다. 흡연은 강력한 위험인자(무관 아님), 한랭에서 악화(온수는 완화), 레이노는 특징적이나 특이적이라 보긴 어려움.","basis":"lecture"},{"id":111,"year":"2018","num":30,"q":"인천항에서 수입한 가구를 훈증 소독하던 근로자가 상하지 감각저하, 근력저하를 주소로 내원했다. 가장 가능성 높은 물질은?","c":["벤젠","메틸브로마이드","잔류살충제","곡물분진","아플라톡신"],"a":2,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"강의록(메틸브로마이드 훈증제 섹션): 수입 가구·구조물 훈증 소독제 메틸브로마이드는 중추/말초신경 독성으로 감각저하·근력저하를 유발한다. 훈증 작업력+신경증상 조합으로 정답.","basis":"lecture"},{"id":112,"year":"2018","num":32,"q":"다음은 재해현황을 나타낸 표이다. 다음 중 도수율을 나타내는 지표는? 종업원수: 3000명, 재해자수: 25명, 작업시간: 3,000,000 재해건수: 10건, 손해일수: 10,000일","c":["25/10 x 1000","10/3,000 x 1000","25/3,000 x 1000","10/3,000,000 x 100,000,000","25/3,000,000 x 100,000,000"],"a":2,"prof":"박신구","theme":"산업보건·관리","unc":1,"src":"pdf","expl":"강의록: 도수율 = (재해건수/연작업시간)×1,000,000 = 10/3,000,000×1,000,000. 제시된 보기 중 이에 부합하는 것은 4번(10/3,000,000×100,000,000은 계수 오기이나 재해건수/연작업시간 형태)이 아니라, 실제 정답 형태는 2번(10/3,000×1000)이 아님에 주의. 본 문항 보기 표기가 부정확하나 출제 정답 2번은 도수율 공식(재해건수/연작업시간)의 분자·분모 배열과 불일치하여 애매하다.","basis":"lecture"},{"id":113,"year":"2018","num":33,"q":"악기공장에서 톨루엔 스프레이를 이용해서 도장작업을 1년 동안 한 30대 여성이 가슴이 답답하다는 증상으로 내원. FEV1=70이다. 증상치료에 효과가 가장 좋은 방법은?","c":["항생제 투여","근무시간 줄이기","비노출 부서로 이동하기","스프레이 대신 붓 쓰기","마스크 쓰고 작업"],"a":3,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"톨루엔 스프레이 도장에 의한 직업성 천식(FEV1 저하)은 원인물질 회피가 근본 치료이므로 비노출 부서로 이동이 가장 효과적이다. 마스크·붓 사용·근무시간 단축은 노출 감소에 그치고, 항생제는 감염이 아니므로 무의미.","basis":"general"},{"id":114,"year":"2018","num":34,"q":"직업병과 산업 재해를 예방하기 위해 가장 중요한 해결방안은?","c":["작업장 환경 개선","건강진단","보건교육","재해 질병 통계","산재보상"],"a":1,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록 예방대책 모형: 직업병·산업재해 예방에 가장 중요한 근본대책은 유해물질 발생단계의 작업장 환경개선(대치·환기 등)이다(1번). 건강진단·보건교육·통계·보상은 사후적 대책이다.","basis":"lecture"},{"id":115,"year":"2018","num":35,"q":"준종합병원 결핵병동에서 근무하던 간호사가 결핵에 결렸다. 산재승인을 받고 6개월간 치료를 위해 휴직하려 한다. 휴가급여로 평균 급여의 몇 %를 받을 수 있을까?","c":["40%","50%","60%","70%","80%"],"a":4,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록: 휴업급여는 요양으로 취업하지 못한 기간에 평균임금의 70%(1일당)를 지급한다(4번).","basis":"lecture"},{"id":116,"year":"2018","num":36,"q":"잠수병은 잠수 시 조직에 과포화 되었던 불활성 기체가 급부상하면서 배출되지 못하고 기포를 형성해 발생하는 것으로 생각된다. 그 치료법 가운데 기포 제거에 가장 효과가 있을것으로 생각되는 것은?","c":["산소흡입","수액정맥주사","스테로이드 투여","급격감압","재가압"],"a":5,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"pdf","expl":"강의록: 감압병 치료는 재가압산소요법. 재가압(5번)이 기포 제거에 가장 효과적이며 급격감압은 오답.","basis":"lecture"},{"id":117,"year":"2018","num":37,"q":"다음은 재해현황을 나타낸 표이다. 다음 중 도수율을 나타내는 지표는? 종업원 수: 3000명, 재해자수: 25명 작업시간: 3,000,000, 재해건수: 10건 손해일수: 10,000일","c":["25/10 x 1000","10/3,000,000 x 1000","25/3,000 x 1000","10/3,000,000 x 1,000,000","25/3,000,000 x 100,000"],"a":4,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록: 도수율 = (재해건수/연작업시간)×1,000,000 = 10/3,000,000×1,000,000. 보기 4번이 이 형태와 일치하여 정답이다.","basis":"lecture"},{"id":118,"year":"2018","num":38,"q":"우리나라에서 직업성 암으로 인정받은 것 중 가장 많은 것은?","c":["폐암","혈액암","직장암","위암","구강암"],"a":1,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"pdf","expl":"우리나라에서 직업성 암으로 인정받은 것 중 가장 많은 암은 폐암이다(정답 1). 석면·결정형유리규산·디젤배출물 등 폐 관련 발암물질 노출이 많기 때문.","basis":"general"},{"id":119,"year":"2018","num":39,"q":"기관지 천식을 초래하는 물질은?","c":["암모니아","이산화황","오존","이소시아네이트","포름알데하이드"],"a":4,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"이소시아네이트는 대표적 직업성 천식(감작성) 유발 물질. 나머지 자극성 가스와 달리 천식 원인물질로 정답 4(이소시아네이트)가 맞음. 강의록 직접 근거는 약해 표준지식 보완.","basis":"general"},{"id":120,"year":"2018","num":40,"q":"40대 남자가 갑자기 눈이 안 보여서 내원했다. 부천에 있는 휴대폰 부품 제조업체에서 일했다고 한다. 다음 중 원인은?","c":["톨루엔","메탄올","노말 헥산","TCE","DMF"],"a":2,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"휴대폰 부품 제조(알루미늄 절삭유·세척)에서 급성 시력상실은 메탄올의 시신경 독성이다. 톨루엔·노말헥산·TCE·DMF는 급성 실명을 일으키지 않음.","basis":"general"},{"id":121,"year":"2018","num":41,"q":"진폐증 중에서 가장 독성이 크고 진행이 빠른 것을 고르시오","c":["용접공폐증","철폐증","주석폐증","석면폐증","규폐증"],"a":5,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"규폐증(5번)은 결정형 유리규산에 의한 진폐로 독성이 크고 진행성 대량섬유화(PMF)로 빠르게 악화되며 결핵 동반이 흔하다. 용접공폐·철폐·주석폐 등 비활성 분진 진폐는 상대적으로 양성이므로 오답. 표준지식으로 판단.","basis":"general"},{"id":122,"year":"2018","num":42,"q":"다음 중 가장 위급하게 다뤄야 하는 것은?","c":["열탈진","열실신","열경련","열사병"],"a":4,"prof":"박신구","theme":"기후·온열","unc":0,"src":"pdf","expl":"열사병은 고체온과 다장기·중추신경 손상을 일으켜 사망에 이를 수 있는 응급질환으로, 열탈진·열실신·열경련보다 가장 위급하게 다뤄야 한다. 강의록에 위급도 서열 근거는 없어 표준지식으로 판단.","basis":"general"},{"id":123,"year":"2018","num":43,"q":"밴지딘이 일으키는 암은?","c":["갑상선암","방광암","폐암","위암","대장암"],"a":2,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"pdf","expl":"벤지딘은 방향족 아민으로 방광암을 유발한다(정답 2).","basis":"general"},{"id":124,"year":"2018","num":44,"q":"발암 물질에 일정 기간 노출된 근로자에 대해 현재 업무에 종사하고 있을 때 뿐 아니라 퇴직한 후에도 매년 1회씩 본인 부담 없이 산재예방기금으로 직업성 암을 조기발견하기 위해 실시하는 건강검진은?","c":["일반 건강 진단","특수 건강 진단","임시 건강 진단","수시 건강 진단","건강관리수첩 건강 진단"],"a":5,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"ai","expl":"강의록: 장기 잠복 직업성 암을 조기발견하기 위해 퇴직 후에도 실시하는 것은 건강관리수첩 소지자 건강진단(5번)이다.","basis":"lecture"},{"id":128,"year":"2018","num":48,"q":"진폐증을 진단할 때 반드시 고려해야 될 사항은?","c":["가족력","기관지 세척액 상 탄분진 소견","유해가스 노출력","Chest X-ray","소변검사"],"a":4,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"진폐 진단 시 반드시 고려할 것은 흉부 X-ray(4번)로 병형·합병증을 판정한다. 기관지세척액 탄분진은 노출 증거일 뿐 진단 표준이 아니다. 표준지식·진폐 판정 기준으로 판단.","basis":"general"},{"id":129,"year":"2018","num":51,"q":"[박신구]다음 유해가스 중 작용 기전이 다른 한 가지는?","c":["일산화탄소","메탄가스","아닐린","염화메틸렌","황화수소"],"a":2,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록 유해가스 분류상 CO·아닐린·염화메틸렌(체내 CO 생성)·황화수소는 산소 운반·이용을 차단하는 독성 질식제이나, 메탄가스만 산소를 물리적으로 밀어내는 단순 질식제로 기전이 다르다(보기2).","basis":"lecture"},{"id":130,"year":"2018","num":52,"q":"[박신구]맨홀 뚜껑 근처에서 일하던 인부 2명이 달걀 냄새를 맡고 쓰러짐. 옳은 것은?","c":["치료는 아질산염","산소 분압을 떨어트리는 기전의 독성","정유공장 고무공장 정화조 가스와 다름","신속한 구조를 위해 보호장비 없이 구조한다","사망까지 이르지는 않는다"],"a":2,"prof":"임종한","theme":"식품오염·식중독","unc":1,"src":"pdf","expl":"달걀 냄새가 나는 맨홀/정화조 가스는 황화수소(H2S)로, 세포호흡효소(cytochrome oxidase)를 차단하는 화학적 질식제이며 치료에 아질산염을 쓰고 사망에 이를 수 있다. 강의록에 직접 서술이 없어 표준지식 기준. 정답 2번 '산소 분압을 떨어뜨리는 기전'은 엄밀히는 산소분압 저하가 아닌 세포독성 기전이라 표현이 애매하나, 나머지 보기(정화조 가스와 다름·무보호구조·비치사)가 명백히 틀려 소거법상 2번이 최선으로 판단.","basis":"general"},{"id":131,"year":"2018","num":53,"q":"다음의 환경적 건강 위험 요인들 중에서 질병부담에 가장 높은 기여분율을 차지하는 것은? 1 ) 대기오염","c":["수질오염","기후변화","토양오염","폐기물오염"],"a":1,"prof":"임종한","theme":"위해성평가·온난화","unc":0,"src":"pdf","expl":"환경성 질병부담(EBD) 중 대기오염(실내·외 미세먼지 포함)이 전 세계적으로 가장 큰 기여분율을 차지하므로 1번이 옳다. 강의록은 EBD 증가와 대기오염을 강조하나 요인별 기여율 순위를 직접 제시하지는 않아 표준지식으로 판단한다.","basis":"general"},{"id":132,"year":"2018","num":54,"q":"광산이나 석탄분진 속 성분 중 폐섬유화를 동반한 진폐증, 폐암의 가장 직접적인 원인물질은? 1 ) 베릴륨","c":["카드뮴","석면","결정형유리규산","라돈"],"a":4,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"석탄분진 중 폐섬유화·진폐·폐암의 직접 원인물질은 결정형 유리규산(4번)이다. 보기 재배열 문항이나 정답은 유리규산으로 동일하며, 표준지식으로 판단.","basis":"general"},{"id":133,"year":"2018","num":55,"q":"[김환철]납에 관한 설명으로 옳은 것은?","c":["태반 통과하지 않는다.","주로 소화기로 흡수된다.","체내에서는 주로 혈장에 존재한다.","중독은 PNS에서만 나타나고 CNS에는 나타나지않는다.","신근의 약화가 나타난다."],"a":5,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록: 납은 주로 흡입·섭취로 들어오고 운동신경 우세 말초신경병증으로 손목 처짐(신근 약화, wrist drop)이 나타난다(보기5 정답). 납은 태반을 통과하고(보기1 오답), 혈중 납의 99%가 적혈구에 결합하며(보기3 오답), CNS·PNS 모두 침범한다(보기4 오답). 소화기 흡수도 하나 성인 흡수율은 낮아 '주로 소화기'는 부정확.","basis":"lecture"},{"id":134,"year":"2018","num":56,"q":"[김환철] 배터리 만드는 공장에서 15년간 일한 40대남자가 두통, 근육통, 금속을 빤듯한 맛, 허리통증을 호소하여 내원하였다. 카드뮴 중독으로 의심되는데 이환자에게서 가장 먼저 나타나는 소변검사의 소견은?","c":["소변 당 증가","소변 칼슘 증가","소변 아미노산 증가","소변 알부민 증가","소변 B2 microglobulin 증가"],"a":5,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록: 카드뮴은 근위세뇨관을 손상시켜 저분자량 단백뇨를 일으키며, 가장 먼저·특이적으로 나타나는 소견은 요중 β2-microglobulin 증가이다(보기5). 알부민뇨(사구체 손상)는 진행 후 늦게 나타난다.","basis":"lecture"},{"id":135,"year":"2018","num":57,"q":"30년간 도금업에 종사한 사람이 피부염에 걸려서 왔다. 옳은 설명은?","c":["피부염은 피부암으로 진행하지 않는다.","이 사람이 폐암에 걸릴 위험은 없다.","크롬은 6가보다 3가 독성이 강하다.","궤양은 통증이 극심하다.","이 궤양은 재발하지 않는다."],"a":1,"prof":"김양우","theme":"유해금속·가스","unc":1,"src":"pdf","expl":"복원된 보기가 모두 오류(정답 보기 없음) — 강의록상 6가 크롬 도금공의 피부염은 피부암 위험·폐암 위험이 있고, 6가>3가 독성이며, 크롬 홀 궤양은 통증이 없고 재발한다. 즉 보기1~5 모두 틀린 서술이라 현재 정답 1을 근거로 확정할 수 없다. 원문상 '피부염이 피부암으로 진행하지 않는다'는 명백히 오답이며 문항 복원 오류로 판단된다.","basis":"lecture"},{"id":136,"year":"2018","num":58,"q":"몇가지 설명이 있었지만 흑색족(black foot disease)만 기억해왔어요. 이 환자에게 어떤 검사를 해야 하는가?","c":["혈중 카드뮴","혈중 납","혈중 비소","혈중 수은","혈중 크롬"],"a":3,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록: 대만·방글라데시의 흑각병(Blackfoot disease)은 만성 비소 노출에 의한 말초 혈관 폐쇄성 질환이므로 혈중 비소 검사가 필요하다(보기3).","basis":"lecture"},{"id":137,"year":"2018","num":59,"q":"망간 중독에 관한 설명으로 맞는 것은?","c":["폐암과 관련성이 있다.","신체 내 필수 요소가 아니기 때문에 가능한 한 체내에서 줄이는 것이 바람직하다.","파킨슨병과 비슷한 증상이 나타나며 임상경과도 비슷하다.","MRI T1영상에서 globus pallidus 쪽 고음영이 비대칭적으로 나타난다.","망간이 들어가는 용접봉이나 용접작업을 통해 노출된다."],"a":5,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록: 망간은 용접봉 흄 흡입(용접작업)이 가장 흔한 직업성 노출원이다(보기5 정답). 망간은 필수 미량원소이며(보기2 오답), L-dopa 불응성 파킨슨 '양' 증후군으로 특발성 파킨슨병과 경과가 다르고(보기3 오답), MRI T1에서 기저핵(globus pallidus) 고신호가 '대칭성'으로 나타난다(보기4 오답). 폐암 관련성은 근거 부족(보기1 오답).","basis":"lecture"},{"id":138,"year":"2018","num":60,"q":"수컷의 암컷화 지표는?","c":["비텔로제닌","비스페놀 A","파라벤","파라쿼트"],"a":1,"prof":"김환철","theme":"내분비장애물질","unc":0,"src":"pdf","expl":"수컷 물고기의 암컷화(에스트로겐 노출)를 나타내는 대표적 생체지표는 원래 암컷 간에서 생성되는 난황단백 전구체인 비텔로제닌(vitellogenin)이다. 강의록에는 수컷 암컷화 사례(PAGE 12)는 나오나 이 지표명은 명시되지 않아 표준지식으로 판단하며, 정답은 비텔로제닌.","basis":"general"},{"id":139,"year":"2018","num":61,"q":"진폐증에서 진폐법상 인정되는 합병증은?","c":["천식","과민성 폐장염","비활성형결핵","간질성폐질환","원발성폐암"],"a":5,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"진폐법상 인정되는 합병증에 원발성 폐암(5번)이 포함되며, 비활성형 결핵·천식·과민성폐장염·간질성폐질환은 진폐 합병증으로 인정되지 않는다. 표준지식·진폐법 기준으로 판단.","basis":"general"},{"id":140,"year":"2018","num":62,"q":"superoxide를 만들고 2012년에 금지된 농약 이 이후로 이것에의한 사망률이 감소하였다. 무엇인가?","c":["다이옥신","피레스로이드계","DDT","파라쿼트","유기인제"],"a":4,"prof":"임종한","theme":"식품오염·식중독","unc":0,"src":"pdf","expl":"강의록: 파라쿼트(Paraquat)는 superoxide radical을 발생시키는 대표적 폐독성 물질이며 2012년 국내 판매 금지 후 자살 등 사망이 감소했다. 정답 4번 파라쿼트.","basis":"lecture"},{"id":142,"year":"2018","num":64,"q":"교대근무하는 여성에서 잘 걸리는 암은?","c":["자궁경부암","위암","갑상선암","유방암","대장암"],"a":4,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"pdf","expl":"교대(야간)근무 여성에서 유방암 위험이 증가한다(정답 4). IARC 2A.","basis":"general"},{"id":143,"year":"2018","num":65,"q":"세계보건기구의 조사에 따르면 미세먼지로 인한 사망률 중 가장 큰 부분을 차지하는 것은?","c":["폐암","뇌혈관질환","심혈관질환","급성 호흡기 질환","만성 호흡기 질환"],"a":3,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"WHO 미세먼지 관련 사망에서 심혈관질환(허혈성 심장질환)이 가장 큰 비중을 차지한다. 강의록(대기오염 PAGE 11-13)은 실내외 대기오염으로 인한 질환별 사망을 다루며 심혈관질환 사망이 최다이므로 정답 3(심혈관질환)이 타당.","basis":"general"},{"id":144,"year":"2018","num":66,"q":"런던형 스모그의 주요 물질로서 용해도가 커 상부기도에 문제를 일으키고 최근에 오염수준이 많이 향상된 물질은?","c":["질소산화물","오존","납","미세분진","아황산가스"],"a":5,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록: 아황산가스(SO2)는 런던형 스모그의 주물질로 수용성이 커 상부기도를 자극하고, 최근 오염수준이 크게 개선된 물질이다(PAGE 43 추이). 정답 5(아황산가스)가 맞음.","basis":"lecture"},{"id":145,"year":"2018","num":67,"q":"LA 스모그의 주요 물질로서 매우 반응성이 높아서 기도를 자극하고 하기도 증상을 유발하여 천식을 악화시키는 물질은?","c":["질소산화물","아황산가스","미세분진","오존","납"],"a":4,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록: 오존은 LA형(광화학) 스모그의 주물질로 반응성이 높아 기도를 자극하고 하기도 증상·천식을 악화시킨다. 정답 4(오존)가 맞음.","basis":"lecture"},{"id":146,"year":"2018","num":68,"q":"대기오염 물질 중 배출량 및 암 단위도 고려 시 가장 안 좋은 영향을 주는 것은?","c":["아황산가스","이산화질소","디젤연소분진","벤젠","납"],"a":3,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(대기오염 PAGE 36, 86): 디젤연소분진(DEP)은 암 위험의 약 70%를 차지하는 IARC 1급 발암물질. 배출량·암 단위위해도 고려 시 정답 3(디젤연소분진)이 맞음.","basis":"lecture"},{"id":147,"year":"2018","num":69,"q":"우리나라에서 황사 경보를 발령하기 위해서 농도가 높아지는 것은?","c":["이산화질소","오존","미세먼지","일산화탄소","아황산가스"],"a":3,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"황사 경보는 미세먼지(PM10) 농도가 기준 이상으로 높아질 때 발령한다. 강의록의 분진 정의(PAGE 23)와 부합하며 정답 3(미세먼지)이 맞음.","basis":"general"},{"id":148,"year":"2018","num":70,"q":"최근 가공육류에서 붉은색을 내기 위한 것으로 발암물질로 규정된 것은?","c":["인산염","유동파라핀","아질산염","바닐린","명반"],"a":3,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"pdf","expl":"가공육류의 발색제로 쓰이는 아질산염(nitrite)이 발암물질로 규정된다(정답 3). IARC는 가공육을 Group 1으로 분류.","basis":"general"},{"id":149,"year":"2018","num":71,"q":"최근 바다에서 자외선과 파도에 부서진 뒤 분해되지 않고 물고기들이 섭 취하여 피해가 커지고 있는 물질은?","c":["수은","카드뮴","플라스틱","PCB","다이옥신"],"a":3,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"자외선·파도에 부서져 분해되지 않고 물고기가 섭취해 피해를 주는 해양오염 물질은 미세플라스틱(플라스틱)이다(보기3). 강의록 직접 언급은 없으나 잘 알려진 미세플라스틱 문제.","basis":"general"},{"id":150,"year":"2018","num":72,"q":"2008년 중국에서 영아들이 유제품을 먹은 후 집단적으로 신장결석이 발생 하였다. 원인물질은?","c":["비소","멜라민","타르 색소","안식향산나트륨","아플라톡신"],"a":2,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"2008년 중국 유제품 영아 신장결석 집단 발생의 원인은 멜라민이다(보기2). id 68과 동일 문항.","basis":"general"},{"id":151,"year":"2018","num":73,"q":"비료, 육가공류에서 나오는 물질로 영아청색증(blue baby syndrome)을 일으키는 물질은?","c":["질산염 질소","암모니아 질소","암모늄","잔류 염소"],"a":1,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"pdf","expl":"강의록(3주차) '질산성질소' 항목에 비료·오물·육가공식품 등 유기물질이 원인이며 Blue baby syndrome(영아청색증)을 일으킨다고 명시. 따라서 정답은 1번 질산염 질소.","basis":"lecture"},{"id":152,"year":"2018","num":74,"q":"식품첨가물 중 vitamin C와 반응해 벤젠을 형성하는 물질은?","c":["아스파탐","아질산나트륨","MSG","안식향산나트륨","인산염"],"a":4,"prof":"임종한","theme":"식품오염·식중독","unc":0,"src":"pdf","expl":"안식향산나트륨(벤조산나트륨)은 비타민C(아스코르브산)와 반응해 발암물질 벤젠을 생성한다. 강의록의 보존료(안식향산) 항목 및 표준지식상 정답은 4번 안식향산나트륨.","basis":"lecture"},{"id":153,"year":"2018","num":75,"q":"Staphylococcal food poisoning과 무관한 것은?","c":["fatality rate 7","Incubation period가 2~3일이다.","세균 독소가 그 원인이다.","Gastro-enteritis증상을 일으킨다.","체온은 정상, 맥박은 느리다."],"a":2,"prof":"임종한","theme":"식품오염·식중독","unc":0,"src":"pdf","expl":"포도상구균 식중독은 독소형으로 위장관 증상을 일으키고 치명률이 낮다. 세균성 식중독 잠복기는 짧아(보통 수 시간) '잠복기 2-3일'이 무관한 설명이라 정답 2번.","basis":"lecture"},{"id":154,"year":"2018","num":76,"q":"피레스로이드(pyrethroid) 설명 중 맞는 것은?","c":["기억안남(답아니었음)","치료제로 2-PAM 안쓴다","carbamate보다 독성이 강하다","기본적으로 독성은 신경의 과소흥분에 의한다.","nicotinic 수용체와 비슷하게 작용해서 독성을 일으킨다."],"a":2,"prof":"임종한","theme":"식품오염·식중독","unc":0,"src":"pdf","expl":"강의록상 피레스로이드계는 신경독성을 보이며, 치료에 유기인제용 해독제인 2-PAM(pralidoxime)을 쓰지 않는다(2-PAM은 유기인제/일부 카바메이트에 국한). 정답 2번 '치료제로 2-PAM 안 쓴다'가 맞다.","basis":"lecture"},{"id":155,"year":"2018","num":77,"q":"플라스틱 용기, 음료캔, 병마개, 수도관의 내장코팅, 치과치료시 이용되는 코팅제에 사용되는 내분비계 교란물질은?","c":["비스페놀","DES","알킬페놀","스티렌","프탈레이트"],"a":1,"prof":"김환철","theme":"내분비장애물질","unc":0,"src":"pdf","expl":"강의록(PAGE 7) 비스페놀A 항목이 '플라스틱 용기, 음료캔, 병마개, 수도관의 내장코팅제, 치과치료시 코팅제'와 문구까지 일치한다. 따라서 정답은 비스페놀.","basis":"lecture"},{"id":156,"year":"2018","num":79,"q":"다음 중 방사선 손상의 확률적 영향에 맞는 것을 고르시오","c":["태아 사망","선천 기형","암","발육 부전","정신 지체"],"a":3,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(방사선 PAGE 14, 19): 암 발생은 확률적 영향에 해당하고 태아사망·기형·발육부전·정신지체는 결정론적 영향이다. 정답 3(암)이 맞음.","basis":"lecture"},{"id":157,"year":"2018","num":80,"q":"다음중 일상생활환경에서 전리방사선 노출이 가장 많은 것은?","c":["의료용 조사","핵낙진","Tv","자연조사","핵발전소"],"a":4,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(방사선 PAGE 20): 미국 평균 방사선 노출 3.6mSv/년 중 대부분이 자연방사선이며 의료용은 0.53mSv/년 수준이다. 일상환경 최대 노출원은 정답 4(자연조사)가 맞음.","basis":"lecture"},{"id":158,"year":"2018","num":81,"q":"전리방사선에 대한 감수성이 가장 높은 조직 및 기관은?","c":["뼈,연골","조혈,생식기","간","수정체","뇌"],"a":2,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"전리방사선 감수성이 가장 높은 조직은 세포분열이 활발한 조혈조직(골수)과 생식세포이다(Bergonie-Tribondeau 법칙). 강의록의 급성방사선증후군상 골수·백혈구 손상 강조와 부합. 정답 2(조혈, 생식기)가 맞음.","basis":"general"},{"id":159,"year":"2018","num":82,"q":"전리방사선으로 인한 암 발생률이 1/10,000~1/1,000,000수준으로 받 아들여질 때 방사선 노출 정도는?","c":["0.5mSv","0.08mSv","1mSv","5?10?mSv","50mSv"],"a":3,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(방사선 PAGE 30): 100mSv에서 암 인과관계가 인정되고, 저선량 미소 위해(1/만~1/백만)에 해당하는 노출은 대략 1mSv 수준(일반 허용치 1mSv/년). 정답 3(1mSv)이 타당.","basis":"lecture"},{"id":160,"year":"2018","num":83,"q":"WHO의 국제 암연구소에서 규정한 휴대폰 라디오파의 발암 등급은)?","c":["1","2A","2B","3","분류할 수 없음"],"a":3,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(방사선 PAGE 73, 78): IARC는 2011년 라디오파 전자기장(휴대폰)을 group 2B(발암 가능)로 분류했다. 정답 3(2B)이 맞음.","basis":"lecture"},{"id":161,"year":"2018","num":84,"q":"전리방사선에 의한 암 발생 모형으로 알맞은 것은?","c":["호메시스모델","역치 있는 선형","역치 없는 선형","증가하는 곡선","감소하는 곡선"],"a":3,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(방사선 PAGE 19, 확률론적 영향): 전리방사선에 의한 암 발생은 역치 없는 선형(LNT) 모델을 따른다. 정답 3(역치 없는 선형)이 맞음.","basis":"lecture"},{"id":162,"year":"2018","num":85,"q":"확률적 영향을 고려했을 때 연간 전리 방사선 최대 노출 허용치는?","c":["1mSv","5mSv","10mSv","50mSv","100mSv"],"a":4,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(방사선 PAGE 20): 방사선 근로자 직업적 노출 한계는 50mSv/년(일반인은 1mSv/년). 확률적 영향 고려 시 최대 허용치는 정답 4(50mSv)가 맞음.","basis":"lecture"},{"id":163,"year":"2018","num":86,"q":"염기 서열의 변화 없이 DNA 및 histone의 2차적인 변화로 인해 유전자 발현이 변화되는 것으로 부모의 원인물질 노출이 자식에게 대물림되는 변화의 원인이 되는 것은?","c":["돌연변이","후생염색체","염색체 변이","단백질 변성","아폽토시스"],"a":2,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"pdf","expl":"[정답 수정: 4번→2번] 염기서열 변화 없이 DNA·histone의 2차 변화로 유전자 발현이 바뀌고 대물림되는 것은 후생유전(epigenetics)으로, 보기 중 '후생염색체'가 정답이다. 현재 정답 4번(단백질 변성)은 명백히 틀렸고 정답은 2번.","basis":"general","a_orig":4},{"id":164,"year":"2018","num":87,"q":"헤어스프레이와 향수를 사용한 여성에서 사용하지 않은 여성들보다 훨씬 노출이 많은 물질은?","c":["파라벤","다이옥신","비스페놀 A","프탈레이트","디에틸스틸베스트롤"],"a":4,"prof":"김환철","theme":"내분비장애물질","unc":0,"src":"pdf","expl":"강의록(PAGE 8)에 '헤어스프레이 및 향수를 사용한 여성은 사용하지 않은 여성보다 프탈레이트가 높다'고 명시되어 있어 정답은 프탈레이트.","basis":"lecture"},{"id":165,"year":"2018","num":88,"q":"GMO 재배에 사용되는 살충제로 국제암연구소로부터 group2A로 평가 받았으며, 환경호르몬으로서의 독성을 지닌 것으로 여겨지는 물질은? (책에는 제초제라 나와있지만 살충제로 고쳐서 풀이하겠습니다)","c":["글리포세이트","피프로닐","카바메이트","DDT","그라목손"],"a":1,"prof":"김환철","theme":"내분비장애물질","unc":0,"src":"pdf","expl":"글리포세이트는 GMO 작물 재배에 널리 쓰이는 제초제(문항은 살충제로 표기)로 IARC가 group 2A(인체발암 추정)로 분류하였고 내분비교란 논란이 있다. 강의록에는 글리포세이트가 직접 언급되지 않아 표준지식으로 판단하며 정답은 글리포세이트.","basis":"general"},{"id":166,"year":"2018","num":89,"q":"기후변화에 의해 가장 많이 발생할 것으로 예상되는 것은?","c":["말라리아","극한 기상현상으로 인한 사망과 질병, 부상의 증가","영양결핍의 증가","설사병의 증가","대기오염 수준의 변화로 인한 순환기-호흡기 질환의 증가"],"a":2,"prof":"김양우","theme":"방사선·대기오염","unc":1,"src":"ai","expl":"강의록: 기후변화 건강영향 중 대기오염 수준 변화로 인한 순환기-호흡기 질환 증가가 가장 많이 예상되나 이 문항의 정답은 2(극한 기상현상으로 인한 사망·질병·부상 증가)로 표기됨. 강의록에 항목 간 순위 근거가 명확치 않아 애매함.","basis":"general"},{"id":167,"year":"2018","num":90,"q":"지구 규모의 환경문제에 대한 설명 중 옳은 것은?","c":["산성비-질산, 황산-피부노화, 흑색종, 면역감소","온실효과-탄산가스, 메탄가스, 염화불화 탄소-기후변화","황사-모래 먼지 증가, 토양과 수질의 산성화","열대우림-화전확대-소화기질환 증가","대류권의 오존층 파괴-CFC-비타민D감소"],"a":2,"prof":"임종한","theme":"위해성평가·온난화","unc":0,"src":"pdf","expl":"강의록: 온실효과는 탄산가스·메탄·CFC(염화불화탄소)가 적외선을 흡수해 기후변화를 유발하므로 2번이 옳다. 오존층 파괴는 성층권에서 CFC에 의해 일어나 5번(대류권)은 틀리고, 산성비는 질산·황산이 원인이지만 피부노화·흑색종과는 무관하다.","basis":"lecture"},{"id":168,"year":"2018","num":91,"q":"지구온난화에 대한 설명 중 옳은 것은?","c":["21세기말 지구의 기온은 1.1 ~ 6.4도의 증가가 예상된다.","화석연료의 고갈로 인해 선진국의 영향이 클 것이다.","바젤협약을 통해 국제적으로 대책을 생성, 대응 중이다.","예상했던 것보다 온도변화가 크지 않을 것이다.","농도는 화산활동, 태양활동에 의해 영향을 받는다."],"a":5,"prof":"임종한","theme":"위해성평가·온난화","unc":0,"src":"pdf","expl":"강의록: IPCC 5차 시나리오상 21세기 말 기온은 1.1~6.4도(최고 6.4도) 상승 전망이므로 1번이 옳다. 온난화 대책은 바젤협약이 아닌 기후변화협약이며, 온도변화는 예상보다 오히려 클 것으로 보아 3·4번은 틀리다.","basis":"lecture"},{"id":169,"year":"2018","num":92,"q":"Mills-Reinche 현상과 관련된 것은?","c":["쓰레기 처리","폐수 처리","상수도 정수 처리","지하수 정화 처리","하수도 정화 처리"],"a":3,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"pdf","expl":"Mills-Reincke 현상은 상수도 정수(여과·염소소독) 개선으로 수인성 질환뿐 아니라 전체 사망률까지 감소하는 현상이다. 강의록도 상수도 정비가 기대수명 향상의 결정적 계기라 강조하므로 정답 3번(상수도 정수 처리)이 맞다.","basis":"general"},{"id":170,"year":"2018","num":93,"q":"위해도 평가를 하는 궁극적인 목적은 무엇인가?","c":["위험성 확인","노출평가","용량-반응 관계규명","위해도 결정","위해도 관리"],"a":4,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"pdf","expl":"강의록(2주차) 위해도평가 과정은 Hazard Identification→Dose-Response→Exposure assessment→Risk Characterization으로, 궁극적 목적은 위해도 결정(Risk Characterization). 따라서 정답 4번(위해도 결정)이 맞다.","basis":"lecture"},{"id":171,"year":"2018","num":94,"q":"발암성 물질의 관리에서 다음 중 ‘노출 지표’에 해당하는 항목은?","c":["Micronuclei","DNA adducts","P53 변이","Sister chromatid exchange","AHH"],"a":2,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"pdf","expl":"발암물질 관리에서 DNA adducts는 발암물질이 DNA에 결합한 산물로 '내부 노출(노출 지표)'을 나타낸다(정답 2). Micronuclei·SCE·P53변이는 초기 생물학적 영향(효과) 지표, AHH는 감수성 지표이므로 함정.","basis":"general"},{"id":172,"year":"2018","num":95,"q":"다음 중 정자 수 감소, 요도 하열, 잠복 고환과 같은 이상을 일으키는 기작은?","c":["호르몬 유사","호르몬 봉쇄","호르몬 촉발","기존 호르몬과 상호작용","대사방해"],"a":2,"prof":"김환철","theme":"내분비장애물질","unc":0,"src":"pdf","expl":"정자수 감소, 요도하열, 잠복고환은 남성호르몬(안드로겐) 작용을 저해하는 anti-androgenic 기전(프탈레이트 등)의 결과다. 강의록(PAGE 9)의 봉쇄작용은 남성호르몬 수용체를 봉쇄해 남성 성징을 억제하는 것으로, 이 남성화 저해 표현형에 해당한다. 따라서 '호르몬 봉쇄'가 정답.","basis":"lecture"},{"id":174,"year":"2019","num":1,"q":"거의 모든 근로자가 하루 8시간씩 1주 40시간 노출되더라도 건강상 아무 유해 작용이 나타나지 않는 농도를 나타내는 것은?","c":["시간 가중 평균치(TLV-TWA)","단시간 노출 기준치(TLV-STEL)","천장치(TLV-C)","생물학적 노출 지표(BEIs)","허용 노출 한계(PELs)"],"a":1,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록(TLV-TWA): 거의 모든 근로자가 매일 8시간·주 40시간 노출되어도 건강상 유해작용이 없는 시간가중평균 농도는 TLV-TWA(1번)이다.","basis":"lecture"},{"id":175,"year":"2019","num":2,"q":"57세 남자가 체중이 줄고 기운이 없다고 내원하였다. 광산에서 25년 주물 공장에서 5년 근무하였다. 10갑년의 흡연력을 가지고 있었고 다른 병력은 없었다. 흉부 CT상 종괴가 의심되었고 조직 검사 결과 편평세포암이 발견되었다. 원인은?","c":["흡연","석면","라돈","유리규소","포름알데히드"],"a":4,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"광산 25년+주물 5년 근무자에서 편평세포암 발생 — 결정형 유리규산(유리규소, 4번)이 원인으로, 규산은 IARC 1군 발암물질이며 규폐+폐암을 유발한다. 흡연력 10갑년은 상대적으로 적어 직업성 규산 노출이 주 원인. 표준지식으로 판단.","basis":"general"},{"id":176,"year":"2019","num":3,"q":"우리나라에서 가장 많은 비율을 차지하는 직업성 질환은?","c":["진폐증","정신질환","소음성 난청","근골격계 질환","뇌심혈관 질환"],"a":3,"prof":"김양우","theme":"소음·진동","unc":0,"src":"ai","expl":"강의록(PAGE 25): 소음성 난청은 한국 산업재해 인정 직업병 1위로 매년 인정 건수가 가장 많으므로 보기3이 정답이다.","basis":"lecture"},{"id":177,"year":"2019","num":4,"q":"전자제품을 세척하는 일을 하는 27세 남자가 입사 3개월 만에 목에 덩이가 만져져 병원에서 생검을 하였다. 진단 결과 비호지킨 림프종이 나와 산재보험을 신청했다. 업무상 재해 판정위원회는 직무와 연관성이 적다는 판단을 내렸다. 이유는?","c":["질병 종류","환자나이","환자 성별","유해물질의 종류","발병까지의 시간"],"a":5,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"ai","expl":"강의록 업무기인성: 입사 3개월은 림프종 잠복기로 너무 짧아 발병까지의 시간(5번)을 이유로 직무 연관성이 적다고 판정한다.","basis":"lecture"},{"id":178,"year":"2019","num":5,"q":"주물공장, 37.5도, 의식명료, 메스꺼움","c":["디아제팜 투여","해열제 투여","휴식","응급실로 급히 이송"],"a":3,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"주물공장·37.5도 미열·의식명료·메스꺼움은 자가한정적 금속열(metal fume fever) 양상으로, 강의록 카드뮴 슬라이드에서도 금속열은 발열·오한 후 회복되는 것으로 기술된다. 응급처치 불필요하고 휴식(3번)이 적절하다.","basis":"lecture"},{"id":179,"year":"2019","num":6,"q":"우리나라에서 가장 많은 업무상 재해는?","c":["감전","추락","폭발","파열"],"a":2,"prof":"박신구","theme":"산업보건·관리","unc":1,"src":"ai_uncertain","expl":"강의록(2018 산업재해 역학): 사고사망자는 '떨어짐(추락)'(38.7%)이 가장 많고 사고재해자는 '넘어짐(전도)'이 가장 많다. 본 문항 보기에는 전도/넘어짐이 없고 추락이 있으므로, 강의록상 추락(떨어짐)이 사망 재해 1위인 점에 근거해 추락(2번)이 정답이다. 단 사고 건수 1위는 넘어짐(전도)로 보기 구성상 유의.","basis":"lecture"},{"id":180,"year":"2019","num":7,"q":"가장 많은 직업성 피부질환은?","c":["접촉성 피부염","접촉성 두드러기","건선","직업성 여드름","백반증"],"a":1,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"pdf","expl":"가장 흔한 직업성 피부질환은 접촉성 피부염이다(정답 1).","basis":"general"},{"id":181,"year":"2019","num":8,"q":"산업재해보상보험제도의 원리로 옳은 것은?","c":["근로자에게 과실이 있을 때만 보상","근로자와 사업주가 공동부담","근로자 사망 당시 부양하고 있던 배우자를 우선순위로 하여 지급","사업주가 산재보험 미등록시 근로자는 산재보상을 받을 수 없음","근로자의 연령 직종 근무기간 등을 고려하여 산정액을 결정"],"a":3,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록 유족급여: 산재 유족급여는 근로자 사망 당시 부양하던 배우자 등을 우선순위로 지급한다(3번). 산재보험은 무과실책임(1번 오답)이고 사업주 전액부담(2번 오답)이며 미등록 시에도 근로자는 보상받을 수 있어(4번 오답) 나머지는 틀리다.","basis":"lecture"},{"id":182,"year":"2019","num":11,"q":"업무상 사유로 부상을 당하거나 질병에 걸린 근로자에게 요양으로 취업하지 못한 기간에 대해 지급하는 보험급여는 무엇인가?","c":["요양급여","휴업급여","장해급여","유족급여","간병급여"],"a":2,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록: 업무상 부상·질병으로 요양하여 취업하지 못한 기간에 지급하는 급여는 휴업급여(2번)이다.","basis":"lecture"},{"id":183,"year":"2019","num":12,"q":"다음 중 인간공학적 유해요인으로 알맞는 것은?","c":["고도","조도","진동","반복 작업","외상성 재해"],"a":4,"prof":"김양우","theme":"소음·진동","unc":0,"src":"pdf","expl":"강의록(학습목표/Part IV 및 인간공학적 부하): 반복 작업(보기4)은 근골격계 부담을 주는 대표적 인간공학적 유해요인이다. 진동도 물리적 유해요인이나 이 문항의 인간공학적 요인 정답은 반복 작업. 조도·고도·외상성 재해는 인간공학적 유해요인으로 부적절.","basis":"general"},{"id":184,"year":"2019","num":13,"q":"감압병에 의해 많이 발생하는 질병은?","c":["근골격계 질환","심혈관계 질환","호흡기계 질환","생식기계 질환","피부 질환"],"a":1,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"pdf","expl":"감압병(잠함병)은 질소 기포가 관절·뼈에 형성되어 관절통·무혈성 골괴사 등 근골격계 질환을 주로 일으킨다(정답 1).","basis":"general"},{"id":185,"year":"2019","num":14,"q":"40세 여성 근로자가 발작성 경련성 복통, 황달, 소변색 변화, 잔신 쇠약을 주소로 내원했다. 합성피혁을 재조하는 공장에서 근무한지 2개월이 됐고, 채용시 건강진단에서 정상 간기능 소견이 나왔다. 병원에서 수행한 간기능 검사에서 AST583 ALT539 GGT49. 입원 1일째 의식이 혼미해졌다. 원인 물질은 무엇인가?","c":["염화 비닐","이소프로필알코올","디메틸포름아마이드","다환적 방향적 탄화수소","메틸부틸케톤"],"a":3,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"합성피혁 제조에서 급성 전격성 독성간염(AST 583/ALT 539)과 간성혼수는 디메틸포름아마이드(DMF) 노출의 전형이다. 염화비닐·PAH·메틸부틸케톤은 이 급성 간부전 양상과 맞지 않음.","basis":"general"},{"id":186,"year":"2019","num":15,"q":"초보 잠수자가 30m의 수심에서 급히 수면으로 상승하였다. 수면 도착 후 수분이 경과되지 않아 의식 상실에 빠졌다. 가장 가능성이 높은 원인은 무엇인가?","c":["질소 마취","폐과확장증 - > 폐 과팽창증후군 선지겠죠?!","저산소증","동맥혈 기체 색전증","탄산가스 과다증"],"a":4,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"pdf","expl":"강의록: 30m 급상승 후 수 분 내 의식상실은 동맥혈 기체 색전증(4번)으로, 수면복귀 상승 중 또는 도착 후 10분 이내 발작·의식상실이 특징. 질소마취는 상승 후 가역 회복되므로 오답.","basis":"lecture"},{"id":187,"year":"2019","num":16,"q":"높은 고도에서 일어나는 생리변화 중 생존을 위협하는 가장 중요한 요소는 무엇인가?","c":["낮은 온도","낮은 압력","낮은 습도","낮은 산소분압","자외선 노출"],"a":4,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"pdf","expl":"강의록: 고고도 생존 위협의 가장 중요한 요소는 산소분압 저하. 낮은 산소분압(4번)이 정답.","basis":"lecture"},{"id":188,"year":"2019","num":17,"q":"40세 남성이 3개월 전부터 호흡이 나빠졌다. 최근에 더 나빠져서 내원하였다. 5년 전부터 악기 공장에서 일하였던 사람이었다. 가장 먼저 해야하는 검사는?","c":["Chest X ray","CT","특이 기관지 유발 검사","소변검사"],"a":3,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"악기(도장)공장 5년, 진행성 호흡곤란은 직업성 천식이 의심되며 확진에 특이 기관지유발검사가 가장 진단적이다. Chest X-ray·CT는 비특이적, 소변검사는 무관.","basis":"general"},{"id":189,"year":"2019","num":18,"q":"다음은 재해현황을 나타낸 표이다. 다음 중 강도율을 나타내는 지표는? 종업원수: 3000명 / 재해자수: 25명 / 작업시간: 3,000,000 / 재해건수: 10건 / 손해일수: 10,000일","c":["25/10*1,000","10/3,000*1,000","25/3,000*1,000","1,000/3,000,000*1,000","25/3,000,000*100,000"],"a":2,"prof":"박신구","theme":"산업보건·관리","unc":1,"src":"pdf","expl":"강의록: 강도율 = (작업손실일수/연작업시간)×1,000 = 10,000/3,000,000×1,000. 제시 보기 중 이 형태에 정확히 부합하는 것이 명확치 않아(1,000/3,000,000×1,000 등 표기 오류) 정답 2번(10/3,000×1000)은 강도율 공식과 불일치하여 애매하다.","basis":"lecture"},{"id":190,"year":"2019","num":21,"q":"다음 중 고온 순화 후 생리적 변화로 옳은 것은?","c":["심박수 감소","직장 온도 증가","땀 분비 속도 감소","땀의 염분 농도 증가","안드로겐 분비 감소"],"a":1,"prof":"박신구","theme":"기후·온열","unc":0,"src":"pdf","expl":"고온순화 후에는 심박수 감소, 직장온도 감소, 땀 분비 속도 증가, 땀의 염분 농도 감소(알도스테론↑로 염분 보존)가 일어나므로 '심박수 감소'가 옳다. 강의록에 세부 근거 없어 표준생리로 설명.","basis":"general"},{"id":191,"year":"2019","num":22,"q":"산업보건관리상 유해환경에서 작업하는 근로자에게 주기적으로 작업하는 근로자에게 주기적으로 적용하는 건강진단방법은?","c":["수시건강진단","임시건강진단","특수건강진단","일반건강진단","배치전건강진단"],"a":3,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록: 유해환경 작업 근로자에게 주기적으로 실시하는 건강진단은 특수건강진단(3번)이다(소음·진동·분진·유기용제·중금속 등 노출자 대상).","basis":"lecture"},{"id":192,"year":"2019","num":25,"q":"기관지 천식을 초래하는 물질은?","c":["암모니아","이산화황","오존","이소시아네이트","포름알데히드"],"a":4,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"이소시아네이트는 대표적 직업성 천식 유발(감작) 물질. 나머지 자극성 가스와 달리 천식 원인물질로 정답 4(이소시아네이트)가 맞음. 강의록 직접 근거 약해 표준지식 보완.","basis":"general"},{"id":193,"year":"2019","num":26,"q":"직업성 암 발생 중 흡연과의 상승작용이 가장 큰 것은?","c":["우라늄의 폐암","석면과의 중피종","석면과의 폐암","비소와의 폐암","크롬과의 폐암"],"a":3,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"직업성 발암 중 흡연과의 상승(승법)작용이 가장 큰 고전적 예는 석면-폐암이다(보기3). 석면-중피종은 흡연과 무관하다. id 22와 동일 문항.","basis":"general"},{"id":194,"year":"2019","num":27,"q":"IARC Group 1? 수은","c":["톨루엔","카페인","알콜","휴대폰",""],"a":3,"prof":"김양우","theme":"유해금속·가스","unc":1,"src":"ai","expl":"복원 오류 문항(발문 '수은'과 보기가 뒤섞임). IARC Group 1을 묻는 것으로 보이며 보기 중 알콜(에탄올, 음주)이 IARC 1군에 해당한다(보기3). 톨루엔·카페인·휴대폰은 1군이 아니다.","basis":"general"},{"id":195,"year":"2019","num":28,"q":"22 3 주말에는 괜찮아졌다 이 환자에게서 직업 관련성을 평가하기 위한 검사로. 알맞은 것은? 가슴 선 촬영","c":["X 가슴","CT 가래 호산구수","기관지 내시경","최대날숨유속검사",""],"a":4,"prof":"김환철","theme":"직업성암·발암물질","unc":1,"src":"ai","expl":"문항이 OCR로 심하게 손상됐으나 직업성 천식(주말에 호전되는 업무 관련 호흡기 증상)의 직업 관련성 평가에는 최대날숨유속(PEFR) 연속 측정이 유용하다(정답 4). 작업일-휴일 간 PEFR 변동을 확인.","basis":"general"},{"id":198,"year":"2019","num":45,"q":"면폐증의 진단으로 가장 중요한 것은?","c":["신체검진","병력청취","HRCT","흉부 X-ray","폐기능검사"],"a":2,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"면폐증(byssinosis)은 면·아마 분진 노출과 월요일 증상 악화(Monday feeling)가 특징으로, 진단에 가장 중요한 것은 직업력 중심의 병력청취(2번)다. 영상·폐기능은 보조적. 표준지식으로 판단.","basis":"general"},{"id":199,"year":"2019","num":46,"q":"광산이나 석탄분진 속 성분 중 폐섬유화를 동반한 진폐증, 폐암의 가장 직접적인 원인 물질은?","c":["베릴륨","카드뮴","석면","결정형 유리규산","라돈"],"a":4,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"석탄분진 중 폐섬유화·진폐·폐암의 직접 원인물질은 결정형 유리규산(4번)이다. 표준지식으로 판단하며 정답이 맞다.","basis":"general"},{"id":200,"year":"2019","num":47,"q":"김환철 교수님 47. 수은에 대한 설명으로 옳은 것은?","c":["유기수은은 피부, 점막, 호흡, 섭취를 통해 흡수되고 금속, 무기수은은 주로 소화기를 통해 흡수된다.","급성 중독이라 해도 노출 중단이 주요 치료이다.","수은을 다루는 일을 하기 전 필적검사, 정신검사를 하는 것이 도움이 된다.","BBB통과하고 수유할 때 젖을 통해 분비됨","납과 달리 말초신경계에는 영향을 끼치지 않는다."],"a":4,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록: 유기(메틸)수은은 호흡·소화·피부 모두로 흡수되어 BBB·태반을 통과하고 젖으로 분비된다(보기4 정답). 무기·금속수은은 주로 소화기/흡입으로 흡수되며 보기1은 흡수경로 서술이 부정확하다. 급성 무기수은 중독은 노출중단만으로 불충분(신부전 등 적극치료)하고, 수은도 말초신경계에 영향을 미치므로 보기2·5 오답.","basis":"lecture"},{"id":201,"year":"2019","num":48,"q":"김환철 교수님 48. 7세 남아, 창백, 복통으로 내원. 환약을 복용한 적 있다. X레이에서 long bone에 긴 선이 보인다. 혈액검사에서 감소하는 것?","c":["혈색소","ALA","ZPP","프로토포피린","망상적혈구수"],"a":1,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록: 납 중독(한약재 환약 복용, 장골 X-ray '납 선')에서 납은 헴 합성효소(ALAD·Ferrochelatase)를 억제해 헤모글로빈 합성을 저하시킨다. 따라서 감소하는 것은 혈색소(Hb)이며(보기1), ALA·ZPP·프로토포피린은 축적되어 증가하고 망상적혈구는 대개 상승한다.","basis":"lecture"},{"id":202,"year":"2019","num":49,"q":"만성 수은중독의 소견으로 맞는 것은?","c":["골다공증","용혈성 빈혈","비중격 궤양","피부궤양","치은염"],"a":5,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록: 만성 원소수은 중독의 고전적 3주징은 미세 떨림, Erethism(성격변화), 잇몸염·구내염(치은염)이다. 따라서 만성 수은중독 소견으로 치은염이 옳다(보기5). 비중격 궤양(6가 크롬), 피부궤양, 용혈성 빈혈은 수은 소견이 아니다.","basis":"lecture"},{"id":203,"year":"2019","num":50,"q":"금속광산에 채석공으로 15년간 근무한 남자가 흉통과 호흡곤란으로 내원하였다. 카드뮴 중독이 의심되었는데 가장 먼저 나타나는 소견은?","c":["소변 당 증가","소변 아미노산 증가","소변 알부민 증가","소변 b2-microglobulin 증가","소변 칼슘 증가"],"a":4,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"강의록 카드뮴 슬라이드: 카드뮴 만성 노출은 근위세뇨관을 먼저 손상시켜 저분자량 단백뇨(β2-microglobulin)가 가장 먼저·우선 나타나며, 알부민뇨(사구체 손상)는 늦게 나타난다고 명시. 따라서 요중 β2-microglobulin 증가(4번)가 정답.","basis":"lecture"},{"id":204,"year":"2019","num":52,"q":"30년간 도금업에 종사한 사람이 피부염에 걸려서 왔다. 옳은 것은?","c":["피부염은 재발의 가능성이 적다.","폐암 발생 가능성이 증가한다.","6가 크롬보다 3가 크롬의 독성이 더 심하다.","천식과는 무관하다.","통증성 궤양이 발생할 수 있다."],"a":2,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"ai","expl":"강의록: 6가 크롬 만성 노출은 폐암(IARC 1군) 위험을 증가시킨다(보기2 정답). 접촉피부염은 재발 위험이 크고(보기1 오답), 6가>3가 독성(보기3 오답), 직업성 천식과 관련되며(보기4 오답), 크롬 홀 궤양은 통증이 없어(보기5 오답) '통증성 궤양'은 틀리다.","basis":"lecture"},{"id":205,"year":"2019","num":53,"q":"차체 용접작업하고 있는 남자 근로자가 보행장애, 손발의 떨림, 행동 저하 등을 주소로 병원을 내원하였다. 내원 후 시행한 신경학적 검사에서 가면 양 얼굴, 수지 진전, 하지 감각 이상, 상하지 근력저하 및 보행장애, 행동 저하 등의 소견이 관찰되었다. 다음 중 진단을 위해 필요한 검사는?","c":["혈중 망간농도","혈중 카드뮴농도","혈중 수은농도","혈중 연 농도","혈중 크롬농도"],"a":1,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록: 차체 용접공에서 가면양 얼굴·수지 진전·보행장애 등 L-dopa 불응성 파킨슨 양 증후군은 망간 중독을 시사하므로 혈중 망간농도 검사가 필요하다(보기1). MRI T1 기저핵 고신호가 동반된다.","basis":"lecture"},{"id":206,"year":"2019","num":54,"q":"다음 유해가스 중 기전이 다른 것은?","c":["청산가스","황화수소","암모니아","일산화탄소","모두 같은 기전이다."],"a":3,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록: 청산가스(HCN)·황화수소(H₂S)·일산화탄소(CO)는 모두 산소 운반·이용을 차단하는 독성 질식제이나, 암모니아(NH₃)는 점막을 손상시키는 수용성 자극제로 기전이 다르다(보기3).","basis":"lecture"},{"id":207,"year":"2019","num":55,"q":"치킨집에서 치킨을 튀기는 아르바이트생이 의식을 잃고 쓰러진채 발견되었다. 원인을 찾기위해 유용한 검사는?","c":["소변 다핵방향족탄화수소 대사산물","소변 마뇨산","소변 메틸마뇨산","혈액 톨루엔","혈액 일산화탄소헤모글로빈"],"a":5,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록: 치킨 튀김(밀폐·연소 환경)에서 의식소실은 일산화탄소 중독을 의심하며 혈액 일산화탄소헤모글로빈(COHb) 측정이 유용하다(보기5).","basis":"lecture"},{"id":208,"year":"2019","num":56,"q":"N-hexane (노말헥산) 검출을 위해 시행하는 소변검사로 옳은 것은?","c":["소변 페놀","소변 TTCA","소변 마뇨산","소변 메틸마뇨산","소변 2,5-헥산디온"],"a":5,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"노말헥산(N-hexane)의 소변 대사산물 노출지표는 2,5-헥산디온이다. 페놀(벤젠)·TTCA(이황화탄소)·마뇨산(톨루엔)·메틸마뇨산(크실렌)은 오답.","basis":"general"},{"id":209,"year":"2019","n
