군이 의심된다(보기3 정답). 예후가 나쁘고 부정맥·간손상 동반 가능하며 직업환경의학 의뢰가 필요하므로 나머지는 오답.","basis":"general"},{"id":428,"year":"2022","num":20,"q":"[김환철] 휴대폰 공장에서 일함, 25세 여성, 하체에 힘이 빠져 걷기 힘들다. 이에 대한 설명으로 옳은 것은?","c":["운동신경은 소실되나 감각신경의 이상은 없다? (정확하진 않지만 두 신경 중 하나만 손상된다는 선지였습니다)","편측성이다.","노출 중단 시 회복되지 않는다.","시야위축, 시신경염, 색각기능 이상이 온다.","신경 독성은 중심성에서 원위부로 진행한다."],"a":4,"prof":"김양우","theme":"유기용제","unc":1,"src":"pdf","expl":"휴대폰 공장 세척(노말헥산) 하지 근력저하 신경병증은 양측성·대칭성이며, 노출 중단해도 초기에는 진행(coasting) 후 서서히 회복되는 축삭성 다발신경병증이다. 이 문항 정답 표시(보기4 '시야위축·시신경염·색각이상')는 메탄올 특징으로 노말헥산 신경병증과 맞지 않아 정답이 의심되나, 강의록에 노말헥산 신경병증 세부(양측성 등) 근거가 명확치 않아 정답 변경은 보류.","basis":"general"},{"id":429,"year":"2022","num":24,"q":"50세 남자 건설 노동자가 무더운 여름철에 휴식 없이 장시간 야외 작업 중 의식을 잃고 쓰러졌다. 피부는 뜨겁고 건조하였다. 진단으로 가장 적절한 것은?","c":["열경련","열부종","열사병","열실신","열탈진"],"a":3,"prof":"박신구","theme":"기후·온열","unc":0,"src":"pdf","expl":"장시간 폭염 야외작업 중 의식소실, 뜨겁고 건조한 피부(무한증)는 열사병의 전형이다. 열탈진·열실신은 고체온·건조무한증·의식소실을 함께 보이지 않아 감별된다. 강의록 세부 근거 없어 표준지식.","basis":"general"},{"id":430,"year":"2022","num":26,"q":"[박신구] 시차 증후군에 대하여 옳은 것을 고르시오","c":["시차 증후군 예방을 위하여 비행 중에 식사의 양을 늘인다.","시차 증후군은 날짜 변경선과 밀접한 관련이 있다.","한국에서 미국으로 여행할 때가 미국에서 한국으로 여행할 때보다 적응이 쉽다.","멜라토닌이 시차 증후군 극복에 도움이 된다.","영국에서 남아공으로 남북방향으로 움직일 때 시차 증후군이 잘 발생한다."],"a":4,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"pdf","expl":"강의록 참고에 시차증후군 관련 '멜라토닌, 광치료'가 명시되어 멜라토닌이 극복에 도움(4번)이 정답. 날짜변경선 무관(2번 오답), 동쪽이 더 힘들어 3번 오답, 북남 방향 미발생으로 5번 오답.","basis":"lecture"},{"id":431,"year":"2022","num":27,"q":"큰 재해나 사고가 일어나기 전에 반드시 작은 사고가 선행한다는 것을 보여주는 법칙은?","c":["하인리히이론","다수요인이론","도미노이론","인간요인이론","신도미노"],"a":1,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록 하인리히 법칙: 큰 재해 전에 반드시 작은 사고(1:29:300)가 선행한다는 법칙은 하인리히 이론(1번)이다.","basis":"lecture"},{"id":432,"year":"2022","num":28,"q":"평소 건장하시던 60세 김씨 할머니가 에베레스트를 등반하던 중 병원으로 호송되었다. 가장 가능성 이 높은 원인 질환은?","c":["뇌경색","뇌출혈","폐부종","급성신부전","폐색전증"],"a":3,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"pdf","expl":"강의록: 2,400m 이상 고지대에서 저산소증으로 인한 폐혈관 수축·폐고혈압으로 고지대폐부종이 발생. 에베레스트 등반 중 호송된 원인으로 폐부종(3번)이 가장 가능성 높음.","basis":"lecture"},{"id":433,"year":"2022","num":29,"q":"다음 중 하루의 작업시간 동안에 순간적으로라도 초과해서는 안되는 ㄴ 농도를 뜻하는 단어는?","c":["TLV-TWA","TLV-STEL","TLV-C","BEI","PEL"],"a":3,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록: 하루 작업시간 동안 순간적으로라도 초과해서는 안 되는 최고농도는 천정치 TLV-C(3번)이다.","basis":"lecture"},{"id":435,"year":"2022","num":33,"q":"체온 조절에 대한 생리적 기전이 올바르게 연결된 것은?","c":["저체온 – TSH 분비 증가","저체온 – 호흡 촉진","저체온 – 몸의 떨림 감소","고체온 – 근육 긴장","고체온 – 교감신경 활성화"],"a":1,"prof":"박신구","theme":"기후·온열","unc":0,"src":"pdf","expl":"추울 때 열 생산을 위해 TSH(→갑상선호르몬) 분비가 증가하므로 '저체온-TSH 분비 증가'가 옳다. 저체온시 떨림 증가(감소 아님), 호흡·근긴장 관련 보기는 방향이 부적절. 강의록 직접 근거 없어 표준생리로 설명.","basis":"general"},{"id":436,"year":"2022","num":35,"q":"소음이 심한 작업장에서 일하는 근로자에 한해 시행하는 청력 검사 중 3분법을 바탕으로 한 청력 손실 정도는? 소리의 크기(Hz) 250 500 1000 2000 4000 8000 청력손실정도(dB) 10 25 25 40 60 40","c":["15","20","30","35","50"],"a":3,"prof":"김양우","theme":"소음·진동","unc":0,"src":"pdf","expl":"3분법=(a+2b+c)/4=(25+2×25+40)/4=115/4=28.75≈30이므로 보기3(30)이 정답. 4000·8000Hz는 3분법 계산에 미포함.","basis":"lecture"},{"id":437,"year":"2022","num":37,"q":"환자는 합성피혁을 제조하는 공장에 입사한지 2개월 되었고, 배치 전 건강검진에서는 정상 간기능 소 견을 보였다. 내원당시 수행한 간기능 검사에서 AST 583, ALT 539, GGT 49 IU였고, 입원 1일째 의식이 혼미해 졌다. 다음 중 가장 의심되는 원인 물질은?","c":["염화비닐","이소프로필 알코올","다환적 방향족 탄화수소","디메틸포름아마이드","메틸부틸케톤"],"a":4,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"합성피혁 제조 급성 독성간염(AST 583/ALT 539)+간성혼수는 디메틸포름아마이드(DMF)의 전형이며 보기4가 정답 위치이다. 나머지 물질은 이 급성 전격성 간염 양상과 부합하지 않음.","basis":"general"},{"id":438,"year":"2022","num":40,"q":"신발공장에서 일하면서 접착제를 사용하는 근로자. 양 다리 감각과 근력 저하의 원인은?","c":["벤젠","톨루엔","트리클로로에틸렌","노말헥산","이황화탄소"],"a":4,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"신발공장 접착제 사용자의 양 다리 감각·근력저하(대칭성 말초신경병증) 원인은 노말헥산이다(강의록 이독성 용제 및 흡입제 목록에 hexane 신경병증 언급). 벤젠(조혈)·톨루엔(중추/부정맥)·TCE·이황화탄소보다 접착제 신경병증의 대표 원인.","basis":"lecture"},{"id":439,"year":"2022","num":41,"q":"DPSEEA의 P 항목에 해당하지 않는 보기는?","c":["인구 증가","경제 개발","기술 발전","폐기물 배출","질병 이환 증가"],"a":4,"prof":"임종한","theme":"환경오염·지구환경","unc":1,"src":"pdf","expl":"DPSEEA 모형에서 P(Pressure)는 생산·소비·배출 증가로, 보기 중 '폐기물 배출'이 P에 해당한다. 문항은 P에 '해당하지 않는' 것을 묻는데 정답이 4번(폐기물 배출)으로 되어 있어 문제-정답 정합성이 맞지 않는다(인구증가·경제개발·기술발전은 Driving force, 질병이환은 Effect). 강의록만으로 단일 정답을 확정하기 어려워 유보.","basis":"lecture"},{"id":440,"year":"2022","num":43,"q":"두 개 이상의 물질이 혼합될 때 독성이 없던 한 물질이 다른 물질과 만나 독성 을 가지게 되는 효과는?","c":["길항 효과(antagonistic effect)","상승 효과(synergistic effect)","잠재 효과(potential effect)","상가 효과(additive effect)","독립 효과(independent effect)"],"a":3,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"pdf","expl":"독성이 없던 물질이 다른 물질과 만나 독성을 갖게 되는 것은 잠재(potentiating) 효과다. 강의록(2주차) 혼합물폭로에 열거되어 있으며 현재 정답 2번(상승효과)은 틀렸고 정답은 3번(잠재효과).","basis":"lecture"},{"id":441,"year":"2022","num":44,"q":"다음 중 환경오염으로 발생하는 사망과 장애를 포괄하는 개념은?","c":["중대재해","유병률","질병부담","생존률","복합이완률"],"a":3,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"환경오염으로 발생하는 사망과 장애를 포괄하는 개념은 질병부담(3번)이다. 강의록 직접 근거는 없어 표준지식으로 판단.","basis":"general"},{"id":442,"year":"2022","num":46,"q":"말라리아 및 뎅기열의 증가, 슈퍼 태풍의 발생, 사막화 및 황사 발생 등의 피해가 야기되는 근본적인 원인은?","c":["수질오염","대기오염","기후변화","폐기물 오염","유해화학물질 오염"],"a":3,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록: 말라리아·뎅기열, 슈퍼태풍, 사막화·황사의 근본 원인은 기후변화. 정답 기후변화(3번).","basis":"lecture"},{"id":443,"year":"2022","num":47,"q":"비료, 육가공류에서 나오는 물질로 영아 청색증후군을 유발하는 물질은?","c":["질산성 질소","암모니아성 질소","페놀","벤젠","트리할로메탄류"],"a":1,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"비료·육가공(질산염 첨가)에서 유래해 지하수 오염 시 영아 메트헤모글로빈혈증(청색증, blue baby syndrome)을 일으키는 물질은 질산성 질소이다. 강의록에 직접 근거는 없어 표준지식으로 판단. 암모니아성 질소·페놀·벤젠·트리할로메탄은 영아 청색증의 원인 아님.","basis":"general"},{"id":444,"year":"2022","num":49,"q":"다음 중 환경오염으로 발생하는 사망과 장애를 포괄하는 개념은?","c":["생존률","질병부담","중대재해","복합 이환률","유벙률"],"a":2,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"환경오염으로 발생하는 사망과 장애를 포괄하는 개념은 질병부담이며, 본 문항 보기 배열상 정답 2번에 해당한다.","basis":"general"},{"id":445,"year":"2022","num":51,"q":"기후변화로 이대로 탄소 배출이 이루어지면 지구 생태계는 회복불능의 상태에 빠질 것으로 예상됩니다. 이렇게 되지 않기 위해서 전문가들은 탄소 배출량을 제로(탄소 중립)으로 만들 것을 제안했는데, 우리나라도 최근 선언한 탄소 배출 제로 연도는 언제인가?","c":["2030년","2035년","2040년","2045년","2050년"],"a":5,"prof":"임종한","theme":"위해성평가·온난화","unc":0,"src":"pdf","expl":"강의록: 넷 제로(온실가스 순 배출 0)의 목표 연도로 우리나라를 포함한 주요국이 2050년을 선언했으므로 5번(2050년)이 옳다.","basis":"lecture"},{"id":446,"year":"2022","num":53,"q":"감염형 식중독을 일으키는 것은?","c":["포도상 구균","호염균","보툴리누스","Clostridium","비브리오"],"a":2,"prof":"임종한","theme":"식품오염·식중독","unc":0,"src":"pdf","expl":"강의록 분류상 감염형 식중독은 살모넬라·호염균·장구균이며, 호염균은 곧 호염성 비브리오(장염비브리오) 계열의 감염형이다. 보기 중 감염형은 2번 호염균이고 나머지(포도상구균·보툴리누스·Clostridium)는 독소형이므로 정답 2번.","basis":"lecture"},{"id":447,"year":"2022","num":54,"q":"다음 중 우리나라에서 가장 많은 질병부담을 차지하고 있는 것은?","c":["흡연","음주","식품","대기오염","신체활동 부족"],"a":1,"prof":"김양우","theme":"방사선·대기오염","unc":1,"src":"ai_uncertain","expl":"우리나라 질병부담(DALY) 1위 위험요인은 흡연으로 알려져 있음(1번). 음주·식습관·대기오염·신체활동 부족보다 기여도가 큼. 강의록에 직접 순위 근거가 없어 표준지식으로 판단하며 원 문항도 불확실 표시.","basis":"general"},{"id":448,"year":"2022","num":56,"q":"다음 중 방사선에 가장 민감성을 보이는 신체부위는?","c":["타액선","고환 세포","혈관 내 세포","위장관 상피 세포","췌장 세포"],"a":2,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(방사선): 세포분열이 왕성한 조직이 방사선에 민감. 보기 중 생식세포인 고환세포(2번)가 가장 민감(Bergonié-Tribondeau). 타액선·혈관내피·췌장은 상대적으로 저항성.","basis":"lecture"},{"id":449,"year":"2022","num":58,"q":"~~~.라디오파의 발암등급은?","c":["1등급","2A등급","2B등급","C등급","분류 할 수 없음"],"a":3,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(방사선): 라디오파(RF)·마이크로파 전자기장은 IARC group 2B(possible carcinogen, 2011)로 분류. 정답 2B등급(3번).","basis":"lecture"},{"id":450,"year":"2022","num":59,"q":"우리나라 대기오염 물질 중 조기사망에 가장 큰 영향을 미치는 것은?","c":["아황산가스","오존","미세분진","이산화질소","일산화탄소"],"a":3,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(대기오염): 초미세먼지(PM2.5) 등 미세분진이 조기사망(폐암·심혈관)에 가장 큰 영향을 미침. 정답 미세분진(3번).","basis":"lecture"},{"id":451,"year":"2022","num":60,"q":"반응성이 매우 높고 호흡기계를 자극하며 폐기능 감소와 천식 악화를 일으키는 것은?","c":["벤젠","아황산가스","일산화탄소","이산화탄소","오존"],"a":5,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록(오존): 오존은 반응성이 매우 높은 저수용성 산화성 자극제로 폐기능 감소와 천식 악화를 일으킨다. 정답 ⑤ 오존. 벤젠은 조혈독·발암, CO는 질식제, CO₂는 단순 질식제로 취지에 부합하지 않음.","basis":"lecture"},{"id":452,"year":"2023","num":1,"q":"30년간 터널 굴착공으로 일한 60세 남자이다. 흉부 방사선 촬영에서 양쪽 림프절이 커져 있고 다발성 결절이 발견되었다. 소견은?","c":["석면폐","규폐증","활석폐증","면폐증","폐암"],"a":2,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"30년 터널 굴착공에서 양쪽 폐문 림프절 비대(계란껍질 석회화)와 다발성 결절은 규폐증(2번)의 전형적 소견이다. 굴착은 규산 노출 작업. 표준지식으로 판단.","basis":"general"},{"id":453,"year":"2023","num":2,"q":"다음 중 연구설계 단계에서 다른 요인의 노출과 삐뚤림을 배제할 수 있는 연구는?","c":["실험연구","환자-대조군연구","코호트연구","사례군연구","생태학적연구"],"a":1,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"pdf","expl":"강의록(2주차)에 실험연구는 연구자가 노출 상황을 결정하고 삐뚤림 요인을 미리 통제하는 연구라 명시되어 있다. 따라서 정답은 1번 실험연구.","basis":"lecture"},{"id":455,"year":"2023","num":4,"q":"실내공기질관리법상 실내공기질 유지기준 오염물질이 아닌 것은?","c":["총부유세균","미세먼지","포름알데히드","이산화탄소","오존"],"a":5,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"ai","expl":"실내공기질관리법 유지기준 오염물질은 미세먼지·이산화탄소·포름알데히드·총부유세균·일산화탄소 등이며, 오존은 유지기준이 아닌 권고기준 항목. 정답 오존(5번). 강의록 근거 없어 법령 기준 표준지식 적용.","basis":"general"},{"id":456,"year":"2023","num":5,"q":"중금속 중 태반 통과하는 물질은?","c":["납","수은","카드뮴","비소","모두 해당"],"a":5,"prof":"김양우","theme":"유해금속·가스","unc":1,"src":"ai_uncertain","expl":"강의록상 납과 메틸수은은 태반을 명확히 통과하며 비소도 태반 통과가 알려져 있으나, 카드뮴은 태반 이행이 잘 안 되는(태반 장벽에 축적) 물질로 통상 기술된다. 따라서 '모두 해당(⑤)'은 강의록 근거로 단정하기 어렵다. 원래 정답이 unc로 표기되어 있고 강의록에 4물질의 태반통과를 일괄 확정하는 서술이 없어 불확실.","basis":"lecture"},{"id":457,"year":"2023","num":6,"q":"플라스틱 제조 위해 스테아린산납 배합하던 40대 남성이 내원. 호소하는 증상은?","c":["코중격천공","빈혈","간효소 급격한 상승","안면홍반","안면마비"],"a":2,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록(납): 스테아린산납 배합 작업(플라스틱 안정제)은 만성 납 노출로, 대표적 호소 증상은 heme 합성 억제에 의한 빈혈(과 복통)이다. 정답 ②. ①코중격천공은 6가 크롬, ③급격한 간효소 상승·④안면홍반·⑤안면마비는 납의 전형 소견 아님.","basis":"lecture"},{"id":458,"year":"2023","num":7,"q":"금속광산에서 채석공으로 15년째 일하는 40세 남성이 흉통과 호흡곤란을 호소했다. 카드뮴 중독으로 의심되고 가장 먼저 나타나는 증상은?","c":["요중 당 수치 증가","요중 아미노산 수치 증가","요중 알부민 수치 증가","요중 B2-microglobulin 수치 증가","요중 칼슘 수치 증가"],"a":4,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"강의록 카드뮴 슬라이드 기준: 만성 카드뮴 노출은 근위세뇨관 손상으로 요중 β2-microglobulin 증가(4번)가 가장 먼저 나타난다. 정답이 맞다.","basis":"lecture"},{"id":459,"year":"2023","num":8,"q":"용접작업을 하는 중년 남성, 보행장애, 손발떨림, 행동저하를 주소로 내원하였다. 신경학적 검사에서 가면양얼굴, 수지신전, 하지감각이상 등의 소견을 보였다. 어떤 물질에 의한 것인가?","c":["망간","카드뮴","납","비소","수은"],"a":1,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록(망간): 용접작업자의 가면양얼굴·수지진전·보행장애·하지감각이상은 용접봉 흄 흡입에 의한 망간 중독(Manganism, L-dopa 불응성 파킨슨증)이다. 정답 ① 망간.","basis":"lecture"},{"id":460,"year":"2023","num":9,"q":"내분비장애물질과 인체영향과의 연결이 옳은 것은?","c":["DDT - 생리이상, 발달저하, 미숙아","프탈레이트 - 남성 생식기 결함 증가, 신경발달장애","비스페놀-A(BPA) - 정자수 감소, 성조숙증","PCBs - 피부암, 갑상선기능 문제, 불임","모두 해당"],"a":5,"prof":"김환철","theme":"내분비장애물질","unc":0,"src":"pdf","expl":"396번과 동일 논지로, 강의록상 DDT·프탈레이트·BPA·PCBs의 인체영향 연결이 모두 성립하므로 '모두 해당'(5번)이 정답.","basis":"lecture"},{"id":461,"year":"2023","num":10,"q":"다음 중 코팅 프라이팬에 쓰이는 물질로 고지혈증, 갑상선장애, 궤양성대장염, 신장 및 고환암, 영유아의 발달장애(학습 및 행동), 임신성고혈압, 면역기능 저하, 생식능력 감소 등이 보고된 물질은?","c":["Dioxin","농약","PFASs","비스페놀A","프탈레이트"],"a":3,"prof":"김환철","theme":"내분비장애물질","unc":0,"src":"pdf","expl":"강의록(PAGE 16)에서 과불화화합물(PFASs)은 코팅 프라이팬·포장지에 쓰이며 고지혈증, 갑상선장애, 궤양성대장염, 신장·고환암, 영유아 발달장애, 임신성고혈압, 면역기능 저하, 생식능력 감소 등이 보고된다고 문구까지 일치하므로 정답은 PFASs.","basis":"lecture"},{"id":462,"year":"2023","num":11,"q":"잔류성 유기오염물질에 대한 설명으로 옳은 것은?","c":["잔류성과 축적성을 갖는 이유는 할로겐 원자가 전기음성도가 높아 강한 결합력을 갖기 때문이다.","전통적 잔류 유기오염물질은 현재 거의 존재하지 않는다.","환경에만 잔류하기 때문에 상대적으로 먹거리나 생활환경에서는 안심할 수 있다.","기존 물질을 대신하는 대체물질은 위해성 정보가 충분하기 때문에 안심할 수 있다.","연령에 따라 축적되므로 영유아는 민감집단에서 후순위다."],"a":1,"prof":"김환철","theme":"내분비장애물질","unc":0,"src":"pdf","expl":"강의록(PAGE 22)에서 POPs의 잔류·축적성은 할로겐 원자가 치환된 안정한 탄소-할로겐 결합에 기인한다고 설명하므로 1번이 옳다. 나머지 보기는 강의록 서술과 반대다.","basis":"lecture"},{"id":463,"year":"2023","num":12,"q":"다음 중 하부호흡기에 작용하며 폐부종, 세기관지협착증을 일으킬 수 있는 물질은?","c":["암모니아","염소","아황산가스","포스겐","불화수소"],"a":4,"prof":"임종한","theme":"식품오염·식중독","unc":0,"src":"pdf","expl":"포스겐은 수용성이 낮아 상기도를 자극하지 않고 하부호흡기 폐포까지 도달해 지연성 폐부종·세기관지 손상을 일으킨다. 강의록에 직접 서술은 없으나 표준지식상 정답 4번 포스겐(암모니아·염소·아황산가스·불화수소는 수용성이 커 상기도 자극이 두드러짐).","basis":"general"},{"id":464,"year":"2023","num":13,"q":"겨울철 야외에서 숯불난로를 피우고 잠자던 남성이 혼수상태로 응급실에 내원하였다. 검사결과 COHb는 40%로 측정되었다. 치료로 가장 적절한 것은?","c":["수액투여","고압산소요법","amyl nitrate 흡입","베타차단제","경과관찰"],"a":3,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록(CO 치료): 숯불난로 연소로 인한 COHb 40% 혼수 환자에게는 고압산소요법이 적절하다. 정답 ②. amyl nitrate는 시안, 베타차단제는 흡입제 남용시 고려 사항이므로 부적절.","basis":"lecture"},{"id":465,"year":"2023","num":14,"q":"양돈농장에 정화조를 청소하기 위해 들어간 2명의 노동자가 두통을 호소하다 사망하였다. 노출물질로 가장 가능성 있는 것은?","c":["황화수소","메틸브로마이드","아르신","포스핀","시안화물"],"a":1,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"ai","expl":"강의록(황화수소): 양돈농장 정화조(유기물 분해)는 H₂S 발생 현장으로, 두통을 호소하다 집단 사망하는 전형적 밀폐공간 H₂S 사고이다. 정답 ① 황화수소.","basis":"lecture"},{"id":466,"year":"2023","num":15,"q":"DNA와 직접 작용하지 않지만 비유전적 손상을 일으키며 일정 농도 이하에서는 암 발생에 영향을 미치지 않는 특성을 갖는 물질은?","c":["개시자(initiator)","촉진자(promoter)","억제자","돌연변이 유발자","증식 조절자"],"a":2,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"ai","expl":"DNA와 직접 작용하지 않고 비유전적 손상·역치 존재 특성을 갖는 것은 촉진자(promoter)이다(정답 2). 강의록 발암기전(개시 vs 촉진) 근거.","basis":"lecture"},{"id":467,"year":"2023","num":16,"q":"톨루엔, 염화메틸 등 유기용제를 취급하는 근로자가 작업 중 현기증, 심계항진이 자주 발생했으며, 최근에는 실신하였다. 진단을 위해 우선 고려해야 할 검사는?","c":["폐기능검사","24시간 심전도","산소포화도","심박동변이","24시간 혈압측정"],"a":2,"prof":"김양우","theme":"유기용제","unc":0,"src":"ai","expl":"톨루엔·염화메틸 등 유기용제는 심근을 카테콜아민에 민감하게 하여 부정맥·실신을 유발(강의록 sudden sniffing death 기전)하므로 발작성 부정맥/실신 규명에 24시간 심전도(Holter)가 우선.","basis":"lecture"},{"id":469,"year":"2023","num":19,"q":"신발공장에서 일하는 여성이 몸에 이상을 느껴 내원하였다. 옳은 것은?","c":["신경독성은 다발성, 원위부에서 중심부로 일어난다.","신경섬유 조직검사 소견상 특이사항 없다.","근육 관련이며 신경과는 관련 없다.","한쪽에만 생긴다.","감각은 온전하다."],"a":1,"prof":"김양우","theme":"유기용제","unc":0,"src":"ai","expl":"신발공장 접착제(노말헥산) 신경병증은 원위부에서 중심부로 진행하는 대칭성 다발성 감각운동 신경병증이다(보기1 정답). 신경 조직검사는 이상소견(축삭변성)을 보이고, 근육이 아닌 신경병증이며 감각도 침범하므로 나머지는 오답.","basis":"general"},{"id":470,"year":"2023","num":20,"q":"휴대폰 구조체를 만드는 공장에서 투명한 액체로 기름때를 닦아내는 역할을 맡은 25세 여성이 하지에 갑자기 힘이 빠져 걷기 힘들다. 이에 대한 설명으로 옳은 것은?","c":["감각신경이 대부분 소실되며 운동신경의 이상은 없다.","양측성이다.","노출 중단 시 회복되지 않는다.","신경독성이 중심성에서 원위부로 진행한다.","시야위축, 시신경염, 색각기능 이상 등이 오지 않는다."],"a":2,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"휴대폰 세척(노말헥산) 하지 근력저하 신경병증은 양측성·대칭성이다(보기2 정답). 감각·운동 모두 침범, 노출 중단 시 회복 가능(초기 coasting 후), 원위부에서 근위부로 진행하며, 시신경 증상(메탄올 특징)은 없으므로 나머지는 오답.","basis":"general"},{"id":471,"year":"2023","num":21,"q":"잠수병은 잠수 시에 조직에 과포화되었던 불활성 기체가 급부상하면서 폐를 통하여 배출하지 못하고 기포를 형성하면서 발생하는 것으로 생각된다. 그 치료법 가운데 기포 제거에 가장 효과가 있을 것으로 생각되는 것은?","c":["재가압","급격감압","스테로이드 투여","수액 정맥주사","산소 흡입"],"a":1,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"pdf","expl":"강의록: 감압병 치료는 재가압산소요법. 보기 순서상 재가압이 1번이므로 정답 1번이 맞다. 급격감압(2번)은 오답 함정.","basis":"lecture"},{"id":472,"year":"2023","num":23,"q":"고온순화에 걸리는 시간은?","c":["하루","1주","2주","4주","8주"],"a":3,"prof":"박신구","theme":"기후·온열","unc":0,"src":"pdf","expl":"고온순화는 대개 약 2주에 걸쳐 완성되므로 '2주'가 정답이다. 강의록에 순화 기간 세부 근거는 없어 표준지식으로 판단.","basis":"general"},{"id":473,"year":"2023","num":24,"q":"50세 남자 건설노동자가 무더운 여름철에 휴식 없이 장기간 야외작업 중 의식을 잃고 쓰러졌다. 피부는 뜨겁고 건조하였다. 진단으로 가장 적절한 것은?","c":["열경련","열부종","열사병","열실신","열탈진"],"a":3,"prof":"박신구","theme":"기후·온열","unc":0,"src":"pdf","expl":"폭염 야외작업 중 의식소실 및 뜨겁고 건조한 피부(무한증)는 열사병이다. 다른 열질환은 고체온·건조·의식소실을 함께 나타내지 않는다. 강의록 세부 근거 없어 표준지식.","basis":"general"},{"id":474,"year":"2023","num":25,"q":"다음 중 산업재해에 대한 예방대책으로 가장 중요한 것은?","c":["안전한 작업조건","의료 구급제도","적절한 보상","적정배치","안전훈련"],"a":1,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록: 산업재해 예방에 가장 중요한 것은 안전한 작업조건 확보(1번)이다.","basis":"lecture"},{"id":475,"year":"2023","num":26,"q":"시차 증후군에 대하여 옳은 것을 고르시오.","c":["시차 증후군 예방을 위하여 비행 중에 식사의 양을 늘인다.","시차 증후군은 날짜 변경선과 밀접한 관련이 있다.","한국에서 미국으로 여행할 때가 미국에서 한국으로 여행할 때보다 적응이 쉽다.","멜라토닌이 시차 증후군 극복에 도움이 된다.","영국에서 남아공으로 남북 방향으로 움직일 때 시차 증후군이 잘 발생한다."],"a":4,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"pdf","expl":"강의록 참고에 '멜라토닌, 광치료'가 명시되어 멜라토닌이 시차증후군 극복에 도움(4번)이 정답. 날짜변경선 무관, 동쪽이 더 힘듦, 북남 방향 미발생으로 2·3·5번 오답.","basis":"lecture"},{"id":476,"year":"2023","num":27,"q":"큰 재해나 사고가 일어나기 전에 반드시 작은 사고가 선행한다는 것을 보여주는 법칙은?","c":["하인리히 이론","다수요인 이론","도미노 이론","인간요인 이론","신도미노 이론"],"a":3,"prof":"박신구","theme":"산업보건·관리","unc":1,"src":"ai","expl":"강의록 하인리히 법칙: 큰 사고 전에 반드시 작은 사고가 선행함을 보여주는 법칙은 하인리히 이론이며, 본 보기 배열상 정답은 1번(하인리히 이론)이어야 한다. 현재 정답 3번(도미노 이론)은 문항 취지와 불일치하나, 도미노 이론도 사고 연쇄를 다루므로 출제 의도상 애매하여 수정은 보류한다.","basis":"lecture"},{"id":477,"year":"2023","num":28,"q":"평소 건장하시던 50세 김씨 할머니가 에베레스트를 트레킹하던 중 병원으로 호송되었다. 가장 가능성이 높은 원인 질환은?","c":["뇌경색","뇌출혈","폐부종","급성신부전","폐색전증"],"a":3,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"pdf","expl":"강의록: 고지대(2,400m 이상)에서 저산소증에 의한 고지대폐부종 발생. 에베레스트 트레킹 중 호송 원인으로 폐부종(3번)이 정답.","basis":"lecture"},{"id":479,"year":"2023","num":33,"q":"직업성 암의 특성에 관한 내용 중 옳은 것은?","c":["비직업성 암종보다 고연령층에서 발생한다.","유발 잠복기간은 다양하지만 대부분 10년 미만이다.","혈액암이 직업성 암종 중 가장 흔하다.","일반 주민들의 같은 부위에 생기는 암과 사망률이 비슷하다.","발암물질 노출력에 대한 조사가 무엇보다 중요하다."],"a":5,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"ai","expl":"직업성 암은 발암물질 노출력 조사가 무엇보다 중요하다(정답 5). 나머지는 직업성 암 특성에 대한 반대 서술이라 오답.","basis":"general"},{"id":480,"year":"2023","num":34,"q":"산업재해보상보험법에 관한 설명 중 옳은 것은?","c":["사업장에 임의 근무자 2명 이상이면 가입하여야 한다.","사업주가 보험료를 전적으로 부담한다.","과실책임주의 원칙을 따른다.","산업재해보상보험은 가입이 자유롭다.","휴양급여는 80%를 지급한다."],"a":2,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"[정답 수정: 3번→2번] 강의록: 산재보상보험은 과실책임주의가 아닌 무과실책임주의를 따른다. 따라서 '과실책임주의 원칙을 따른다(3번)'는 오히려 틀린 설명으로, 정답 표기 3번은 의문이다. 강의록상 옳은 보기는 '사업주가 보험료를 전적으로 부담(2번)'이다.","basis":"lecture","a_orig":3},{"id":482,"year":"2023","num":36,"q":"2018년 한 사업장의 재해현황이다. 다음 중 강도율을 나타낸 것은? (종업원수 3,000명 / 재해자수 25명 / 연 근로시간 3,000,000 / 재해건수 10건 / 손실일수 10,000일)","c":["(10,000/3,000,000)×1000","(10/3,000)×1000","(25/3000)×1000000","(25/3000)×1000000","(10/3,000,000)×1000000"],"a":1,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록: 강도율 = (손실일수/연작업시간)×1,000 = (10,000/3,000,000)×1000. 보기 1번이 이 형태와 일치하여 정답이다.","basis":"lecture"},{"id":483,"year":"2023","num":37,"q":"환자는 합성피혁을 제조하는 공장에 입사한 지 2개월 되었고, 배치전 건강검진에서는 정상 간기능 소견을 보였다. 내원 당시 수행한 간기능 검사에서 AST 583, ALT 539, GGT 49 IU이었고, 입원 1일째 의식이 혼미해졌다. 다음 중 가장 의심되는 원인 물질은?","c":["염화비닐","이소프로필 알코올","다환적 방향족 탄화수소","디메틸 포름아마이드","메틸부틸케톤"],"a":4,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"합성피혁 제조 급성 독성간염(AST 583/ALT 539)+간성혼수는 디메틸포름아마이드(DMF)이며 보기4가 정답 위치이다. 나머지는 부합하지 않음.","basis":"general"},{"id":484,"year":"2023","num":38,"q":"자극 접촉피부염과 알레르기 접촉피부염을 감별하기 위해 필요한 검사는?","c":["혈액검사","첩포검사","폐활량검사","흉부방사선 검사","대사산물 검사"],"a":2,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"pdf","expl":"자극성 접촉피부염과 알레르기성 접촉피부염 감별에는 첩포검사(patch test)가 필요하다(정답 2). 강의록의 감작·유기용제 피부질환 진단 맥락과 일치.","basis":"lecture"},{"id":485,"year":"2023","num":39,"q":"다음 중 IARC Group 1 발암물질인 것은?","c":["수은","톨루엔","카페인","알코올","휴대폰 전자파"],"a":4,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"pdf","expl":"IARC Group 1 물질은 알코올이다(정답 4). 수은·톨루엔은 해당 없음, 카페인 Group 3, 휴대폰전자파 2B.","basis":"general"},{"id":486,"year":"2023","num":40,"q":"벤젠 중독이 의심되는 남성, WBC 감소와 빈혈을 확인하였다. 추후 검사는?","c":["요중 뮤콘산","요중 메틸뮤콘산","요중 마뇨산","신경 전도 검사","골수 검사"],"a":1,"prof":"김양우","theme":"유기용제","unc":0,"src":"ai","expl":"벤젠 중독(WBC 감소·빈혈, 골수억제) 확인을 위한 노출 지표는 요중 뮤콘산(t,t-muconic acid)이다. 마뇨산(톨루엔)·신경전도검사는 무관하고 골수검사는 노출 확인용이 아니며, '메틸뮤콘산'은 존재하지 않는 항목.","basis":"general"},{"id":487,"year":"2023","num":41,"q":"물질의 대사과정에 대한 설명이다. Phase I에 해당하는 반응은?","c":["산화(oxidation)","아세틸화(acetylation)","메틸화(methylation)","접합(conjugation)","아폽토시스(apoptosis)"],"a":1,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"pdf","expl":"강의록(2주차) 대사 Phase I 반응은 oxidation·reduction·hydrolysis이다. 아세틸화·메틸화·접합은 Phase II이므로 정답은 1번(산화).","basis":"lecture"},{"id":488,"year":"2023","num":44,"q":"알마아타 선언에서 제시한 일차보건의료의 필수요소가 아닌 것은?","c":["예방접종","모자보건서비스","흔한 질병 치료","심신장애인 재활","풍토병 예방관리"],"a":4,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"ai","expl":"알마아타 선언 일차보건의료 필수요소에는 예방접종, 모자보건, 흔한 질병치료, 풍토병 관리 등이 포함되나 '심신장애인 재활'은 포함되지 않는다. 강의록 근거는 없어 표준지식 기준 정답 4번이 맞다.","basis":"general"},{"id":489,"year":"2023","num":45,"q":"다음 중 환경오염으로 발생하는 사망과 장애를 포괄하는 개념은?","c":["중대재해","유병률","질병부담","생존률","복합이환률"],"a":3,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"ai","expl":"환경오염으로 발생하는 사망과 장애를 포괄하는 개념은 질병부담(3번)이다. 강의록 직접 근거는 없어 표준지식으로 판단.","basis":"general"},{"id":490,"year":"2023","num":46,"q":"물의 오염 정도를 나타낸 것으로, 유기물을 산화제로 산화하는 데 필요한 산소량은?","c":["용존산소량(DO)","부유물질(SS)","산소이온농도(OC)","화학적 산소요구량(COD)","생물학적 산소요구량(BOD)"],"a":4,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"ai","expl":"유기물을 산화제로 산화하는 데 필요한 산소량은 화학적 산소요구량(COD)이다. 강의록(3주차) 수질오염 지표에 BOD와 COD가 구분되어 정답은 4번(COD).","basis":"lecture"},{"id":491,"year":"2023","num":47,"q":"말라리아 및 뎅기열 증가, 슈퍼 태풍의 발생, 사막화 및 황사 발생 등의 피해가 야기되는 근본적인 원인은?","c":["수질오염","기후변화","대기오염","유해화학물질오염","폐기물오염"],"a":2,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록: 말라리아·뎅기열, 슈퍼태풍, 사막화·황사의 근본 원인은 기후변화(2번).","basis":"lecture"},{"id":492,"year":"2023","num":48,"q":"음용수 처리 시 사용되는 물질로 형성되어 암 발생 가능성을 높일 가능성이 있는 물질은?","c":["질산성질소","암모니아성 질소","페놀","벤젠","트리할로메탄류"],"a":5,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"pdf","expl":"강의록(3주차) 소독부산물 항목에 음용수 염소소독으로 생성되는 트리할로메탄류(THMs)가 명시되고 암 발생과 연관된다. 정답은 5번(트리할로메탄류).","basis":"lecture"},{"id":493,"year":"2023","num":49,"q":"일본 폐광산에서 발생한 오염물질로 토양오염을 거쳐 노출된 사람들에게 신장 손상, 골다공증을 유발한 물질은?","c":["수은","비소","납","카드뮴","망간"],"a":4,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록(카드뮴): 일본 도야마현 폐광산 폐수로 토양·쌀이 오염되어 발생한 이타이이타이병(신장 손상, 골연화·골다공증)의 원인은 카드뮴이다. 정답 ④.","basis":"lecture"},{"id":494,"year":"2023","num":50,"q":"지구상의 물 중 식수로 쓸 수 있는 담수의 비율은?","c":["0.5% 이하","0.5-1.0%","1.0-3.0%","3.0-5.0%","5.0-10.0%"],"a":2,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"pdf","expl":"강의록(3주차)에 식수로 쓸 수 있는 담수는 0.65%로 명시되어 있으며 이는 '0.5-1.0%' 구간에 해당한다. 따라서 정답 2번이 맞다.","basis":"lecture"},{"id":495,"year":"2023","num":51,"q":"○○는 가축 내장에서 발생하며 습지나 천연가스 생산 시에도 발생한다. 기후변화에도 큰 영향을 미치는 물질 중 하나이다. 다음 설명에 옳은 것은?","c":["메탄","이산화탄소","오존","이황화탄소","염소"],"a":1,"prof":"임종한","theme":"위해성평가·온난화","unc":0,"src":"pdf","expl":"강의록: 메탄(CH4)은 가축 내장, 늪지·습지, 천연가스 생산 시 발생하며 온난화에 큰 영향을 미치는 온실기체이므로 1번이 옳다. 설명이 강의록의 메탄 서술과 정확히 일치한다.","basis":"lecture"},{"id":496,"year":"2023","num":54,"q":"이상기온에서 65세 이상 사람들에게 치명적인 영향을 주는 것은?","c":["암","신경계질환","정신계질환","근골격계질환","뇌심혈관 질환"],"a":5,"prof":"박신구","theme":"기후·온열","unc":0,"src":"pdf","expl":"강의록(3주차 기후변화와 건강): 이상 고온이 계속되면 65세 이상 노인층에서 치명적이며, 일 사망자수와 함께 심혈관계(뇌심혈관) 질환 사망이 두드러진다고 명시. 따라서 뇌심혈관 질환이 정답.","basis":"lecture"},{"id":497,"year":"2023","num":55,"q":"우리나라 봄철 기온이 상승하고 강우량이 하강하는 현상에 의한 기후 재난은?","c":["식중독","황사","산성비","오존 증가","미세먼지 증가"],"a":2,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"ai","expl":"봄철 기온 상승과 강우량 감소(건조)로 발생하는 기후재난은 황사. 강의록에서 기후변화 피해로 황사·사막화를 제시. 정답 황사(2번).","basis":"lecture"},{"id":498,"year":"2023","num":56,"q":"다음 중 감염형 식중독으로 볼 수 있는 것은?","c":["포도상 구균 식중독","장구균 식중독","보툴리누스 식중독","비브리오 식중독","크로스트리디엄 식중독"],"a":2,"prof":"임종한","theme":"식품오염·식중독","unc":0,"src":"pdf","expl":"강의록 분류상 감염형(food infection)은 살모넬라·호염균·장구균이다. 보기 중 감염형은 2번 장구균 식중독이며 포도상구균·보툴리누스·비브리오·클로스트리디움은 독소형이므로 정답 2번.","basis":"lecture"},{"id":499,"year":"2023","num":57,"q":"신경세포, 적혈구 등의 cholinesterase를 비가역적으로 차단하여 cholinesterase activity를 감소시켜 건강 장애를 일으키는 물질은?","c":["DDT","Parathione","BHC","디엘드린","린단"],"a":2,"prof":"임종한","theme":"식품오염·식중독","unc":0,"src":"pdf","expl":"강의록: 유기인제(parathion, malathion, diazinon, ethion)는 신경세포·적혈구의 cholinesterase를 비가역적으로 차단해 활성을 감소시킨다. 보기 중 유기인제는 2번 Parathion(나머지 DDT·BHC·디엘드린·린단은 유기염소제)이므로 정답 2번.","basis":"lecture"},{"id":500,"year":"2023","num":58,"q":"Superoxide를 만들고, 2012년에 국내에서는 금지된 농약으로, 그 이후에 이것에 의한 사망률이 감소하였다. 이것은 무엇인가?","c":["유기인제","피레스로이드","다이옥신","카바마이트","파라쿼트"],"a":5,"prof":"임종한","theme":"식품오염·식중독","unc":0,"src":"pdf","expl":"강의록: 파라쿼트는 superoxide radical을 발생시키는 대표적 폐독성 물질로 2012년 국내 판매 금지 후 사망률이 감소했다. 정답 5번 파라쿼트.","basis":"lecture"},{"id":501,"year":"2023","num":59,"q":"다음 중 식품에서의 방사성 오염을 표시할 때 사용되는 방사능의 양을 표시하는 단위는?","c":["Absorbed dose, D","Exposure, X","Equivalent dose, H","Bequerel, Bq","Roenten, R"],"a":4,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(방사선): 식품 방사성 오염은 Bq/Kg 단위로 표시(비상시 식품 방사능 국내기준 표). 방사능의 양(초당 붕괴수)은 베크렐(Bq). 정답 Bq(4번).","basis":"lecture"},{"id":502,"year":"2023","num":60,"q":"파리협정에 관한 설명이다. 지난 교토의정서 등이 선진국들 중심으로 이루어졌다면, 이와 다르게 전세계 모든 나라가 탄소 배출을 줄이는 방향으로 참여하는 점에 중심을 둔 것은?","c":["교토 의정서","리우 협약","파리 협정","글래스고 기후 협약","몬트리올 의정서"],"a":3,"prof":"임종한","theme":"위해성평가·온난화","unc":0,"src":"pdf","expl":"강의록: 교토의정서가 선진국 중심의 감축의무였던 것과 달리 파리협정(2015, COP21)은 195개 당사국 모두에 구속력을 갖는 첫 합의이므로 3번이 옳다.","basis":"lecture"},{"id":503,"year":"2025","num":1,"q":"다음 중 소음성 난청(NIHL)에 대한 설명으로 옳은 것은?","c":["주로 편측성으로 나타나며, 폭로된 귀의 손상의 먼저 일어난다","소음 폭로를 중단한 후에도 청력 장해의 진행이 지속되는 비가역성을 띤다","저음역대에서 고음역대로 파급되는 양상이다","초기에 4000Hz 부근의 고음역대에서 청력 손실이 발생하는 C5-dip 현상을 보인다","연속음보다 간헐적으로 들리는 단속음이 더 위험하다"],"a":4,"prof":"김양우","theme":"소음·진동","unc":0,"src":"ai","expl":"강의록(PAGE 35, 37): NIHL은 초기 4kHz 부근 고음역에서 청력손실이 시작되는 C5-dip(4kHz notch)을 보이므로 보기4가 옳다. 양측성이고, 노출 중단 시 진행 정지(가역 아님이나 진행 멈춤), 고→저음 진행이므로 나머지는 틀림.","basis":"lecture"},{"id":504,"year":"2025","num":2,"q":"소음성 난청의 병리와 소리 전달 과정의 생리에 대한 설명으로 옳지 않은 것은?","c":["소리의 전달순서는 공기 전도, 액체 전도, 신경 전도 순서이다.","달팽이관 (Cochlear) 내 음전달의 최종 말초 수용체는 코르티기관 (Organ of Corti)이다.","영구성 소음성 난청 (PTS)은 코르티기관의 손상으로 인해 발생한다.","일과성 소음성 난청 (TTS)는 주로 500~1000Hz에서 발생하며, 16~24시간 내에 회복된다.","소리는 청소골을 통해 추골(malleus), 침골(incus), 등골(stapes)을 거쳐 난원창(Oval window)로 전달된다."],"a":4,"prof":"김양우","theme":"소음·진동","unc":0,"src":"ai","expl":"강의록(PAGE 24, 27): 전도 순서(공기→액체→신경), 코르티기관 최종수용체, PTS의 코르티기관 손상, 추골-침골-등골-난원창 경로는 모두 옳다. 보기4의 TTS를 '500~1000Hz'로 기술한 부분이 틀려(NIHL/TTS 표적은 4kHz 대역) 정답으로 타당하다.","basis":"lecture"},{"id":505,"year":"2025","num":3,"q":"수완 진동 증후군(Hand-Arm Vibration Syndrome, HAVS)과 레이노 현상(Raynaud phenomenon)에 대한 설명으로 옳은 것은?","c":["병의 진행은 초기에는 지속적이며, 이후 간헐적인 양상으로 변화한다.","주로 요골신경(radial nerve)의 침범으로 발생한다.","진동, 한랭, 흡연 등에 의해 유발되며, 냉수침지검사(cold immersion test)와 냉각유발검사(cold provocation test)로 평가할 수 있다.","혈관 수축을 유도하는 칼슘채널차단제(calcium channel blocker)와 알파차단제(alpha- blocker)는 금기이다.","약 100~200시간의 진동 작업 노출 후 급성으로 발생한다."],"a":3,"prof":"김양우","theme":"소음·진동","unc":0,"src":"ai","expl":"강의록(PAGE 3, 78-85): HAVS는 진동·한랭·흡연으로 유발되며 냉수침지검사·냉각유발검사로 평가하므로 보기3이 옳다. 척골/정중신경 침범(요골 아님), CCB는 치료(금기 아님), 잠복기 5-10년(급성 아님)이라 나머지는 틀림.","basis":"lecture"},{"id":506,"year":"2025","num":4,"q":"다음 중 내분비장애물질(edc)의 특징으로 옳지 않은 것은?","c":["성인은 미숙해서, 태아보다 내분비 장애물질에 민감하다","정상호르몬과 유사하게 수용체에 결합하는 mimic을 한다","호르몬 수용체 결합부위를 봉쇄하는 blocking 작용을 한다","내분비계와 무관한 수용체에 결합하여 비정상적인 연쇄반응을 유발하는 trigger 작용을 한다."],"a":1,"prof":"김환철","theme":"내분비장애물질","unc":0,"src":"ai","expl":"강의록(PAGE 22)에서 태아·영유아처럼 면역체계가 미성숙하고 급속히 성장하는 개체가 EDC에 더 취약하다고 명시한다. 1번은 성인이 태아보다 민감하다고 반대로 서술되었으므로 옳지 않은 것이 맞다. 2·3·4번 mimic/blocking/trigger는 작용기전(PAGE 9-10) 설명과 일치. 정답 1번 유지.","basis":"lecture"},{"id":507,"year":"2025","num":5,"q":"다이옥신에 대해서 옳지 않은 것은?","c":["염소 결합된 두 벤젠을 질소가 연결하는 3고리 방향족 화합물이다.","IARC group 1이다.","급성증상으로 염소좌창 (Chloracne) 발생 가능하다.","베트남 전쟁에 사용된 고엽제에는 소량의 2,3,7,8-TCDD가 포함되어 있다.","폐기물 소각, 철강 및 비철금속산업, 염소표백과정 등에서 뿐만 아니라, 산불과 화산 등 자연적으로도 발생 가능하다."],"a":1,"prof":"김환철","theme":"내분비장애물질","unc":0,"src":"ai","expl":"다이옥신(PCDD)은 두 벤젠고리를 산소 2개가 연결하는 dibenzo-p-dioxin 구조이며 '질소가 연결한다'는 1번은 틀린 서술이므로 옳지 않은 것이 맞다. IARC group 1(PAGE 25), 염소좌창, 고엽제 2,3,7,8-TCDD, 소각·산업 및 자연발생(PAGE 24-25)은 모두 옳다. 정답 1번 유지.","basis":"lecture"},{"id":508,"year":"2025","num":6,"q":"중금속 납에 대해 대해 옳은 것은?","c":["인체 내에서 생물학적 기능을 한다","세포 내 -SH기에 부착되어 적혈구 heme 합성을 하는 효소를 활성화시킨다","어린이 지능 발달에 미치는 역치가 존재한다","태반 통과를 하지 않는다","_"],"a":3,"prof":"김양우","theme":"유해금속·가스","unc":1,"src":"ai_uncertain","expl":"강의록(납): 납은 어린이 지능(신경발달) 영향에 '명확한 안전 역치가 없다'고 강조하므로, ③ '역치가 존재한다'는 강의록과 정면 배치되어 옳지 않다. ①납은 비필수 원소로 생물학적 기능 없음, ②heme 합성효소를 '억제'(활성화 아님), ④납은 태반을 통과함으로 나머지도 모두 오답이며, ⑤보기가 비어 있어(_) 정답을 확정할 수 없다. 현재 정답 ③은 강의록상 틀렸으나 대체할 명확한 보기가 없어 수정 불가.","basis":"lecture"},{"id":509,"year":"2025","num":7,"q":"중금속에 대해 가장 옳은 것을 고르시오","c":["오염원의 유출을 막기 위해 실내 별도 공간에 식사 공간을 마련한다","성인은 어린이에 비해 신경계 발달이 미숙하여 치료가 더욱 필요하다","_","_","대부분은 실외 오염에 의한 것이므로 실내 오염 원인은 중요하지 않다"],"a":1,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"ai","expl":"강의록(직업성 vs 환경성, para-occupational): 작업장 유해물질의 가정 내 이차오염(작업복 분진 등)을 막기 위해 식사 공간을 오염원과 분리하는 것이 옳다(①정답). 강의록상 어린이가 성인보다 신경계 발달·흡수 측면에서 더 취약(②는 성인·어린이 뒤바뀜), 실내 오염(먼지·페인트 등)도 매우 중요(⑤ 틀림). 정답 ①.","basis":"lecture"},{"id":510,"year":"2025","num":8,"q":"30년 도자기공장에서 일한 55세 남성이 왼쪽 손 폄근 기능이 저하되고 복통을 느꼈다 진찰 결과 눈 결막 창백. 검사해야할 것은?","c":["소변 납 농도","소변 수은 농도","소변 카드뮴 농도","소변 망간 농도","소변 비소 농도"],"a":1,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"ai","expl":"강의록(납): 도자기 유약 작업 30년 + 폄근(신전근) 기능저하(손목 처짐, wrist drop)·복통·결막 창백(빈혈)은 만성 납중독의 전형이므로 소변이 아닌 혈중납이 표준이나, 보기 중 원인 금속을 겨냥한 검사는 납 검사이다. 정답 ① 소변 납 농도(취지상 납 노출 확인).","basis":"lecture"},{"id":511,"year":"2025","num":9,"q":"30년간 도금업무를 한 근로자에게서 발생할 가능성이 높은것은?","c":["폐암의 발생위험이 증가한다","자극성 피부염은 발생하지 않는다.","6가 크롬보다 3가 크롬의 독성이 더 강하다","천식의 위험은 증가하지 않는다.","크롬에 의한 피부, 점막 궤양은 쉽게 회복된다"],"a":1,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"ai","expl":"강의록(6가 크롬): 도금업(6가 크롬)은 만성 노출시 폐암(IARC 1군) 위험이 증가한다(①정답). ②자극성·알레르기성 접촉피부염 발생, ③6가 크롬이 3가보다 독성 강함, ④직업성 천식 위험 증가, ⑤크롬 홀(궤양)은 잘 낫지 않으므로 오답.","basis":"lecture"},{"id":512,"year":"2025","num":10,"q":"DNA와 직접 작용하지 않지만 비유전적 손상을 일으키며 일정 농도 이하에서는 암 발생에 영향을 미치지 않는 특성을 갖는 물질은?","c":["개시자(initiator)","촉진자(promoter)","억제자","돌연변이 유발자","증식 조절자"],"a":2,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"ai","expl":"DNA와 직접 작용하지 않고 비유전적 손상·역치 존재 특성을 갖는 것은 촉진자(promoter)이다(정답 2). 강의록 발암기전 근거.","basis":"lecture"},{"id":513,"year":"2025","num":13,"q":"진폐증 진단에서 가장 중요한 검사는?","c":["가족력","흉부 방사선 촬영","유기용제 노출 과거력","조직 검사","혈액 검사"],"a":2,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"ai","expl":"진폐 진단에 가장 중요한 검사는 흉부 방사선 촬영(2번)으로 병형을 판정한다. 조직검사·혈액검사는 표준이 아니다. 표준지식으로 판단.","basis":"general"},{"id":514,"year":"2025","num":14,"q":"30년간 채석장 작업자로 일한 63세 남성이 방문하였다. 흉부 방사선 촬영에서 양쪽 림프절이 커져 있고 다발성 결절이 발견되었다. 진단은?","c":["석면폐","활석폐증","면폐증","규폐증","폐암"],"a":4,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"ai","expl":"30년 채석장 작업자에서 양쪽 폐문 림프절 비대와 다발성 결절은 규폐증(4번)의 전형적 소견이다. 채석은 규산 노출 작업. 표준지식으로 판단.","basis":"general"},{"id":515,"year":"2025","num":15,"q":"실내공기질 개선대책으로 가장 옳은 것은?","c":["하루 4회 환기하되, 한 번 환기 시 5분 이내로 한다.","부유미생물의 증식을 막기 위해 습도를 가능한 낮게 유지한다.","새집에 들어가기 3일 전, 실내온도를 높인 후 환기하는 베이크아웃을 진행한다.","커튼, 카펫 등은 가급적 세탁하지 않는다.","겨울철 내벽에 결로가 생기면 그 부위는 환기하지 않는다."],"a":2,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"ai","expl":"실내공기질 개선으로 부유미생물 증식을 막기 위해 습도를 낮게 유지(2번)가 옳다. 환기는 5분보다 충분히 하고, 베이크아웃은 온도를 높인 뒤 환기, 커튼·카펫 관리, 결로 부위 환기가 필요하므로 나머지는 틀리다. 표준지식으로 판단.","basis":"general"},{"id":516,"year":"2025","num":16,"q":"콘크리트 건설 현장에서 콘크리트의 보온 양생을 위해 숯불난로를 피우던 30대 남성 근로자가 혼수상태로 응급실에 왔다. 동맥혈 검사에서 CO-Hb 농도가 40%일 때 치료로 적절한 것은?","c":["착화치료","혈액투석","고압산소치료","메틸렌블루","Amyl nitrate"],"a":3,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"ai","expl":"강의록(CO 치료): 숯불난로 연소로 인한 CO-Hb 40% 혼수 환자에게는 고압산소치료가 적절하다. 정답 ③. 착화(킬레이션)·투석·메틸렌블루·amyl nitrate는 CO에 부적절.","basis":"lecture"},{"id":517,"year":"2025","num":17,"q":"유해가스는 용해도에 따라 침범 부위를 평가한다. 용해도가 낮아서 하부호흡기에 주로 영향을 미치며 폐부종, 세기관지염 등을 일으킬 수 있는 것?","c":["암모니아","염소소","아황산가스","불소","오존"],"a":5,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"ai","expl":"강의록(자극성 가스 수용성): 용해도가 낮아 하부호흡기·폐포에 침투해 폐부종·세기관지염을 일으키는 가스는 오존(O₃)이다(저수용성 NO₂·포스겐·O₃ 계열). 암모니아·염소·아황산가스·불소는 고수용성 상기도 자극제. 정답 ⑤ 오존.","basis":"lecture"},{"id":518,"year":"2025","num":18,"q":"휴대폰 프레임을 만드는 공정에서 출고 전 투명 액체로 기름때를 닦아내는 역할의 26세 여성이 하지에 갑자기 힘이 빠져 걷기 힘들다고 내원했다. 이에 대한 설명으로 옳은 것은?","c":["양측성으로 나타난다","감각신경이 대부분 소실되며 운동신경의 이상은 없다","노출을 중단해도 회복되지 않는다","시야 위축, 시신경염, 색각기능 이상 등은 오지 않는다","신경 독성은 중심부에서 원위부로 진행한다"],"a":1,"prof":"김양우","theme":"유기용제","unc":0,"src":"ai","expl":"휴대폰 프레임 세척(노말헥산) 하지 근력저하 신경병증은 양측성·대칭성으로 나타난다(보기1 정답). 감각·운동 모두 침범, 노출 중단 시 회복 가능, 원위부→근위부 진행, 시신경 증상은 없으므로 나머지는 오답.","basis":"general"},{"id":519,"year":"2025","num":19,"q":"톨루엔, 염화메틸 등 유기용제를 취급하는 근로자가 작업 중 현기증, 심계항진이 자주 발생했으며, 최근에는 실신하였다. 진단을 위해 우선 고려해야 할 검사는?","c":["폐기능검사","24시간 심전도","산소포화도","심박동변이","24시간 혈압 측정"],"a":2,"prof":"김양우","theme":"유기용제","unc":0,"src":"ai","expl":"톨루엔·염화메틸 등 유기용제는 심근을 카테콜아민에 과민하게 해 부정맥·실신을 유발(강의록 sudden sniffing death 기전)하므로 발작성 부정맥/실신 규명에 24시간 심전도(Holter)가 우선.","basis":"lecture"},{"id":520,"year":"2025","num":20,"q":"유기용제에 대한 설명으로 옳은 것은?","c":["유기용제의 흡수량은 휴식시나 격한 업무시 감소한다.","유기용제의 가장 흔한 흡수경로는 피부이다.","유기용제 흡수에 관여하는 인자로 작업 행태가 포함된다.","피부를 통한 흡수는 지용성만 관련 있다.","유기용제의 효능은 그 물질의 수용성에 의해 결정된다."],"a":3,"prof":"김양우","theme":"유기용제","unc":0,"src":"ai","expl":"유기용제 흡수에 관여하는 인자로 작업 행태(작업 강도·호흡량)가 포함된다(보기3 정답). 격한 업무 시 흡수 증가, 주 흡수경로는 호흡기(피부 아님), 피부흡수는 지용성이 주로 관여, 효능은 지용성이 결정하므로 나머지는 오답.","basis":"lecture"},{"id":522,"year":"2025","num":22,"q":"직업성 암의 특성에 관한 다음 내용 중 옳은 것은?","c":["비직업성 암종보다 고연령층에서 발생하는 경향이 있다.","유발 잠복기간은 다양하지만 대부분의 경우 10년 미만이다.","혈액암이 직업성암중 가장 흔한 암종이다.","일반주민들의 같은 부위에 생기는 암과 사망률은 유사하다.","발암물질 노출력을 조사하는 것이 무엇보다 중요하다."],"a":5,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"ai","expl":"직업성 암은 발암물질 노출력 조사가 무엇보다 중요하다(정답 5). 나머지는 직업성 암 특성의 반대 서술.","basis":"general"},{"id":523,"year":"2025","num":23,"q":"8세 간호사가 (진짜 8세로 나왔습니다) 근무 시작 3개월 후 손등과 손목 부위에 심한 가려움, 홍반, 진물을 호소하였다. 신체검진상으로 확인했을 때, 장갑에 닿는 부위에 병변을 확인할 수 있었다. 직업성 질환으로 진단하기 위해 실시할 수 있는 검사는?","c":["serum IgE test","prick test","patch test","KOH 도말 검사","Intradermal test"],"a":3,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"ai","expl":"장갑 접촉 부위에 국한된 습진성 병변은 (고무장갑 등에 대한) 알레르기성 접촉피부염을 시사하며, 원인 항원 확인에는 첩포검사(patch test)가 적합하다(정답 3). 즉시형(IgE·prick·intradermal)이 아닌 지연형 과민반응 진단.","basis":"general"},{"id":524,"year":"2025","num":24,"q":"작업 시간 중 순간적으로라도 초과해서는 안되는 농도는?","c":["TLV-TWA","TLV-STEL","TLV-C","BEI","PEL"],"a":3,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"ai","expl":"강의록: 작업시간 중 순간적으로라도 초과해서는 안 되는 농도는 천정치 TLV-C(3번)이다.","basis":"lecture"},{"id":525,"year":"2025","num":25,"q":"준 종합병원 결핵병동에서 근무하던 간호사가 결핵에 걸린 후 산재 승인을 받고, 치료를 위해 6개월 간 휴직하였다. 이 간호사는 산재보험에서 평균급여의 몇 %를 휴업급여로 받을 수 있는가?","c":["50%","70%","80%","90%","100%"],"a":2,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"ai","expl":"강의록: 휴업급여는 평균임금의 70%(2번)를 지급한다.","basis":"lecture"},{"id":526,"year":"2025","num":26,"q":"장기간의 잠복기를 거쳐 발병하는 직업성 암 등 직업병을 조기에 발견하고 조치할 수 있도록 하는 건강검진 제도는?","c":["일반건강진단","특수건강진단","수시건강진단","임시건강진단","건강관리 수첩소지자 건강진단"],"a":2,"prof":"박신구","theme":"산업보건·관리","unc":1,"src":"ai","expl":"강의록: 장기 잠복기를 거쳐 발병하는 직업성 암을 조기발견하는 진단으로 '건강관리수첩 소지자 건강진단'(5번)이 강의록 정의에 정확히 부합한다. 정답으로 표기된 특수건강진단(2번)은 재직 중 정기검진 개념이어서, 문항이 '조기발견 제도'를 강조하면 5번이 더 적합하나 특수건강진단도 직업병 조기발견 기능을 포함하므로 판단이 애매하다.","basis":"lecture"},{"id":527,"year":"2025","num":27,"q":"시차 증후군에 대하여 옳은 것을 고르시오","c":["동쪽으로 비행할 때 적응하는 것이 생체주기가 빨라지기 때문에 더 힘들다.","서쪽으로 비행할 때 적응하는 것이 생체주기가 빨라지기 때문에 더 힘들다.","시차 증후군 예방을 위하여 비행 중에 식사의 양을 늘인다.","시차 증후군은 날짜 변경선과 밀접한 관련이 있다.","멜라토닌이 시차 증후군 극복에 도움이 된다."],"a":5,"prof":"박신구","theme":"이상기압·항공우주","unc":1,"src":"ai_uncertain","expl":"강의록: 시차증후군에 멜라토닌·광치료가 언급되어 멜라토닌 도움(5번)이 옳다. 다만 강의록은 '동쪽으로 가면 앞으로 당겨져 회복시간이 더 필요'라 하여 1번(동쪽 비행이 생체주기가 빨라져 더 힘듦)도 강의록상 참으로 볼 여지가 있어 복수정답 가능성이 있는 애매한 문항.","basis":"lecture"},{"id":528,"year":"2025","num":28,"q":"40세 남자 잠수사가 45m 깊이에서 잠수 중 갑자기 들뜨고 과도하게 자신감이 생겨 판단이 흐려져 다시 수면으로 복귀하였다. 복귀 후 후유증 없이 정상으로 돌아왔다. 가장 가능성 높은 진단은?","c":["감압병","질소마취","중추신경계 산소독성","동맥혈 기체 색전증","이압성 골괴사"],"a":2,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"ai","expl":"강의록: 수심 30~60m에서 질소마취(황홀감, 자만감, Martini rule)가 나타나며 대기압 복귀 시 후유증 없이 회복되는 가역적 반응. 45m에서 들뜸·과자신감 후 정상 복귀는 질소마취(2번)의 전형. 감압병·색전증은 후유증을 남길 수 있어 오답.","basis":"lecture"},{"id":529,"year":"2025","num":29,"q":"잠수병은 잠수 시에 조직에 과포화되었던 불활성 기체가 급부상하면서 폐를 통하여 배출하지 못하고 기포를 형성하면서 발생한다. 그 치료법 가운데 기포 제거에 가장 효과가 있을 것으로 판단되는 것은?","c":["재가압","급격감압","스테로이드 투여","수액 정맥주사","산소 흡입"],"a":1,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"ai","expl":"강의록: 감압병 치료는 재가압산소요법. 보기 순서상 재가압이 1번이므로 정답 1번이 맞다. 급격감압(2번)은 함정 오답.","basis":"lecture"},{"id":530,"year":"2025","num":30,"q":"40세 동료 직장인이 일하던 중 갑자기 메스꺼움을 호소하며, 머리가 아프고 몸에 힘이 빠져 주저앉았다. 가쁜 숨을 내쉬는 동료의 체온은 38도였고 피부는 땀으로 습한 상태였다. 진단으로 가장 적절한 것은?","c":["열경련","열부종","열사병","열실신","열탈진"],"a":5,"prof":"박신구","theme":"기후·온열","unc":0,"src":"ai","expl":"체온 38도·발한(습한 피부)·오심·탈진은 열탈진에 해당한다. 열사병은 고체온·무한증·의식장애를, 열실신은 순간 실신을 보여 감별된다. 강의록 세부 근거 없어 표준지식.","basis":"general"},{"id":531,"year":"2025","num":31,"q":"근로자의 직무 성과에 영향을 미칠 수 있는 스트레스, 가족문제, 건강 등 다양한 문제해결을 위한 상담 및 컨설팅을 제공하는 프로그램을 무엇이라고 하는가?","c":["근로자 지원 프로그램","사업장 관리 프로그램","보건관리 프로그램","근로자 복지 프로그램","근로자 역량 강화 프로그램"],"a":1,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"ai","expl":"강의록: 근로자의 스트레스·가족문제·건강 등 다양한 문제해결을 위한 상담·컨설팅 프로그램은 근로자 지원 프로그램(EAP, Employee Assistance Program)(1번)이다. 강의록에 EAP 유래와 개념이 서술됨.","basis":"lecture"},{"id":532,"year":"2025","num":32,"q":"50세 남자 근무자가 복사열이 높은 실내에서 근무한다. 최근 WBGT가 높게 측정되어 열질환 발생률이 높아졌다고 판단했다. 이 지표에 대한 설명으로 옳은 것은?","c":["WBGT는 건구온도만 반영한다","WBGT는 한랭손상을 예측할 수 있다","WBGT는 실제 인체가 받는 열스트레스를 반영한다","WBGT는 실내에선 적용할 수 없다","WBGT는 습도와 무관하다"],"a":3,"prof":"박신구","theme":"기후·온열","unc":0,"src":"ai","expl":"WBGT(습구흑구온도지수)는 건구·습구·흑구온도를 종합해 습도·복사열·기온을 반영하므로 실제 인체가 받는 열스트레스를 잘 반영한다. 건구온도만 반영·습도 무관·실내 미적용·한랭손상 예측은 모두 틀리다. 강의록 세부 근거 없어 표준지식.","basis":"general"},{"id":533,"year":"2025","num":33,"q":"위해도 평가를 하는 궁극적인 목적은 무엇인가?","c":["위험성 확인","노출평가","위해도 결정","위해도 관리","용량-반응 관계규명"],"a":3,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"ai","expl":"강의록(2주차) 위해도평가 과정의 궁극 목적은 위해도 결정(Risk Characterization)이다. 보기 3번(위해도 결정)이 이에 해당하므로 정답이 맞다.","basis":"lecture"},{"id":534,"year":"2025","num":34,"q":"공통적인 특징을 가진 사람들을 일정 기간 추적하여, 특정한 요인과 건강 및 질병과의 연관성을 밝혀내는 연구는?","c":["사례군 연구","환자-대조군 연구","코호트 연구","실험연구","생태학적 연구"],"a":3,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"ai","expl":"공통 특성 집단을 일정 기간 추적하여 요인과 질병의 연관성을 밝히는 것은 코호트 연구다. 강의록(2주차) 역학연구설계 분류에 부합하므로 정답은 3번(코호트 연구).","basis":"lecture"},{"id":535,"year":"2025","num":35,"q":"Dpseea 모형에서 생산 소비증가 배출증가의 지표는?","c":["Driving force","Pressure","State","Exposure","Effect"],"a":2,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"ai","expl":"DPSEEA 모형에서 생산·소비 증가와 배출 증가를 나타내는 지표는 Pressure다. 강의록(2주차) DPSEEA 모형에 근거하며 정답은 2번(Pressure).","basis":"lecture"},{"id":536,"year":"2025","num":36,"q":"다음 중 산업재해에 대한 예방대책으로 가장 중요한 것은?","c":["안전한 작업 조건","의료 구급제도","적잘한 보상","적정배치","안전훈련"],"a":1,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"ai","expl":"강의록: 산업재해 예방대책으로 가장 중요한 것은 안전한 작업조건 확보(1번)이다.","basis":"lecture"},{"id":537,"year":"2025","num":37,"q":"물속의 유기물이 미생물(유기생물)에 의해 산화·분해될 때 필요한 산소의 양을 무엇이라고 하는가?","c":["대장균 산소요구량","용존 산소요구량","용해물질 산소요구량","생화학적 산소요구량","화학적 산소요구량"],"a":4,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"ai","expl":"물속 유기물이 미생물에 의해 산화·분해될 때 필요한 산소량은 생화학적(생물화학적) 산소요구량(BOD)이다. 산화제로 산화할 때 필요한 양은 COD이므로 정답은 4번(생화학적 산소요구량).","basis":"lecture"},{"id":538,"year":"2025","num":38,"q":"말라리아 및 뎅기열 증가, 슈퍼 태풍의 발생, 사막화 및 황사 발생 등의 피해가 야기되는 근본적인 원인은?","c":["수질오염","기후변화","대기오염","유해화학물질오염","폐기물오염"],"a":2,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"ai","expl":"강의록: 말라리아·뎅기열, 슈퍼태풍, 사막화·황사의 근본 원인은 기후변화(2번).","basis":"lecture"},{"id":539,"year":"2025","num":39,"q":"28세 여자가 산전진단으로 병원을 방문했다. 검사결과 혈중 수은 농도가 정상보다 높았다. 이 환자는 무엇을 많이 먹었는가","c":["소고기와 같은 육류","채소류","어류","쌀과 같은 곡류","유제품"],"a":3,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"ai","expl":"강의록(유기수은/미나마타·생물농축): 혈중 수은 상승은 먹이사슬 상위 어류(참치·황새치 등)에 농축된 메틸수은 섭취와 관련되며, 임신부의 어류 섭취 제한이 권고된다. 정답 ③ 어류.","basis":"lecture"},{"id":540,"year":"2025","num":41,"q":"대기오염 물질 중 배출량 및 암 단위 위해도 고려시 암의 주된 위험 인자는?","c":["아황산가스 (SO2)","이산화질소 (NO2)","디젤연소분진 (DEP)","벤젠","납"],"a":3,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"ai","expl":"강의록(대기오염): 디젤연소분진(DEP)은 IARC 1급 발암물질이며 캘리포니아 자료상 지역 암위험의 약 70%를 차지하는 주된 위험인자. 정답 디젤연소분진(3번).","basis":"lecture"},{"id":541,"year":"2025","num":42,"q":"생물학적 조직 고려한 전리방사선 단위는?","c":["렌트겐","그레이","시버트","베크렐","투과력"],"a":3,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"ai","expl":"강의록(방사선): 생물학적 조직·작용력을 고려한 등가/유효선량 단위는 시버트(Sv). 그레이는 흡수선량, 베크렐은 방사능, 렌트겐은 조사선량. 정답 시버트(3번).","basis":"lecture"},{"id":542,"year":"2025","num":43,"q":"송전선의 극저주파의 발암등급?","c":["1","2A","2B","3","4"],"a":3,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"ai","expl":"강의록(방사선): 송전선 극저주파(ELF)는 IARC group 2B로 분류. 보기에서 2B(3번)가 정답.","basis":"lecture"},{"id":543,"year":"2025","num":44,"q":"다음 중 방사선 노출에 대한 감수성이 가장 낮은 조직은?","c":["위장상피 및 혈관내피 조직","생식,조혈기계 조직","간,콩팥 조직","수정체","성장중인 골세포"],"a":3,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"ai","expl":"강의록(방사선): 세포분열이 적은 조직이 방사선 저항성. 간·콩팥은 분화·정지세포로 감수성이 낮음(3번). 생식·조혈·위장상피·성장골세포·수정체는 상대적으로 민감. 정답 간·콩팥(3번).", const PROFS = ["김양우","김환철","박신구","임종한"];
const YEARS = ["2017","2018","2019","2020","2021","2022","2023","2025"];
const THEMES_BY_PROF = {
  "김양우":["소음·진동","유해금속·가스","방사선·대기오염","유기용제"],
  "김환철":["내분비장애물질","분진·진폐·실내공기","직업성암·발암물질"],
  "박신구":["산업보건·관리","이상기압·항공우주","기후·온열"],

};
const LS="envmed_quiz_v1";
let store = loadStore();
function loadStore(){ try{return JSON.parse(localStorage.getItem(LS))||{}}catch(e){return {}} }
function saveStore(){ try{localStorage.setItem(LS,JSON.stringify(store))}catch(e){} }
store.wrong = store.wrong || {};   // id -> true (오답노트)
store.marked = store.marked || {}; // id -> true (북마크)
store.seen = store.seen || {};     // id -> true (푼 문제)

let session = null; // {list:[q...], idx, answers:{}, filterLabel}

const main = document.getElementById('main');
const homeBtn = document.getElementById('homeBtn');
const hTitle = document.getElementById('hTitle');
homeBtn.onclick = ()=>{ if(session && !session.done){ saveResume(); } renderHome(); };

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1400); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }

// ---------- filter state ----------
let filt = { profs:new Set(), years:new Set(), themes:new Set(), mode:'sequential' };

function renderHome(){
  session=null; homeBtn.style.display='none'; hTitle.textContent='환경의학 기출';
  const doneCount=Object.keys(store.seen).length;
  const markCount=Object.keys(store.marked).length;
  let html = `<div class="card">
    <div class="h-title">환경의학 기출문제</div>
    <div class="h-sub">인하대 의학과 · 2017~2025 · 총 ${DATA.length}문항</div>`;
  // resume
  if(store.resume){
    html += `<div class="resume">📌 풀던 세션이 있어요 (${store.resume.done}/${store.resume.total})
      <button id="resumeBtn">이어풀기</button></div>`;
  }
  html += `<div class="stat-row">
      <div class="stat"><b>${DATA.length}</b><span>전체 문항</span></div>
      <div class="stat"><b>${markCount}</b><span>⭐ 북마크</span></div>
    </div></div>`;

  html += `<div class="sec-lbl">교수님</div><div class="chips" id="profChips">
    <div class="chip ${filt.profs.size===0?'on':''}" data-p="__all">전체</div>`;
  PROFS.forEach(p=>{ const n=DATA.filter(d=>d.prof===p).length;
    html+=`<div class="chip ${filt.profs.has(p)?'on':''}" data-p="${p}">${p}<small>${n}</small></div>`; });
  html += `</div>`;

  html += `<div class="sec-lbl">연도</div><div class="chips" id="yearChips">
    <div class="chip ${filt.years.size===0?'on':''}" data-y="__all">전체</div>`;
  YEARS.forEach(y=>{ const n=DATA.filter(d=>d.year===y).length;
    html+=`<div class="chip ${filt.years.has(y)?'on':''}" data-y="${y}">${y}<small>${n}</small></div>`; });
  html += `</div>`;

  // 수업 주제(테마) — 항상 13개 모두 표시, 교수님 필터가 있으면 해당 교수님 테마만
  html += `<div id="themeWrap"></div>`;

  html += `<div class="sec-lbl">방식</div><div class="modes" id="modes">
    <div class="mode ${filt.mode==='sequential'?'on':''}" data-m="sequential">순서대로</div>
    <div class="mode ${filt.mode==='random'?'on':''}" data-m="random">랜덤 섞기</div>
  </div>`;

  html += `<div class="sec-lbl">빠른 시작</div><div class="chips">
    <div class="chip" id="qMark">⭐ 북마크만 보기 (${markCount})</div>
  </div>`;

  const cnt = filteredList().length;
  html += `<button class="start" id="startBtn">${cnt}문항 학습 시작 ▶</button>`;
  html += `<div class="disclaimer">📘 모든 문항에 강의록 근거 해설이 달려 있어요. 강의록에 명확한 근거가 있어 정답을 수정한 문항 4개, 근거가 애매하거나 보기 결함으로 확인이 필요한 문항 36개(⚠️ 표시)가 있습니다.<br>족보 원본·강의자료와 대조해 학습하세요.</div>`;

  main.innerHTML = html;
  renderThemeChips();
  bindHome();
}

function renderThemeChips(){
  const wrap=document.getElementById('themeWrap');
  const showProfs = filt.profs.size ? [...filt.profs] : PROFS;
  let h=`<div class="sec-lbl">수업 주제</div>`;
  h+=`<div class="chips" style="margin-bottom:8px">
    <div class="chip ${filt.themes.size===0?'on':''}" data-t="__all">전체 주제</div></div>`;
  showProfs.forEach(prof=>{
    h+=`<div style="font-size:11px;color:var(--sub);font-weight:600;margin:8px 4px 5px">${prof}</div>`;
    h+=`<div class="chips">`;
    THEMES_BY_PROF[prof].forEach(t=>{ const n=DATA.filter(d=>d.theme===t).length;
      h+=`<div class="chip ${filt.themes.has(t)?'on':''}" data-t="${t}">${t}<small>${n}</small></div>`; });
    h+=`</div>`;
  });
  wrap.innerHTML=h;
  wrap.querySelectorAll('[data-t]').forEach(el=>{ el.onclick=()=>{
    const t=el.dataset.t;
    if(t==='__all') filt.themes.clear();
    else { filt.themes.has(t)?filt.themes.delete(t):filt.themes.add(t); }
    renderHome();
  };});
}

function filteredList(){
  return DATA.filter(d=>{
    if(filt.years.size && !filt.years.has(d.year)) return false;
    if(filt.themes.size){
      if(!filt.themes.has(d.theme)) return false;
    } else if(filt.profs.size && !filt.profs.has(d.prof)){
      return false;
    }
    return true;
  });
}

function bindHome(){
  document.querySelectorAll('#profChips [data-p]').forEach(el=>{ el.onclick=()=>{
    const p=el.dataset.p;
    if(p==='__all'){ filt.profs.clear(); filt.themes.clear(); }
    else {
      filt.profs.has(p)?filt.profs.delete(p):filt.profs.add(p);
      if(filt.profs.size){
        const allowed=new Set(); filt.profs.forEach(pr=>THEMES_BY_PROF[pr].forEach(t=>allowed.add(t)));
        [...filt.themes].forEach(t=>{ if(!allowed.has(t)) filt.themes.delete(t); });
      }
    }
    renderHome();
  };});
  document.querySelectorAll('#yearChips [data-y]').forEach(el=>{ el.onclick=()=>{
    const y=el.dataset.y;
    if(y==='__all') filt.years.clear();
    else { filt.years.has(y)?filt.years.delete(y):filt.years.add(y); }
    renderHome();
  };});
  document.querySelectorAll('#modes [data-m]').forEach(el=>{ el.onclick=()=>{ filt.mode=el.dataset.m; renderHome(); };});
  document.getElementById('startBtn').onclick=()=>{
    let list=filteredList();
    if(!list.length){ toast('해당 조건 문항이 없어요'); return; }
    startSession(list, filt.mode==='random');
  };
  const rb=document.getElementById('resumeBtn'); if(rb) rb.onclick=doResume;
  document.getElementById('qMark').onclick=()=>{ const l=DATA.filter(d=>store.marked[d.id]); if(!l.length){toast('북마크가 비었어요');return;} startSession(l,false); };
}

// ---------- session ----------
function startSession(list, rand){
  session={ list: rand?shuffle(list):list.slice(), idx:0, revealed:{}, done:false };
  homeBtn.style.display='block';
  renderQuestion();
}
function saveResume(){
  if(!session) return;
  store.resume={ ids:session.list.map(q=>q.id), idx:session.idx,
    done:session.idx+1, total:session.list.length };
  saveStore();
}
function doResume(){
  const r=store.resume; if(!r) return;
  const list=r.ids.map(id=>DATA.find(d=>d.id===id)).filter(Boolean);
  session={ list, idx:r.idx||0, revealed:{}, done:false };
  homeBtn.style.display='block';
  renderQuestion();
}

function renderQuestion(){
  const q=session.list[session.idx];
  const shown=!!session.revealed[q.id];   // 정답 공개 여부
  const picked=session.revealed[q.id];     // 사용자가 탭한 보기 번호(있으면)
  store.seen[q.id]=true;
  const total=session.list.length;
  hTitle.innerHTML=`${session.idx+1} / ${total}
    <div class="bar"><i style="width:${(session.idx+1)/total*100}%"></i></div>`;
  let opts='';
  q.c.forEach((c,i)=>{
    const n=i+1; let cls='opt';
    if(shown){
      if(n===q.a) cls+=' correct';
      else if(typeof picked==='number' && n===picked) cls+=' wrong';
    }
    opts+=`<div class="${cls}" data-n="${n}"><div class="n">${n}</div><div>${esc(c)}</div></div>`;
  });
  const isMark=store.marked[q.id];
  let fb='';
  if(shown){
    const basisLbl={lecture:'강의록',general:'표준지식',transcript:'수업'};
    const bkey=q.basis||'general';
    fb=`<div class="fb show ok">✅ 정답: ${q.a}번 — ${esc(q.c[q.a-1])}
      ${q.a_orig?`<span class="fixbadge">✏️ 강의록 근거로 정답 수정: 원래 표기 ${q.a_orig}번 → ${q.a}번</span>`:''}
      ${q.unc?'<span class="warn">⚠️ 이 정답은 강의록 근거가 애매하거나 보기 결함이 있는 문항이에요. 강의 정답지 대조 권장.</span>':''}</div>
      ${q.expl?`<div class="expl"><span class="lbl">해설</span><span class="basis ${bkey}">${basisLbl[bkey]||'표준지식'}</span>${esc(q.expl)}</div>`:''}`;
  }
  main.innerHTML=`<div class="card">
    <div class="qmeta">
      <span class="qtag">${q.prof} · ${q.theme}</span>
      <span class="qnum">${q.year} ${q.num}번</span>
    </div>
    <div class="qtext">${esc(q.q)}</div>
    <div class="opts" id="opts">${opts}</div>
    ${shown?'':'<button class="reveal" id="revealBtn">정답 보기 👁️</button>'}
    ${fb}
  </div>`;
  const last=session.idx+1===total;
  const navHtml=`<div class="navrow">
    <button class="ico" id="prevBtn">◀</button>
    <button class="ico ${isMark?'on':''}" id="markBtn">${isMark?'⭐':'☆'}</button>
    <button class="next" id="nextBtn">${last?'처음으로 ↺':'다음 ▶'}</button>
  </div>`;
  let nav=document.getElementById('navFixed');
  if(!nav){ nav=document.createElement('div'); nav.id='navFixed'; document.body.appendChild(nav); }
  nav.innerHTML=navHtml;
  saveResume(); saveStore();
  bindQuestion(q);
}

function bindQuestion(q){
  const shown=!!session.revealed[q.id];
  if(!shown){
    // 보기 탭 → 그 번호 기억하며 정답 공개
    document.querySelectorAll('#opts .opt').forEach(el=>{ el.onclick=()=>{
      session.revealed[q.id]=+el.dataset.n; renderQuestion();
    };});
    const rb=document.getElementById('revealBtn');
    if(rb) rb.onclick=()=>{ session.revealed[q.id]=true; renderQuestion(); };
  }
  document.getElementById('prevBtn').onclick=()=>{ if(session.idx>0){session.idx--; renderQuestion();} else toast('첫 문제예요'); };
  document.getElementById('markBtn').onclick=()=>{
    if(store.marked[q.id]) delete store.marked[q.id]; else store.marked[q.id]=true;
    saveStore(); renderQuestion();
  };
  document.getElementById('nextBtn').onclick=()=>{
    if(session.idx+1===session.list.length){ store.resume=null; saveStore(); renderHome(); }
    else { session.idx++; renderQuestion(); }
  };
}

function esc(s){ return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

renderHome();
</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('./sw.js').catch(function(){});
  });
}
</script>
