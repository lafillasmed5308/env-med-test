um":57,"q":"오존에 대한 설명으로 옳은 것은?","c":["자동차 배기가스가 자외선과 광산화반응할 때 생긴다.","대기 오염을 일으킬 뿐 직업적 폭로는 없다.","주로 호흡기 자극은 없어서 폐부종의 발생 가능성은 낮다.","용혈과 황달 증상을 일으킬 수 있다.","국내 관리대상 대기오염물질 항목에 아직 포함되지 않았다."],"a":1,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록: 오존은 자동차 배기가스(NOx, ROG)가 자외선과 광화학 반응할 때 생성되는 2차 오염물질이다(LA 광화학 스모그). 정답 1이 맞고, 오존은 하기도 자극·폐부종을 유발하며 국내 관리대상 오염물질이므로 나머지 보기는 틀림.","basis":"lecture"},{"id":210,"year":"2019","num":58,"q":"말초혈액검사가 도움이 되는 물질은?","c":["벤지딘","벤젠","4-아미노비페닐","석면","1,3-부타디엔"],"a":2,"prof":"김양우","theme":"유기용제","unc":0,"src":"ai","expl":"말초혈액검사(범혈구감소·재생불량성 빈혈, 백혈병)로 진단에 도움이 되는 물질은 골수독성/발암성의 벤젠이다. 벤지딘·4-아미노비페닐은 방광암, 석면은 폐/흉막질환, 1,3-부타디엔도 혈액암 관련이나 벤젠이 대표적 정답.","basis":"general"},{"id":211,"year":"2019","num":59,"q":"수입 가구를 훈증 소독하던 근로자가 양측 하지 감각 및 운동 기능 저하를 주소로 내원하였다. 노출된 물질로 옳은 것은?","c":["붉은 개미","비비소계살충제","벤젠","아플라톡신","메틸브로마이드"],"a":5,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"ai","expl":"강의록: 수입 가구·목재의 훈증 소독제로 메틸브로마이드(CH₃Br)가 쓰이며, 폐와 뇌를 동시에 타격해 진전·시각장애 등 중추신경 독성과 하지 감각·운동 저하 등 신경학적 후유증을 일으킨다(보기5). 인천항 목재 훈증 메틸브로마이드 중독 사례가 강의에서 언급된다.","basis":"lecture"},{"id":212,"year":"2019","num":60,"q":"20세 여성이 혼수상태로 응급실에 실려왔다. 동맥혈 검사에서 CO-Hb가 50%일 때 해야할 조치로 알맞은 것은?","c":["심장율동 전환","고압산소","산소마스크","메틸렌블루",""],"a":2,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록: 급성 CO 중독(COHb 50%, 혼수)의 표준 치료는 100% 산소이며, 의식소실·고농도 등 적응증에서는 고압산소(HBO)가 권고된다(보기2). COHb 반감기를 크게 단축시킨다. 메틸렌블루·심율동전환은 부적절.","basis":"lecture"},{"id":213,"year":"2019","num":61,"q":"톨루엔, 염화메틸 등 유기용제를 취급하는 근로자가 작업 중 현기증, 심계항진이 자주 발생하였으나, 최근에는 실신하였다. 진단을 위해 우선 고려해야 할 검사는?","c":["폐기능 검사","24시간 심전도","산소 포화도","심박동 변이","24시간 혈압 검사"],"a":2,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"유기용제/흡입제는 심근을 카테콜아민에 과민하게 하여 부정맥·실신을 유발(강의록 sudden sniffing death 기전)하므로 발작성 부정맥/실신 규명에 24시간 심전도(Holter)가 우선.","basis":"lecture"},{"id":214,"year":"2019","num":62,"q":"썩은 계란 냄새가난나는 맨홀 뚜껑에서 작업하던 인부 2명이 의식을 소실했다. 다음 중 해야할 처치로 올바른 것은?","c":["즉시 MRI 촬영을 통해 손상부위 파악","amyl nitrate 흡입","신속한 구조를 위해 보호장비 없이 구조한다","정유공장, 고무공장, 정화조에서 나오는 가스와는 다르다"],"a":2,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"썩은 계란 냄새·맨홀 집단 의식소실은 황화수소(H₂S) 중독이다. 강의록상 H₂S는 아질산나트륨으로 메트헤모글로빈을 유도해 치료하며(원리상 amyl nitrate 흡입도 같은 메트헤모글로빈 유도 계열, 보기2), 보호장비 없는 구조 금기(보기3 오답), 정유·고무·정화조 가스와 같은 H₂S(보기4 오답). 즉시 MRI는 부적절.","basis":"lecture"},{"id":215,"year":"2019","num":63,"q":"도금 작업 시 제품을 유기용제로 세척하는 작업을 하는 근로자가 수일 전부터 황달기가 있고 피부에 수포성 반점이 발생하였고 점점 심해지는 양상을보보여 외래에 내원하였다. 이와 관련해 맞는 것은?","c":["피부증상은 접촉 피부염일 가능성이 높아 통상 습진에 준해 치료한다","비교적 예후가 좋기 때문에 외래 치료만으로 충분하다.","스티븐스존슨 증후군이 의심된다","해당 물질은 심장부정맥을 일으키지 않는다"],"a":3,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록: 도금 세척 유기용제 노출로 황달과 진행성 수포성 발진이 있으면 스티븐스-존슨증후군 등 중증 반응을 의심해야 한다(보기3). 단순 접촉피부염·외래치료로 충분하다는 서술은 오답이며, 해당 물질이 간독성·부정맥 등 전신 독성을 일으킬 수 있으므로 보기4도 오답.","basis":"lecture"},{"id":216,"year":"2019","num":64,"q":"유기용제 중독 시 공통적으로 일어나는 작용","c":["조혈기계 장애","소화기계 장애","호흡기계 장애","중추신경장애","운동장애"],"a":4,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"유기용제는 지용성으로 신경계에 친화적이어서 중독 시 공통적으로 중추신경 억제(마취·의식저하·현훈)를 일으킨다. 강의록에도 흡입제 급성 노출이 알코올 양상의 혼수를 유발한다고 기술. 조혈·간·신경 등 특이 독성은 물질별로 다름.","basis":"lecture"},{"id":218,"year":"2019","num":66,"q":"새로 입주한 아파트~. 이에 대한 설명으로 옳은 것은?","c":["(앞 설명) 외부 공기 유입을 차단한다.","친환경 마감재를 시공하면 충분하다.","실내온도를 높게하고 환기시키는 베이크아웃을 시행하면 도움이 된다.","공기정화 식물을 키우는 것은 효과가 없다.","심혈관계 질환자, 천식 환자가 특별히 취약하다고 볼 수는 없다."],"a":3,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"ai","expl":"새 아파트 실내공기 개선으로 실내온도를 높이고 환기하는 베이크아웃(3번)이 도움이 된다. 외부공기 차단·친환경자재만으로 충분·식물 무효는 모두 틀리고, 천식·심혈관질환자가 취약군이다. 표준지식으로 판단.","basis":"general"},{"id":219,"year":"2019","num":67,"q":"다음 중 유기 용제와 그 특이적인 독성이 바르게 연결 된 것은?","c":["메탄올 - 감각신경성 난청과 같은 청각장애","톨루엔 - 백혈병과 같은 조혈 장애","노르말 헥산 - 독성 뇌병증과 같은 중추 신경 장애","2-브로모프로핀 - 불임 등 생식 장애","황화수소 - 독성 간염, 스티븐 존슨 증후군"],"a":4,"prof":"김양우","theme":"유기용제","unc":0,"src":"ai","expl":"노말헥산은 2,5-헥산디온을 통해 말초신경병증(및 중추신경 장애)을 일으켜 신경독성이 특이 독성이다(강의록 이독성 용제 목록에도 hexane 포함). 다만 메탄올-청각(오답, 시신경), 톨루엔-백혈병(오답, 벤젠), 황화수소-간염/SJS(오답)는 잘못된 연결. 정답 보기3(노말헥산-중추신경장애)이 옳게 연결됨.","basis":"lecture"},{"id":220,"year":"2019","num":68,"q":"대기오염 물질 중 배출량 및 암 단위 위해도 고려시 암의 주된 위험 인자는?","c":["아황산가스 (SO2)","이산화질소 (NO2)","디젤연소분진 (DEP)","벤젠","납"],"a":3,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"ai","expl":"강의록(대기오염 PAGE 36, 86): 디젤연소분진(DEP)은 암 위험의 약 70%를 차지하는 IARC 1급 발암물질로 대기오염 암 위험의 주된 인자. 정답 3(디젤연소분진)이 맞음.","basis":"lecture"},{"id":221,"year":"2019","num":69,"q":"대기오염 물질 중 폐기능을 감소시키며 하기도 증상을 일으키는 것은?","c":["아황산가스","이산화황","오존","질소산화물",""],"a":3,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"ai","expl":"강의록: 오존은 반응성이 높아 폐기능을 감소시키고 하기도 증상을 유발하는 대표 물질(LA 스모그, id 145와 동일 맥락). 정답 3(오존)이 맞음. 보기 2 이산화황은 아황산가스와 동일물질로 오답.","basis":"lecture"},{"id":222,"year":"2019","num":70,"q":"가공육에 쓰이며 group 1 발암 물질인 것은?","c":["아스파탐","아황산나트륨","아질산나트륨","바닐린",""],"a":3,"prof":"임종한","theme":"식품오염·식중독","unc":0,"src":"pdf","expl":"강의록: 가공육(소시지, 햄)은 IARC group 1 발암물질이며, 가공·저장 과정에 쓰이는 발색제 아질산나트륨이 핵심 원인 물질이다. 정답 3번 아질산나트륨.","basis":"lecture"},{"id":223,"year":"2019","num":71,"q":"해양오염의 원인으로 자외선과 파도에 의해 부서진뒤 분해되지 않아 물고기들이 섭취하여 문제를 일으키는 물질은?","c":["수은","카드뮴","플라스틱","PCB","다이옥신"],"a":3,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"자외선·파도에 부서져 분해되지 않고 어류가 섭취하는 해양오염 물질은 (미세)플라스틱이다(보기3). id 149와 동일 문항.","basis":"general"},{"id":224,"year":"2019","num":72,"q":"2008년 중국 영아들이 유제품을 먹은 후 집단적으로 신장결석이 발생하여 사망하는 사고가 있었다. 원인물질은?","c":["비소","멜라민","타르","안식향산나트륨","아플라톡신"],"a":2,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"2008년 중국 유제품 영아 신장결석 집단 사망 사건의 원인물질은 멜라민이다(보기2). id 68·150과 동일 문항.","basis":"general"},{"id":225,"year":"2019","num":73,"q":"다음 중 최근 가장 많이 향상된 대기오염 물질은?","c":["이산화질소","아황산가스","오존","미세분진","벤젠"],"a":2,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(대기오염 PAGE 43 추이): 아황산가스(SO2)는 연료 탈황 등으로 최근 가장 크게 개선(향상)된 대기오염 물질이다. 정답 2(아황산가스)가 맞음. 오존·미세분진은 오히려 정체·증가 추세.","basis":"lecture"},{"id":226,"year":"2019","num":74,"q":"다음 중 휘발유의 안티노킹 목적으로 사용하여 아이들의 학습능력 감소를 일으킨 대기오염 물질은?","c":["아황산가스","납","카드뮴","미세분진"],"a":2,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록: 과거 휘발유의 안티노킹제(옥탄가 향상, Tetraethyl lead)로 납을 첨가했고, 대기 중 납은 어린이의 지능(학습능력) 발달을 저하시켰다(보기2). 앨리스 해밀턴의 자료가 유연 휘발유 퇴출의 근거가 되었다.","basis":"lecture"},{"id":227,"year":"2019","num":75,"q":"Staphylococcal food poisoning과 무관한 것은?","c":["치명도가 낮다","incubation period가 2-3일이다","세균독소가 원인이다","위장관 증상을 일으킨다","체온은 정상, 맥박은 느리다."],"a":2,"prof":"임종한","theme":"식품오염·식중독","unc":0,"src":"pdf","expl":"포도상구균 식중독은 독소형으로 치명도가 낮고 위장관 증상을 일으킨다. 세균성 식중독 잠복기는 짧아 '잠복기 2-3일'이 무관하므로 정답 2번.","basis":"lecture"},{"id":228,"year":"2019","num":76,"q":"계란 살충제 논란을 일으킨 피브로닐과 비펜트린은 어느계열에 속하는가?.","c":["유기염소제","카바메이드계","phenoxy계","pyrethroid 계","유기인제"],"a":4,"prof":"임종한","theme":"식품오염·식중독","unc":0,"src":"pdf","expl":"강의록: 피프로닐, 비펜트린은 합성 피레스로이드계 화합물이다. 정답 4번 pyrethroid계.","basis":"lecture"},{"id":229,"year":"2019","num":77,"q":"플라스틱 용기, 음료캔, 병마개, 수도관의 내장코팅, 치과 치료시 이용되는 코팅제에 사용되는 내분비계 교란물질은?","c":["비스페놀A","DES","알킬페놀","스티렌","프탈레이트"],"a":1,"prof":"김환철","theme":"내분비장애물질","unc":0,"src":"pdf","expl":"강의록(PAGE 7) 비스페놀A 용출 우려 생활용품 설명과 문항 지문이 일치하므로 정답은 비스페놀A.","basis":"lecture"},{"id":230,"year":"2019","num":78,"q":"다음 중 방사선 손상의 확률적 영향에 해당하는 것을 고르시오.","c":["태아 사망","선천 기형","암","발육 부전","정신 지체"],"a":3,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"ai","expl":"강의록(방사선 PAGE 14, 19): 암은 확률적 영향, 태아사망·기형·발육부전·정신지체는 결정론적 영향. 정답 3(암)이 맞음.","basis":"lecture"},{"id":231,"year":"2019","num":79,"q":"다음 중 방사능 물질이 붕괴될 때 일초당 방출되는 방사능의 양은?","c":["Bq","Gy","Sv","Roentgen",""],"a":1,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"ai","expl":"강의록(방사선 PAGE 8): 방사능은 매초 붕괴 수(초당 핵변환 수)로 정량화되며 표준단위는 베크렐(Bq, 1Bq=초당 1개 핵변환). 정답 1(Bq)이 맞음.","basis":"lecture"},{"id":232,"year":"2019","num":80,"q":"다음 중 일상생활환경에서 전리방사선 노출이 가장 많은 것은?","c":["의료용 조사","핵낙진","(미복원)","자연조사","핵발전소"],"a":4,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"ai","expl":"강의록(방사선 PAGE 20): 일상환경 최대 노출원은 자연방사선(평균 3.6mSv/년의 대부분)이다. 정답 4(자연조사)가 맞음.","basis":"lecture"},{"id":233,"year":"2019","num":81,"q":"전리방사선에 대한 감수성이 가장 높은 조직 및 기관은?","c":["뼈, 연골","조혈, 생식기","간","수정체","뇌"],"a":2,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"ai","expl":"전리방사선 감수성이 가장 높은 조직은 조혈조직과 생식세포(세포분열 활발). 강의록의 골수·백혈구 손상 강조와 부합. 정답 2(조혈, 생식기)가 맞음.","basis":"general"},{"id":234,"year":"2019","num":82,"q":"전리방사선으로 인한 암 발생률이 1/10,000~1/1000,000 수준으로 받아들여질 때 방사선 노출 정도는?","c":["0.5mSv","0.08mSv","1mSv","10mSv","50mSv"],"a":2,"prof":"김양우","theme":"방사선·대기오염","unc":1,"src":"ai","expl":"저선량 미소 발암위험(1/만~1/백만) 수준에 대응하는 노출은 매우 낮은 선량으로, 이 문항 보기 중 정답은 2(0.08mSv, 흉부X선 수준)로 표기됨. 강의록(PAGE 30)은 미소위해를 저선량으로 설명하나 정확한 수치 대응 근거가 명확치 않아 애매(동일 취지 id159는 1mSv를 정답으로 함).","basis":"general"},{"id":235,"year":"2019","num":83,"q":"WHO의 국제 암 연구소에서 규정한 휴대폰 라디오파의 발암 등급은?","c":["1","2A","2B","3","분류할 수 없음"],"a":3,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(방사선 PAGE 73, 78): IARC는 2011년 휴대폰 라디오파를 group 2B(발암 가능)로 분류했다. 정답 3(2B)이 맞음.","basis":"lecture"},{"id":236,"year":"2019","num":84,"q":"[임종한] 방사선 노출이 백내장을 유발하는 기전은?","c":["호메시스 모델","역치가 있는 선형 모델","역치가 없는 선형 모델","역치가 있는 곡선 모델","역치가 없는 곡선 모델"],"a":2,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"ai","expl":"백내장은 방사선의 결정론적(비확률적) 영향으로 일정 역치 이상에서 발생하는 역치 있는 반응이다. 강의록의 결정론/확률론 구분(PAGE 19)에 근거해 정답 2(역치가 있는 선형 모델)가 타당.","basis":"lecture"},{"id":237,"year":"2019","num":85,"q":"다음 중 이온과 유리기로 인하여 세포내 거대 분자의 파괴를 일으켜 세포 장애를 일으킨키는 것은?","c":["적외선","세숨","라디오파","극저주파","가시광선"],"a":2,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(방사선 PAGE 13, 17): 세슘(Cesium-137)은 전리방사선을 방출해 이온·유리 라디컬을 형성하여 세포내 거대분자(DNA)를 손상시킨다. 적외선·라디오파·극저주파·가시광선은 비전리방사선. 정답 2(세슘)가 맞음.","basis":"lecture"},{"id":238,"year":"2019","num":86,"q":"염기서열의 변화 없이 DNA 및 histone의 2차적인 변화로 인해 유전자 발현이 변화되는 것으로, 부모가 노출되어 자녀에게 영향을 미치는 것은?","c":["돌연변이","단백질 변성","후생염색체","염색체 변이","아폽토시스"],"a":3,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"ai","expl":"염기서열 변화 없이 DNA·histone 2차 변화로 유전자 발현이 바뀌고 대물림되는 것은 후생유전(에피제네틱)으로 보기 3번 후생염색체가 정답이다.","basis":"general"},{"id":239,"year":"2019","num":87,"q":"향수를쓰는 남자 정자 감소 정자수감소 원인의물질은?","c":["피라벤","비스페놀A","프탈레이트","다이옥신","DES"],"a":3,"prof":"김환철","theme":"내분비장애물질","unc":0,"src":"ai","expl":"강의록(PAGE 8)에서 향수 등 화장품 사용과 연관되는 노출물질은 프탈레이트이며, 프탈레이트는 anti-androgenic 작용(PAGE 18)으로 정자수 감소 등 남성생식 영향과 관련된다. 따라서 정답은 프탈레이트.","basis":"lecture"},{"id":240,"year":"2019","num":88,"q":"기후 온난화(지구 온난화)에 가장 크게 기여하는 물질은?","c":["메탄","이산화질소","오존","CO2","CFC"],"a":4,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"ai","expl":"지구온난화(온실효과)에 가장 크게 기여하는 물질은 배출량이 압도적인 이산화탄소(CO2)이다. 강의록(대기오염 PAGE 37 온실가스: CO2, methane)과 부합. 정답 4(CO2)가 맞음.","basis":"lecture"},{"id":241,"year":"2019","num":89,"q":"기후변화에 의해 가장 많이 발생할 것으로 예상되는 것은?","c":["말라리아","영양 결핍의 증가","설사병의 증가로 인한 의료 부담","극한 기상현상으로 인한 사망과 질병, 부상의 증가","대기오염 수준의 변화로 인한 순환기-호흡기 질환의 증가"],"a":4,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(대기오염): 기후변화 건강영향 중 WHO는 극한 기상현상(이상기후)으로 인한 사망·질병·부상 증가를 가장 큰 영향으로 제시. 말라리아·영양결핍·설사·대기오염 관련 질환도 영향이나 규모가 상대적으로 작음.","basis":"lecture"},{"id":242,"year":"2019","num":90,"q":"지구 규모의 환경 문제에 대한 설명 중 옳은 것은?","c":["산성비 - 질산, 황산 - 피부노화, 흑색종, 면역감소","온실효과 - 탄산가스, 메탄가스, 염화 불화탄소 - 기후변화","황사 - 모래 먼지 증가, 토양과 수질의 산성화","열대 우림 - 화전 확대 - 소화기 질환 증가","대류권의 오존층 파괴 - cfc - 비타민 D 감소"],"a":2,"prof":"임종한","theme":"위해성평가·온난화","unc":0,"src":"ai","expl":"강의록: 온실효과는 탄산가스·메탄·염화불화탄소(CFC) 등 온실기체가 기후변화를 일으키는 현상이므로 2번이 옳다. 대류권 오존이 아니라 성층권 오존층 파괴가 CFC에 의한 것이며, 산성비는 피부노화·흑색종과 무관해 나머지는 틀리다.","basis":"lecture"},{"id":243,"year":"2019","num":91,"q":"산업폐기물과 가정폐기물로 오염된 호수에서 물고기가 떼죽음 당하는 원인은 무엇인가?","c":["폐기물이 호수 물 산성화 높임","폐기물이 산성화 낮춤","유기물이 부패하면서 산소 농도 낮춤","폐기물에서 나온 박테리아","폐기물에서 나온 독성물질"],"a":3,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"pdf","expl":"강의록(3주차) 산소소모물질·부영양화 설명대로 유기물이 부패·분해되며 용존산소를 고갈시켜 물고기가 집단 폐사한다. 정답은 3번(유기물 부패로 산소농도 저하).","basis":"lecture"},{"id":244,"year":"2019","num":92,"q":"지구온난화에 대한 설명 중 옳은 것은?","c":["21세기말 지구의 기온은 1.1~6.4도의 증가가 예상된다.","화석연료의 고갈로 인해 선진국의 영향이 클 것이다.","예상했던 것보다 온도 변화가 크지 않을 것이다.","바젤 협약을 통해 국제적으로 대책을 생성, 대응 중이다.","평균 산소 농도는 화산 활동, 태양활동의 변화에 의해 증가한다."],"a":1,"prof":"임종한","theme":"위해성평가·온난화","unc":0,"src":"pdf","expl":"강의록: IPCC 5차 보고서 기준 21세기 말 지구 기온은 1.1~6.4도 상승 전망이므로 1번이 옳다. 온난화 대응은 바젤협약이 아니며, 온도변화는 예상보다 작지 않고 오히려 크게 나타날 것으로 전망되어 나머지 보기는 틀리다.","basis":"lecture"},{"id":245,"year":"2019","num":93,"q":"자궁내막증, 성조숙증과 관련된 내분비계 교란물질 작용은?","c":["호르몬 유사","호르몬 봉쇄","성호르몬 상호 작용","호르몬 방해","호르몬 촉발"],"a":1,"prof":"김환철","theme":"내분비장애물질","unc":0,"src":"pdf","expl":"자궁내막증, 성조숙증은 에스트로겐 과다 자극과 관련되며, 이는 정상 호르몬과 유사하게 수용체에 결합하는 에스트로겐 유사(mimic) 작용(PAGE 9)에 해당한다. 따라서 정답은 '호르몬 유사'.","basis":"lecture"},{"id":246,"year":"2019","num":94,"q":"다음 중 감수성 지표에 해당하는 것은?","c":["P53","Micronuclei","DNA adducts","미복원","sister chromatid exchange"],"a":1,"prof":"김양우","theme":"방사선·대기오염","unc":1,"src":"pdf","expl":"감수성(susceptibility) 지표는 유전적·개체 감수성을 반영하는 p53 등이고, Micronuclei·DNA adducts·SCE는 노출/효과 지표에 해당. 강의록에는 생체지표 분류 근거가 없어 표준지식으로 판단하며, 분류가 애매하여 정답은 유지.","basis":"general"},{"id":248,"year":"2020","num":1,"q":"다음 중 진폐증에 포함되는 것은?","c":["석탄광부폐증","석면폐증","흑연폐증","농부폐증","모두 다"],"a":5,"prof":"김환철","theme":"분진·진폐·실내공기","unc":1,"src":"pdf","expl":"석탄광부폐증·석면폐증·흑연폐증은 모두 무기분진에 의한 진폐증이나, 농부폐증은 유기분진에 의한 과민성폐장염이다. 그럼에도 이 문항은 정답을 '모두 다(5번)'로 채점하고 있어 논란 여지가 있으나, 강의록에 진폐 분류 슬라이드가 없어 정답을 뒤집을 근거가 부족하므로 uncertain으로 둔다.","basis":"general"},{"id":249,"year":"2020","num":2,"q":"70세 남자, 광산업에 20년 종사. 호흡곤란으로 외래에 내원했다. 다음 중 진단에 필요한 것은?","c":["흉부 CT","단순 흉부 촬영","객담검사","결핵도말검사","폐기능 검사"],"a":2,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"광산 20년 종사자 진폐 진단에는 단순 흉부 촬영(2번)이 표준으로, 진폐는 단순흉부X선으로 병형을 판정한다. CT는 보조검사. 표준지식으로 판단.","basis":"general"},{"id":250,"year":"2020","num":3,"q":"진폐증에는 소음영과 대음영이 있는데 다음 중 대음영에 해당하는 것은?","c":["밀도가 3/3","최대 길이가 20mm","모양이 불규칙적인데 3mm 초과 10mm 이하","r형의 음영이 다수 존재","q/q, q/t로 표현할 수 있음"],"a":2,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"진폐 대음영(large opacity)은 긴지름이 10mm(1cm)를 초과하는 음영으로, '최대 길이 20mm(2번)'가 이에 해당한다. 3mm 초과 10mm 이하·q/q·r형 등은 소음영이다. 표준 ILO 분류로 판단.","basis":"general"},{"id":251,"year":"2020","num":4,"q":"진폐증의 병형이 제 1형 이상인 경우 요양급여의 지급 대상이 될 수 있는 질병은?","c":["비활동성 폐결핵","기관지 확장증","심근경색","위암에서 전이된 폐암","뇌출혈"],"a":2,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"진폐 병형 1형 이상에서 요양급여 대상이 되는 합병증으로 보기 중 기관지확장증(2번)이 해당한다. 비활동성 폐결핵은 제외되고, 심근경색·전이성 폐암·뇌출혈은 진폐 합병증이 아니다. 진폐법 합병증 기준으로 판단.","basis":"general"},{"id":252,"year":"2020","num":5,"q":"새집증후군, 헌집증후군의 원인은?","c":["직무스트레스 등의 사회심리적 원인","바이러스, 곰팡이, 꽃가루 등의 생물적 요인","이산화탄소, 이산화황 등의 화학적 요인","온도, 습도등의 물리적 요인","모두 해당"],"a":5,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"새집·헌집증후군의 원인은 화학적(VOC·포름알데히드)·생물적(곰팡이·꽃가루)·물리적(온습도)·심리사회적 요인이 모두 복합적으로 작용하므로 '모두 해당(5번)'이 정답. 표준지식으로 판단.","basis":"general"},{"id":253,"year":"2020","num":6,"q":"새로 지은 건물에서 점막자극 증상, 두통, 현기증을 느낄 수 있다. 이를 저감시키기 위한 방법으 로 맞는 것은?(정확하지 않지만 이런 맥락이었습니다. 보기탈족)","c":["환기는 4회 실시하되 5분 미만으로 한다.","공기 중 균을 죽이기 위해 습도는 낮게 유지한다","입주 3일 전 온도를 올리고 환기시키는 베이크아웃이 도움이 된다.","커튼, 카펫은 세탁하지 않는다.","겨울철 낡은 집에서 결로 발생 시 환기는 시행하지 않는다."],"a":3,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"실내공기 저감법으로 입주 전 실내온도를 높이고 환기하는 베이크아웃(3번)이 도움이 된다. 환기 시간을 늘리고 습도는 적정 유지하며 커튼·카펫 세탁, 결로 시 환기가 옳으므로 나머지는 틀리다. 표준지식으로 판단.","basis":"general"},{"id":254,"year":"2020","num":7,"q":"중금속 납에 대한 설명으로 옳은 것은?","c":["인체 내 생물학적 기능이 어느 정도 있다.","어린이의 지능발달과 같은 건강영향에 대한 역치가 있다.","주로 흡입, 섭취를 통해 체내로 들어오고 적혈구와 결합되어 태반을 통과하지 못한다.","세포 내 –SH기와 결합하여 heme의 합성 등 효소를 방해한다.","고령, 뼈질환, 임신, 갑상선 기능항진증이 있는 경우 뼈의 납이동이 감소하여 실제 노출 수준보다 혈중 납 농도가 낮게 측정된다."],"a":4,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록: 납·비소·수은의 공통 분자기전은 효소 활성부위의 Sulfhydryl(–SH)기에 결합해 헴 합성 등 효소를 방해하는 것이다(보기4 정답). 납은 생물학적 기능이 없는 비필수 원소이고(보기1 오답), 어린이 신경발달에는 안전 역치가 없으며(보기2 오답), 적혈구에 결합하지만 태반은 통과한다(보기3 오답). 뼈 turnover 증가(임신·갑상선기능항진 등)에서는 뼈 납이 혈중으로 재방출되어 오히려 BLL이 높아진다(보기5 오답).","basis":"lecture"},{"id":255,"year":"2020","num":8,"q":"납 노출에 대한 설명으로 옳은 것은?","c":["빈혈은 정구성 정색소성 빈혈로 망상적혈구 수는 증가하지 않는다.","Free erythrocyte protoporphyrin 또는 ZPP의 감소로 알 수 있다.","근위 세뇨관 손상, 고요산혈증, 통풍 등이 나타날 수 있다.","남성 불임, 정자 수와 같은 생식기능 장애는 나타나지 않는다.","만성 노출을 확인하는 가장 확실한 방법은 chest X-ray이다."],"a":3,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록(납-만성 임상상): 납은 요산 배설을 저하시켜 고요산혈증·통풍(Saturnine gout)을 유발하고 만성 간질성 신염·근위세뇨관 이상을 일으킨다. ①빈혈은 정구성/소구성이며 heme 합성 억제이므로 정색소성 아님, ②ZPP는 '증가'로 확인, ④정자 수·운동성 저하 등 생식독성이 나타남, ⑤진단은 chest X-ray가 아니라 혈중납(BLL)·ZPP이므로 모두 오답. 정답 ③.","basis":"lecture"},{"id":256,"year":"2020","num":9,"q":"카드뮴과 관련해서","c":["일본에서 해산물과 관련하여 중독사례가 있음","노출후 수시간만에 간에 흡수되어 혈중농도가 급감하며 신장에 서 재흡수됨","폐부종 호흡곤란과 같은 호흡기 증상은 없음","세뇨관 손상으로 인한 저분자 단백뇨가 말기에 흔하게 나타남","골연화, 골절과 같은 뼈에 대한 작용 때문에 착화치료가 반드시 필요하다"],"a":2,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록(카드뮴 동태학): 흡수된 카드뮴은 간·신장에 전체 부담량의 50% 이상 분포하며 간에서 메탈로티오네인과 결합해 저장되다 신장 세뇨관을 손상시킨다. ①이타이이타이는 해산물이 아니라 오염된 쌀·논 관개수, ③흄 흡입시 금속열·화학적 폐렴 등 호흡기 증상 있음, ④저분자 단백뇨(β2-MG)는 말기가 아니라 초기·특징적 소견, ⑤카드뮴은 킬레이션 비권장이므로 오답. 정답 ②(간 흡수·신장 관련 서술)가 상대적으로 옳음.","basis":"lecture"},{"id":257,"year":"2020","num":10,"q":"수은에 대해서 옳은 것은?","c":["수은중독의 대표적 증상은 신전근 마비이다","금속으로 노출 시 상당량이 흡수된다","만성노출시 신경학적 증상이 없다","태반을 통과해 태아에 해롭다","급성 노출시 착화치료는 불필요하며 추가 폭로예방이 가장 중요 하다"],"a":4,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록(수은-유기수은): 메틸수은은 태반·BBB를 자유롭게 통과해 태아 뇌에 도달(선천성 미나마타병). ①신전근 마비는 납, ②금속(원소)수은은 소화기 흡수 ≈0%로 상당량 흡수되지 않음(흡입으로 흡수), ③만성노출시 떨림·erethism 등 신경증상 있음, ⑤급성 노출도 형태에 따라 킬레이션이 필요할 수 있어 모두 부적절. 정답 ④.","basis":"lecture"},{"id":258,"year":"2020","num":11,"q":"20년동안 차체 용접 작업을 하고 있는 45세의 남자 근로자가 보행장 애, 손발의 떨림, 행동 저하 등을 주소로 병원에 내원하였다. 내원 후 시행 한 일반 혈액검사, 생화학검사, 흉부 방사선 검사, 심전도 검사, 뇌파검사 에서 이상소견을 보이지 않았으며 신경학적 검사에서 가면양 얼굴 (masked face), 수지진전, 하지감각 이상, 상하지 근력저하 및 보행 장애, 행동 저하등의 소견이 관찰되었다. 이 환자의 진단을 위해 필요한 검사 는? 뇌MRI t1강조 영상","c":["흉부 X ray","전혈 검사","요중 뮤콘산","미복원",""],"a":1,"prof":"김양우","theme":"방사선·대기오염","unc":1,"src":"pdf","expl":"차체 용접 20년, 가면양얼굴·수지진전·보행장애는 망간 중독(파킨슨양)을 시사하며 뇌 MRI T1 강조영상에서 기저핵 고신호가 진단에 유용. 강의록에 망간 관련 근거는 없고 보기가 훼손되어 있어 정답 검토 불가로 유지.","basis":"general"},{"id":260,"year":"2020","num":13,"q":"다음 중 내분비 장애물질에 대해 옳은 것은?","c":["자연호르몬과 같이 쉽게 분해되고 불안정하다.","체내에는 잔류하지 않지만 환경에 잔류하여 환경오염을 일으킨다.","체내 조직이나 지방에 축적되는 이유는 지질친화성 때문이다.","임신 혹은 모유수유 과정에서는 적절한 차단기능이 있어 자손세대에 전달되지 않는다.","먹이사슬 아래단계의 개체에 큰 영향을 미친다."],"a":3,"prof":"김환철","theme":"내분비장애물질","unc":0,"src":"pdf","expl":"강의록(PAGE 21-22)에서 POPs/EDC는 강한 지용성(지질친화성)으로 지방조직에 축적된다고 명시하므로 3번이 옳다. 자연호르몬과 달리 안정·잔류(1번 오류), 체내에도 축적(2번 오류), 태반·모유로 자손에 전달(4번, PAGE 22 오류), 먹이사슬 상위 개체에 농축(5번 오류).","basis":"lecture"},{"id":261,"year":"2020","num":14,"q":"다음 중 내분비 장애물질의 기전에 대해 옳지 않은 것은?","c":["호르몬과 비슷한 구조를 가진 물질이 호르몬과 유사한 반응을 일으킨다.","호르몬 수용체를 봉쇄하여 호르몬의 결합을 차단한다.","비정상적인 연쇄반응을 촉발한다.","납은 갑상선호르몬, 성장호르몬에 작용하여 소아의 성장과 발육을 저해한다.","다이옥신은 수용체에 직접 결합하여 암발생을 차단한다."],"a":5,"prof":"김환철","theme":"내분비장애물질","unc":0,"src":"pdf","expl":"강의록(PAGE 10)에서 다이옥신·PCBs는 수용체에 결합해 비정상 연쇄반응을 촉발하여 암을 '유발'하는 방아쇠(trigger)작용을 한다. 5번은 '암발생을 차단'이라 하여 반대로 서술되었으므로 옳지 않은 것이 맞다. 정답 5번 유지.","basis":"lecture"},{"id":262,"year":"2020","num":15,"q":"내분비계 장애물질에 해당하는 것은?","c":["산업폐기물","인공 및 자연 호르몬","농약","중금속","모두 해당"],"a":5,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"표준지식: 내분비계 장애물질(환경호르몬)에는 산업폐기물, 인공·자연 호르몬, 농약, 중금속이 모두 포함된다. 강의록에는 별도 각론 없음. 정답 ⑤ 모두 해당.","basis":"general"},{"id":263,"year":"2020","num":16,"q":"내분비계 장애물질과 그 유해 효과로 틀린 것은?","c":["DDT – 생리이상, 발달저하, 미숙아","수은 – 중추신경계 이상, 뇌성마비","BPA – 정자수 증가, 성조숙증","PCBs – 저체중아, 과다색소증, 생리이상","프탈레이트 – 남성생식기 결함 증가"],"a":3,"prof":"김환철","theme":"내분비장애물질","unc":0,"src":"pdf","expl":"강의록(PAGE 17)에서 BPA는 정자수 '감소'(생식능력 저하)와 성조숙증 등과 연관된다. 3번은 '정자수 증가'로 잘못 연결되어 틀린 항목이 맞으므로 정답 3번 유지.","basis":"lecture"},{"id":264,"year":"2020","num":23,"q":"산소 농도에 영향을 주지 않으면서 전신 독성을 나타내는 기체는?","c":["일산화탄소","시안화물","브롬화메틸","황화수소","염화메틸렌"],"a":3,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"표준지식: 브롬화메틸(메틸브로마이드)은 산소를 치환하거나 산소 운반·이용을 직접 차단하지 않고 흡수 후 전신(폐+중추신경) 독성을 나타내는 물질이다. ①CO·②시안·④황화수소는 산소 운반/세포 이용을 차단, ⑤염화메틸렌은 체내에서 CO로 대사되어 산소운반 저하와 연관되므로 제외. 강의록은 메틸브로마이드를 훈증제로 다루나 문항 취지는 표준지식에 가까움. 정답 ③.","basis":"general"},{"id":265,"year":"2020","num":24,"q":"암 발생 기전으로 맞는 것은?","c":["개시단계는 친전자성 발암물질 노출로 시작되며, DNA 돌연변이와 관계 있다.","개시단계에는 비가역적, 누적 효과를 보이는 문턱 용량이 존재한다.","촉진단계에서 용량-반응 곡선이 역치 관계를 따르지 않는다.","염증 매개체가 암 개시자 역할을 한다.","증식 단계에서 종양 크기 커지나 전이는 하지 않는다."],"a":1,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"pdf","expl":"강의록(발암기전): 개시단계는 친전자성 발암물질이 DNA와 결합해 비가역적 돌연변이를 일으키며 시작된다(정답 1). 함정: 개시는 역치 없는 확률(no-threshold) 모델, 문턱용량은 촉진단계 특성이며, 염증매개체는 개시자가 아닌 촉진자로 작용.","basis":"lecture"},{"id":266,"year":"2020","num":29,"q":"국제암연구소IARC 발암물질 분류중 부위가 다른 한가지를 고르 시오","c":["니켈화합물","콜타르피치","결정형 유리규산","나무분진","철과 강철주조"],"a":4,"prof":"김환철","theme":"직업성암·발암물질","unc":1,"src":"ai_uncertain","expl":"니켈·콜타르피치·결정형유리규산·나무분진·철과강철주조 중 나무분진(목분진)은 비강·부비동암(및 비인두암)을 일으켜 부위가 다르다(정답 4). 나머지는 폐암과 관련. 다만 명확한 강의록 근거는 없어 불확실.","basis":"general"},{"id":267,"year":"2020","num":30,"q":"유기용제에 대한 설명으로 옳은 것을 고르시오.","c":["유기용제의 효능을 결정하는 요인은 그 물질의 지방용해성이다","피부로 흡수되는 경우 수용성만을 고려한다","유가용제의 주된 흡수경로는 피부이다.","유기용제의 흡수량은 휴식시나 과한 업무시와 별 차이가 없다","유기용제의 흡수를 고려하는 인자로 작업행태는 중요하지 않다."],"a":1,"prof":"김양우","theme":"유기용제","unc":0,"src":"ai","expl":"강의록(지용성/수용성 대사 섹션)에 유기용제의 지용성이 핵심 성질로 기술됨. 유기용제의 효능(용해력)과 생체 흡수·신경친화성을 결정하는 것은 지방용해성(지용성)이므로 보기1이 정답. 피부흡수는 지용성이 주로 관여하고, 주 흡수경로는 호흡기이며 격한 업무 시 흡수 증가하므로 나머지는 오답.","basis":"lecture"},{"id":268,"year":"2020","num":31,"q":"유기용제의 생물학적 모니터링에 대한 설명으로 옳은 것은?","c":["환경 측정이 더 정확하지만 검증을 위해 생물학적 모니터링을 함께 시행한다","주로 호흡기로 흡수되는 물질에서 더 유용하다","흡수된 유기용제의 반감기에 크게 좌우되지 않는다는 장점이 있다","주로 소변 중 대사산물이 유용하게 활용된다","대사산물의 측정시간에 크게 좌우되지 않는다"],"a":4,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"생물학적 모니터링은 주로 소변 중 대사산물을 측정해 총노출을 평가함(4번). 환경측정보다 개인 총흡수량 반영에 유용하고, 반감기·채취시간에 크게 좌우되는 특성이 있어 나머지 보기는 오답. 강의록 직접 근거 부족으로 표준지식 적용.","basis":"general"},{"id":269,"year":"2020","num":32,"q":"유기용제와 요중 대사산물의 연결로 옳은 것은?","c":["톨루엔 - 마뇨산","벤젠 - 메틸마뇨산","노말헥산 - 만델릭산","크실렌 - 2, 5 헥산디온","스티렌 - 페놀"],"a":1,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"톨루엔-마뇨산 연결이 옳다. 벤젠-페놀/뮤콘산(메틸마뇨산은 크실렌), 노말헥산-2,5-헥산디온(만델산은 스티렌), 크실렌-메틸마뇨산, 스티렌-만델산이므로 나머지 보기는 잘못된 연결.","basis":"general"},{"id":270,"year":"2020","num":33,"q":"유기용제의 피부질환 설명 중 옳은 것은?","c":["알레르기 접총성 피부염이 가장 많다.","Patch test가 유용하다.","색소 이상은 피부염과 관련이 없다.","유기용제 접촉 후 피부 질환 예방을 위해 유기용제로 씻는다.","미복원"],"a":2,"prof":"김환철","theme":"직업성암·발암물질","unc":1,"src":"ai","expl":"유기용제 피부질환은 자극성 접촉피부염이 가장 흔하나, 감별·진단에 첩포검사(patch test)가 유용하다(정답 2). 색소이상도 관련되며, 유기용제로 씻는 것은 금기이므로 오답.","basis":"general"},{"id":271,"year":"2020","num":34,"q":"34세 신발 공장에서 일하는 여성이 몸에 이상을 느껴 내원하였다. 옳은 것은?","c":["신경독성은 다발성, 원위부에서 중심부로 일어난다.","신경섬유 조직검사 소견상 특이 사항 없다.","근육 관련이며 신경과는 관련 없다.","비복원","비복원"],"a":1,"prof":"김양우","theme":"유기용제","unc":0,"src":"ai","expl":"신발공장 접착제(노말헥산) 말초신경병증은 원위부에서 근위부로 진행하는 대칭성 다발성 감각운동 신경병증이다(보기1 정답). 신경 조직검사는 축삭변성 소견을 보이고, 근육이 아닌 신경병증이므로 보기2·3은 오답.","basis":"general"},{"id":274,"year":"2020","num":37,"q":"우리나라에서 직업성 암으로 인정받은 것 중 가장 많은것은?","c":["폐암","혈액암","직장암","위암","구강암"],"a":1,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"pdf","expl":"우리나라 직업성 암 인정 중 가장 많은 것은 폐암(정답 1).","basis":"general"},{"id":275,"year":"2020","num":38,"q":"가장 많은 직업성 피부질환은?","c":["접촉성 피부염","접촉성 두드러기","건선","직업성 여드름","백반종"],"a":1,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"pdf","expl":"가장 흔한 직업성 피부질환은 접촉성 피부염(정답 1).","basis":"general"},{"id":276,"year":"2020","num":39,"q":"10m 깊이에 호흡 정지 잠수를 하던 사람이 수면 위로 올라왔다. 발생할 가 능성이 가장 높은 건강장애는?","c":["폐압착증","저산소증","동맥혈기체색전증","탄산가스과다증","폐과팽창증후군"],"a":5,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"pdf","expl":"강의록: 호흡정지잠수 후 수면 상승 시 폐 기체 팽창으로 폐과팽창증후군(5번) 발생. 폐압착증은 하강 시 손상으로 오답 함정.","basis":"lecture"},{"id":277,"year":"2020","num":40,"q":"34세 여자가 알루미늄을 가공하여 휴대폰 버튼을 만드는 공장에 다니고 있다. 눈이 따갑고 눈이 잘 안보인다고 하며, 같이 일하는 동료도 시력 감퇴를 보였다고 한다. 이때 문제되는 물질은?","c":["methanol","Mn","CS2","H2S","toluene"],"a":1,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"알루미늄 가공(휴대폰 버튼) 세척 공정에서 동료도 함께 나타나는 양안 시력저하·시신경 증상은 메탄올 중독이다. Mn(파킨슨양)·CS2·H2S·톨루엔은 이 급성 시각장애 집단발생과 부합하지 않음.","basis":"general"},{"id":278,"year":"2020","num":41,"q":"가구공장에서 페인트칠을 하며 일하는 40대 남자가 숨이 차고 가슴이 답 답하다며 내원하였다. 최고호기유속을 측정해보니 업무시작시보다 업무종 료시에 30% 더 감소했다고 한다. 원인은?","c":["라텍스","알루미늄","나무분진","유리섬유","이소시아네이트"],"a":5,"prof":"김양우","theme":"유기용제","unc":0,"src":"ai","expl":"가구/페인트 도장에서 업무 후 최고호기유속(PEFR)이 업무 전보다 크게 감소하는 것은 직업성 천식이며, 도장·폴리우레탄 공정의 대표 원인물질은 이소시아네이트이다. 라텍스·알루미늄·나무분진·유리섬유는 이 도장작업 감작원으로 부적절.","basis":"general"},{"id":279,"year":"2020","num":42,"q":"환자가 피로와 권태감, 어지러움을 느껴서 혈액검사를 해보니 빈혈이 있 고 백혈구 수치가 떨어져있었다. 벤젠노출이 의심되어 추가검사를 하려고 하 는데 그에 알맞은 것은?","c":["신경전도검사","요중 마뇨산","요중 메틸마뇨산","요중 뮤콘산","골수검사"],"a":4,"prof":"김양우","theme":"유기용제","unc":0,"src":"ai","expl":"빈혈·백혈구감소로 벤젠 노출이 의심될 때 노출 확인 추가검사는 요중 뮤콘산이다. 마뇨산(톨루엔)·메틸마뇨산(크실렌)·신경전도검사는 무관하고, 골수검사는 노출 확인용이 아님.","basis":"general"},{"id":280,"year":"2020","num":43,"q":"자동차 수리하는 일을 하는 27세 남자가 입사 2개월 만에 목에 덩이가 만져 져 병원에서 생검을 하였다. 진단 결과 비호지킨 림프종이 나와 산재보험을 신 청했다. 업무상 재해 판정위원회는 직무와 연관성이 적다는 판단을 내렸다. 이 유는? 질병의 종류","c":["환자의 나이","환자의 성별","유해물질의 종류","발병까지의 시간",""],"a":5,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록 업무기인성: 입사 2개월은 림프종 잠복기로 너무 짧아 발병까지의 시간을 이유로 직무 연관성이 적다고 판정한다. 보기 배열상 정답 5번은 '발병까지의 시간'에 해당한다.","basis":"lecture"},{"id":281,"year":"2020","num":44,"q":"발암 물질에 일정 기간 노출된 근로자에 대해 현재 업무에 종사하고 있을 때 뿐 아니라 퇴직한 후에도 매년 1회씩 본인 부담 없이 산재예방기금으로 직 업성 암을 조기발견하기 위해 실시하는 건강검진은? 일반 건강 진단","c":["특수 건강 진단","임시 건강 진단","수시 건강 진단","건강관리수첩 건강 진단",""],"a":5,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록: 퇴직 후에도 산재예방기금으로 직업성 암을 조기발견하는 검진은 건강관리수첩 (소지자) 건강진단이며, 보기 배열상 정답 5번에 해당한다.","basis":"lecture"},{"id":282,"year":"2020","num":45,"q":"40세 여성 근로자가 발작성 경련성 복통, 황달, 소변색 변화, 전신쇠약을 주소로 내원했다. 합성피혁을 제조하는 공장에서 근무한지 2개월이 됐고, 채용시 건강진단 에서 정상 간기능 소견이 나왔다. 병원에서 수행한 간기능 검사에서 AST 583, ALT 539, GGT 49. 입운 1일차 의식이 혼미해졌다. 원인 물질은?","c":["염화비닐","이소프로필알코올","디메틸포름아마이드","다환적 방향적 탄화수소","메틸부틸케톤"],"a":3,"prof":"김양우","theme":"유기용제","unc":0,"src":"ai","expl":"합성피혁 제조 급성 전격성 독성간염(AST/ALT 급상승)+간성혼수는 디메틸포름아마이드(DMF)의 전형이다. 나머지는 이 급성 간부전 양상과 부합하지 않음.","basis":"general"},{"id":283,"year":"2020","num":46,"q":"다음 중 가장 위급하게 다뤄야 하는 것은?","c":["열탈진","열실신","열사병","열경련"],"a":3,"prof":"박신구","theme":"기후·온열","unc":0,"src":"ai","expl":"열사병은 고체온과 중추신경 손상을 동반하는 응급질환으로 열탈진·열실신·열경련보다 가장 위급하다. 강의록에 위급도 근거는 없어 표준지식으로 판단.","basis":"general"},{"id":284,"year":"2020","num":47,"q":"국제암연구소(IRAC) 발암물질 분류 1군인 것은?","c":["수은","톨루엔","카페인","알코올","휴대폰 전자파"],"a":4,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"pdf","expl":"IARC Group 1(인체 발암성 확실) 물질은 알코올(음주)이다(정답 4). 수은·톨루엔은 미분류/불충분, 카페인은 Group 3, 휴대폰 전자파는 Group 2B이므로 오답.","basis":"general"},{"id":285,"year":"2020","num":48,"q":"알레르기성 접촉 피부염에서 가장 흔한 것은?","c":["니켈","구리","주석","카드뮴","알루미늄"],"a":1,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록(니켈): 알레르기성 접촉 피부염의 가장 흔한 원인 금속은 니켈(장신구·시계줄)이다. 정답 ①.","basis":"lecture"},{"id":286,"year":"2020","num":49,"q":"사막지역 한낮에 밖에서 일하다가 두통, 현기증을 호소하더니 졸리다고 한 후 갑자기 섬망과 의식소실을 보였다. 피부엔 땀이 없고 건조하였으며 몸 이 몹시 뜨거웠다. 가장 먼저 해야 할 처치는?","c":["그늘로 데려가 휴식한다.","정맥 주사로 수액 공급","급속히 냉탕에 넣어 몸을 식힌다.","옷을 벗기고 호흡을 유지시킨다.","생리식염수를 먹인다."],"a":4,"prof":"박신구","theme":"기후·온열","unc":1,"src":"pdf","expl":"무한증·건조·고체온의 열사병으로 원칙적 최우선은 급속 냉각(3번)이나, 이 문제는 의식소실 환자에서 기도확보(옷 벗기고 호흡 유지)를 정답으로 제시하였다. 동일 시나리오(id 17)는 냉각을 정답으로 하여 상충하고 강의록 근거가 없어 확정 곤란.","basis":"general"},{"id":287,"year":"2020","num":50,"q":"휴업급여는 업무상 사유로 부상을 당하거나 질병에 걸린 근로자에게 요 양으로 취업하지 못한 기간에 대해 지급하는 것으로 여기서 1일당 지급액은 평균임금의 몇 %인가?","c":["40%","50%","60%","70%","80%"],"a":4,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"ai","expl":"강의록: 휴업급여 1일당 지급액은 평균임금의 70%(4번)이다.","basis":"lecture"},{"id":288,"year":"2020","num":51,"q":"30세 남자가 3시간 전부터 메스껍고, 어지러워서 병원에 왔다. 오늘부터 알루미 늄 주조 공장에서 근무를 시작하였다. 당일 낮 최고 기온은 35도였으며, 공장 안은 알루미늄 용해로 때문에 온도가 더 높았다. 오전 8시부터 근무를 시작한 근무 도중 계속 땀이 났으며, 목이 말라 얼음물 3L 이상 마셨다. 혈압 124/82 mmHg, 맥박 96회 /분, 호흡 20회/분, 체온 36.6도이다. 땀은 계속 나고 있다. 진단은?","c":["열경련","열부종","열사병","열실신","열탈진"],"a":5,"prof":"박신구","theme":"기후·온열","unc":0,"src":"pdf","expl":"장시간 발한 후 물(전해질 없는 얼음물)만 3L 이상 마셨고 활력징후·체온 정상이며 오심·어지럼을 보이는 것은 염분 소실형 열탈진에 해당한다. 강의록 세부 근거는 없어 표준지식으로 판단.","basis":"general"},{"id":289,"year":"2020","num":52,"q":"감암병에 의해 가장 많이 발생하는 질병은?","c":["뇌졸중","폐부종","근골격계 통증","현기증","흉통"],"a":3,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"pdf","expl":"강의록: 감압병 증상 중 근골격계증상이 가장 흔하며(mc), 관절 주위 또는 관절에 국한된 통증이 대표적. 따라서 근골격계 통증(3번)이 정답.","basis":"lecture"},{"id":290,"year":"2020","num":53,"q":"초보 잠수자가 30m의 수심에서 급히 수면으로 상승하였다. 수면 위로 올라오고 수 분이 경과되지 않아 의식 상실에 빠졌다. 가장 가능성이 높은 원인은?","c":["질소마취","폐 과팽창증","저산소증","동맥혈 기체 색전증","탄산가스과다증"],"a":4,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"ai","expl":"강의록: 30m 급상승 후 수 분 내 의식상실은 동맥혈 기체 색전증(4번). 상승 중/후 10분 이내 발작·의식상실이 전형. 질소마취(가역)나 폐과팽창증은 함정 오답.","basis":"lecture"},{"id":291,"year":"2020","num":54,"q":"고온 순화를 따르는 생리적 변화로 옳은 것은?","c":["심박동수가 증가한다","직장의 온도가 증가한다","염분의 배출속도가 감소한다","땀의 분비 속도가 감소한다","알도스테론이 감소한다"],"a":3,"prof":"박신구","theme":"기후·온열","unc":0,"src":"pdf","expl":"고온순화 시 알도스테론 증가로 땀·소변의 염분 배출(속도·농도)이 감소하여 염분을 보존한다. 심박수·직장온도는 감소, 땀 분비 속도는 증가, 알도스테론은 증가하므로 나머지는 오답. 강의록 근거 없어 표준지식.","basis":"general"},{"id":292,"year":"2020","num":55,"q":"우리나라에서 직업성 암으로 인정받은 것 중 가장 많은 것은?","c":["혈액암","폐암","대장암","위암","구강암"],"a":2,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"ai","expl":"우리나라 직업성 암 인정 중 가장 많은 것은 폐암(정답 2). 보기 배열상 2번이 폐암.","basis":"general"},{"id":293,"year":"2020","num":56,"q":"시차적응 증후군에 대한 설명으로 옳은 것은?","c":["시차적응을 위해 음식을 비행기에서 많이 먹어둔다","날짜 변경선과 관련이 있다.","시간대를 빠르게 넘나드는 여행을 할 때 발생한다","미국에서 한국으로 올 때가 한국에서 미국 갈 때보다 힘들다.","북 남 방향으로 이동할 때 빈번하게 발생한다."],"a":3,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"ai","expl":"강의록: 시차증후군은 시간대를 빠르게 넘나드는 여행 시 발생(3번). 날짜변경선 무관(2번 오답), 북남 방향 미발생(5번 오답), 동쪽이 더 힘들므로 4번은 반대 서술로 오답.","basis":"lecture"},{"id":294,"year":"2020","num":57,"q":"자주 있는 연장근무, 교대근무, 정신적인 업무 스트레스로 인해 나타날 수 있는 질환의 종류는 무 엇인가?","c":["콩팥질환","갑상선 질환","간 질환","심혈관계 질환","심장질환"],"a":4,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"pdf","expl":"장시간 연장근무·교대근무·직무스트레스는 뇌심혈관계(심혈관계) 질환을 유발한다(정답 4). 강의록의 직무스트레스·과로 관련 순환기질환 서술과 일치.","basis":"lecture"},{"id":295,"year":"2020","num":58,"q":"잠수병은 잠수 시 조직에 과포화되어 있던 불황성 기체가 급부상하면서 배출되지 못하고 기포를 형성해 발생하는 것으로 생 각한다. 그 치료법 가운데 기포제거에 가장 효과가 있을 것으로 생각되는 것은?","c":["산소흡입","수액정맥주사","스테로이드 투여","급격 감압","재 가압"],"a":5,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"pdf","expl":"강의록: 감압병 치료는 재가압산소요법. 재가압(5번)이 기포 제거에 가장 효과적.","basis":"lecture"},{"id":296,"year":"2020","num":59,"q":"다음 중 산업재해에 대한 예방대책으로 가장 중요한 것은?","c":["안전한 작업조건","의료 구급제도","적절한 보상","적정 배치","안전훈련"],"a":1,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록 예방대책 모형: 산업재해 예방에 가장 중요한 것은 유해작업조건 자체를 없애는 안전한 작업조건 확보(1번)이다. 구급제도·보상·배치·훈련은 부차적이다.","basis":"lecture"},{"id":297,"year":"2020","num":60,"q":"사고의 원인을 사람(man), 매체(media), 관리(management) 등 네가지 요인으로 설명하여 잘 드러나지 않는 작업장의 사고 원인을 밝혀내는데 유용한 이론은?","c":["도미노 이론","다수요인 이론","신도미노 이론","인간요인 이론","하인리히 이론"],"a":2,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록(4M-다수요인이론): 사람·매체·관리 등 4M 요인으로 잠재 사고요인을 밝히는 이론은 다수요인이론(2번)이다.","basis":"lecture"},{"id":298,"year":"2020","num":61,"q":"그래프로 나옴. 250 500 1000 2000 4000 8000에서 각각 청력손실 10 10 20 30 60 40 dB. 3분법으로 계산하면?","c":["20","30","35","40","45 6) 50"],"a":1,"prof":"김양우","theme":"소음·진동","unc":0,"src":"pdf","expl":"3분법=(500+2×1000+2000)/4=(10+2×20+30)/4=80/4=20이므로 보기1(20)이 정답. 4000·8000Hz는 3분법에 포함되지 않는 함정.","basis":"lecture"},{"id":299,"year":"2020","num":62,"q":"체온조절의 생리적 기전으로 적절한 것은?","c":["저체온, 갑상선 호르몬 분비 증가","저체온, 호흡 촉진","저체온, 몸의 떨림 감소","고체온, 근육 긴장","고체온, 피부혈관 수축"],"a":1,"prof":"박신구","theme":"기후·온열","unc":0,"src":"pdf","expl":"추울 때 열 생산을 위해 갑상선호르몬 분비가 증가하므로 '저체온-갑상선호르몬 분비 증가'가 옳다. 나머지는 생리적 방향이 반대. 강의록에 직접 근거는 없어 표준생리로 설명.","basis":"general"},{"id":300,"year":"2020","num":63,"q":"산업재해지표 강도율 4가 의미하는 것은 무엇인가?","c":["4*연간 근로 손실일수/ 100만 작업시간","4*연간 재해 건수/상시 근로자수*100","4*연간 재해 건수/100만 작업시간","4*연간 근로 손실일수/1000 작업시간","4*연간 재해자/1000 근로자"],"a":4,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록: 강도율 = (연간 근로손실일수/연작업시간)×1,000. 따라서 '강도율 4'는 4×(연간 근로손실일수/1000 작업시간) 형태(4번)와 일치한다.","basis":"lecture"},{"id":301,"year":"2020","num":64,"q":"34세 남자가 산에서 조난 당했다. 체온은 34.2도였다. 환자의 생리학적 변화 로 옳은 것은?","c":["혈관 확장","호흡수 감소","심박수 감소","심박출량 감소","혈압 감소"],"a":2,"prof":"박신구","theme":"기후·온열","unc":1,"src":"pdf","expl":"체온이 떨어지면(34.2도) 방향상 호흡·심박·심박출량·혈압이 저하되고 혈관은 수축(확장 아님)하므로 '호흡수 감소'가 정답 취지에 부합한다. 다만 경도 저체온 초기엔 빈맥·빈호흡이 흔해 병기에 따라 애매하고 강의록 근거가 없다.","basis":"general"},{"id":302,"year":"2020","num":65,"q":"유해물질 허용기준에 대해 옳은 것은?","c":["시간 가중 표준치 (TLA-TWA)는 하루 6시간 주 30시간 폭로되어도 건강장해 없는 평균 농도","단시간 폭로 허용치 (TLA-STEL)는 작업 시간 계속해서 60분간 폭 로되어도 장해없는 평균 농도","복합 물질 폭로 시 허용농도는 상가 작용만을 인정한다","TLV 미만에서는 직업병을 인정하는 지표로 쓰인다","TLV 수준에서는 개인의 감수성이 고려되지 않는다."],"a":5,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"ai","expl":"강의록(ACGIH-TLV): TLV 수준에서도 개인 감수성이 고려되지 않아 소수 근로자는 영향받을 수 있다(5번)가 옳다. TWA는 8시간/주40시간, STEL은 15분 기준이라 1·2번 오답, 복합노출은 상가작용만이 아니며 TLV미만은 직업병 인정지표가 아니므로 3·4번 오답.","basis":"lecture"},{"id":303,"year":"2020","num":66,"q":"우리나라에서 가장 많은 업무상 재해는?","c":["감전","추락","폭발","파열","화재"],"a":2,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록(2018 산업재해 역학): 사고사망자는 '떨어짐(추락)'(38.7%)이 가장 많다. 보기에 전도/넘어짐이 없으므로 강의록상 추락(떨어짐)이 사망 재해 1위인 근거로 추락(2번)이 정답이다. 표준 통계상 사고 건수 1위는 넘어짐(전도)임에 유의.","basis":"lecture"},{"id":304,"year":"2020","num":67,"q":"염기 서열의 변화 없이 DNA 및 히스톤의 2차적인 변화로 인해 유전자 발 현이 변화되는 것으로서, 대물림되는 변화의 원인이 되는 것은?","c":["돌연변이","후생염색체","염색체 변이","단백질 변성","아폽토시스"],"a":2,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"pdf","expl":"염기서열 변화 없이 DNA·히스톤 2차 변화로 유전자 발현이 바뀌고 대물림되는 것은 후생유전으로 보기 2번 후생염색체가 정답이다.","basis":"general"},{"id":305,"year":"2020","num":68,"q":"다음 중 연구설계 중 근거 수준이 가장 높은 것은?","c":["사례 연구","단면 연구","코호트 연구","환자-대조군 연구","생태학적 연구"],"a":3,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"pdf","expl":"강의록(2주차) 역학연구설계 근거수준 도표에서 관찰연구 중 코호트 연구가 가장 근거수준이 높고, 그 다음이 환자-대조군·단면·생태학적 연구 순이다. 보기에 실험연구가 없으므로 관찰연구 중 최상위인 코호트 연구(3번)가 정답.","basis":"lecture"},{"id":306,"year":"2020","num":69,"q":"우리나라에서 매년 발생하는 직업성 질환 중 가장 많이 발생하는 질환은?","c":["암","진폐증","정신질환","뇌심혈관계 질환","근골격계 질환"],"a":5,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"강의록 전사본(김환철 교수): 우리나라 직업성 질환 중 사고를 제외하면 근골격계 질환이 가장 많다고 강의함. 따라서 근골격계 질환(5번)이 정답. 전사본 근거이나 명확하다.","basis":"transcript"},{"id":307,"year":"2020","num":70,"q":"두 개 이상의 물질이 혼합될 때 독성이 없던 한 물질이 다른 물질과 만나 독성 을 가지게 되는 효과는?","c":["길항 효과(antagonistic effect)","상승 효과(synergistic effect)","잠재 효과(potential effect)","상가 효과(additive effect)","독립 효과(independent effect)"],"a":3,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"pdf","expl":"독성이 없던 물질이 다른 물질과 만나 독성을 갖게 되는 것은 잠재(potentiating) 효과다. 강의록(2주차) 혼합물폭로에 잠재효과가 열거되어 있으며, 현재 정답 2번(상승효과)은 틀렸고 정답은 3번(잠재효과).","basis":"lecture"},{"id":308,"year":"2020","num":71,"q":"직업성질환 중 1차예방에 해당하는 것은?","c":["의학적 단체검진","개별 검진 및 진료","직업성질환 관리","임상적 치료 및 재활","대체 및 제거, 공학적 통제"],"a":5,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"pdf","expl":"강의록 예방단계: 1차예방은 발생 이전에 원인을 제거하는 것으로 유해요인의 대체·제거, 공학적 통제(5번)가 해당한다. 집단·개별 검진은 2차예방, 치료·재활은 3차예방이다.","basis":"lecture"},{"id":309,"year":"2020","num":72,"q":"다음 환경오염 중 가장 많은 건강부담(질병손해)를 야기하는 것은?","c":["대기오염","기후변화","수질오염","토양오염","폐기물오염"],"a":1,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(대기오염): 실내외 대기오염으로 2012년 WHO 추산 약 700만명 사망, 담배보다 큰 피해로 환경오염 중 가장 큰 건강부담을 야기. 따라서 대기오염(1번)이 정답.","basis":"lecture"},{"id":310,"year":"2020","num":73,"q":"건강 위해성 평가의 궁극적인 목적은 무엇인가?","c":["노출 평가","위해성 평가","위해도 관리","위험성 확인","용량-반응 관계 규명"],"a":3,"prof":"임종한","theme":"환경오염·지구환경","unc":1,"src":"pdf","expl":"강의록(2주차) 위해도평가의 궁극 목적은 위해도 특성규명(Risk Characterization)으로, 보기 중 이에 해당하는 것은 '위해성 평가'가 아니라 관리가 아닌 결정 단계다. 다만 보기 구성상 위해도 결정 항목이 없고, 현재 정답 3번(위해도 관리)은 위해성평가 이후 별개 단계이므로 애매하다.","basis":"lecture"},{"id":311,"year":"2020","num":74,"q":"이상 고온, 말라리아 뎅기열 등의 아열대 질환 증가, 사막화 진행의 근본적 인 원인은?","c":["수질오염","기후 변화","대기 오염","산업 폐기물 오염","토양 오염"],"a":2,"prof":"박신구","theme":"기후·온열","unc":0,"src":"pdf","expl":"강의록(3주차 기후변화와 건강): 이상 고온·아열대 감염병(말라리아·뎅기열) 증가·사막화의 근본 원인은 지구온난화, 즉 기후변화다. 수질·대기·토양오염은 지역적 요인일 뿐 근본 원인이 아니다.","basis":"lecture"},{"id":312,"year":"2020","num":77,"q":"다음 중 산업화 전에는 280ppm이었다가 2100년에는 450ppm까지 상승하 여 비가역적인 지구온난화를 야기하는 물질은?","c":["NO2","CO2","오존","CFC","메탄"],"a":2,"prof":"임종한","theme":"위해성평가·온난화","unc":0,"src":"pdf","expl":"강의록: 산업화 이전 약 280ppm이던 이산화탄소(CO2) 농도가 지속 상승해 비가역적 지구온난화를 일으키는 대표 물질이므로 2번(CO2)이 옳다. 강의록은 최근 40년간 CO2 농도 증가와 CO2가 온난화 최대 기여물질임을 명시한다.","basis":"lecture"},{"id":313,"year":"2020","num":78,"q":"다음 중 기후 변화에 의해 가장 클 것으로 예상되는 영향은?","c":["이상 기후로 인한 사망, 질병, 부상의 증가","말라리아, 뎅기열과 같은 감염성 질환의 증가","대기오염 수준의 변화로 인한 순환계, 호흡기 질환의 증가","영양 결핍의 증가"],"a":1,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록: WHO 기후변화 건강영향에서 이상기후(극한 기상현상)로 인한 사망·질병·부상 증가가 가장 큰 영향으로 제시됨. 감염병·대기오염·영양결핍은 상대적으로 작음.","basis":"lecture"},{"id":314,"year":"2020","num":79,"q":"[임종한] 국내 CO2 배출에 가장 많은 기여를 한 요인은?","c":["산업","농장","교통","공장","폐기물"],"a":1,"prof":"임종한","theme":"위해성평가·온난화","unc":0,"src":"pdf","expl":"화석연료를 사용하는 산업·에너지 부문이 국내 CO2 배출의 최대 요인으로, 보기 중 1번(산업)이 정답이다. 강의록은 화석연료 연소가 주요 배출원임을 강조하나 국내 부문별 배출 순위를 명시하지 않아 표준지식으로 판단한다.","basis":"general"},{"id":315,"year":"2020","num":81,"q":"adhd와 관련되어 어린이 제품에 사용이 금지된 식품 첨가물은?","c":["아스파탐","안식향산나트륨","타르색소","아질산염","MSG"],"a":3,"prof":"임종한","theme":"식품오염·식중독","unc":0,"src":"pdf","expl":"타르색소(합성 식용색소)는 ADHD·과잉행동 연관성으로 어린이 제품 사용이 제한된다. 강의록의 착색제(식용색소) 항목 및 표준지식상 정답은 3번 타르색소.","basis":"general"},{"id":316,"year":"2020","num":82,"q":"다음 중 생물학적 식중독인 것은?","c":["복어독","마비성 패독","보툴리누스","미복원 000톡신","미복원 000톡신"],"a":3,"prof":"임종한","theme":"식품오염·식중독","unc":0,"src":"pdf","expl":"강의록 분류상 보툴리누스는 세균성(생물학적) 식중독이고, 복어독·마비성 패독은 자연독(동물성 자연독)에 해당한다. 따라서 생물학적 식중독은 3번 보툴리누스.","basis":"lecture"},{"id":317,"year":"2020","num":83,"q":"우리나라 식중독의 단일 원인 중 가장 많은 원인은?","c":["장염 비브리오","황색포도알균","살모넬라","노로바이러스","캠필로박터 제주니"],"a":4,"prof":"임종한","theme":"식품오염·식중독","unc":1,"src":"ai_uncertain","expl":"우리나라 식중독의 단일 원인 중 최다는 통상 노로바이러스(바이러스성)로 알려져 있어 정답 4번이 타당. 다만 강의록에 국내 원인균 순위 통계가 없어 표준지식 기준이며, 연도·집계 방식에 따라 살모넬라 등과 순위가 바뀔 수 있어 불확실.","basis":"general"},{"id":318,"year":"2020","num":84,"q":"다음 중 일상생활반경에서 전리 방사선 노출이 가장 많은 것은?","c":["의료용 조사","핵실험으로 인한 핵 낙진","자연 방사선","TV/ 전자오락","핵 발전소"],"a":3,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(방사선): 일상 방사선 노출은 자연방사선이 가장 큼(평생 300mSv 중 대부분). 의료용 조사가 그다음이며 핵낙진·발전소·TV 기여는 작음. 정답 자연방사선(3번).","basis":"lecture"},{"id":319,"year":"2020","num":85,"q":"다음 중 방사능 물질이 붕괴될 때 일초당 방출되는 방사능의 양은?","c":["Bq","Gy","Sv","Roenten"],"a":1,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(방사선): 방사능(방사선 물질의 양)은 매초 붕괴 수로 표시하며 표준단위는 베크렐(Bq), 1Bq=매초 1개 핵변환. Gy는 흡수선량, Sv는 등가/유효선량 단위. 정답 Bq(1번).","basis":"lecture"},{"id":320,"year":"2020","num":86,"q":"다음 중 방사선 손상의 확률적 영향에 해당하는 것을 고르시오.","c":["태아사망","선천기형","암","발육부전","정신지체"],"a":3,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(방사선): 확률론적(stochastic) 영향은 문턱값 없이 발생확률이 선량에 비례하는 암·유전적 영향. 태아사망·기형·발육부전·정신지체는 문턱값이 있는 결정론적 영향. 정답 암(3번).","basis":"lecture"},{"id":321,"year":"2020","num":87,"q":"[임종한] 최근 WHO의 국제연구암연구소에서 극저주파의 발암등급을 지 정하였다. 몇 등급인가?","c":["1","2A","2B","C","해당 없음"],"a":3,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(방사선): IARC는 극저주파(ELF) 전자기장을 group 2B(possibly carcinogenic)로 분류(소아백혈병과 제한적 연관). 보기 2B에 해당하는 3번이 정답.","basis":"lecture"},{"id":322,"year":"2020","num":88,"q":"국내 대기오염 물질 중 오염 수준이 현저하게 향상된 물질은?","c":["이산화질소","아황산가스","오존","미세분진","벤젠"],"a":2,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(대기오염) 연간 대기오염도 추이상 아황산가스(SO2)가 저황연료·정책으로 현저히 개선된 물질. 오존·미세분진 등은 정체·악화 추세. 정답 아황산가스(2번).","basis":"lecture"},{"id":323,"year":"2020","num":89,"q":"대기오염 오염원 중에서 대도시인 경우 비중이 커지는 것은?","c":["자동차","화력발전소","공장","폐기물 소각","난방"],"a":1,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"pdf","expl":"강의록(대기오염): 도시화·교통정체로 대도시에서는 자동차(교통관련) 배출 비중이 커짐(도로변 측정소 NO2·PM 농도 상승). 정답 자동차(1번).","basis":"lecture"},{"id":324,"year":"2020","num":90,"q":"대기오염으로 인한 사망(조기사망)으로 가장 흔한 것은?","c":["암","뇌혈관 질환","심혈관 질환","급성 호흡기 질환","만성 호흡기 질환"],"a":1,"prof":"김양우","theme":"방사선·대기오염","unc":1,"src":"pdf","expl":"강의록(대기오염)에서는 대기오염 사망으로 심혈관질환·폐암·COPD 증가를 강조하나, 본 문항은 '가장 흔한 것'으로 암(1번)을 정답으로 함. 강의록상 심혈관질환 비중도 크게 다뤄져 정답이 다소 애매하나 강의록 근거로 뒤집기 부족.","basis":"lecture"},{"id":325,"year":"2021","num":1,"q":"물질의 대사과정에 설명이다. Phase II에 해당하는 반응은?( )","c":["산화(oxidation)","환원(reduction)","가수분해(hydrolysis)","접합(conjugation)","아폽토시스(apotosis)"],"a":4,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"ai","expl":"강의록(2주차) 대사 Phase II 반응은 conjugation(접합)·acetylation·methylation이다. 산화·환원·가수분해는 Phase I이므로 정답은 4번(접합).","basis":"lecture"},{"id":326,"year":"2021","num":2,"q":"다음중 연구설계 단계에서 다른 요인의 노출과 삐뚤림을 배제 할수 있는 연구는?( )","c":["실험연구","환자-대조군연구","코호트연구","사례군연구","생태학적연구"],"a":1,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"ai","expl":"강의록(2주차)에 연구자가 노출 여부와 삐뚤림을 미리 통제하는 것은 실험연구라 명시되어 있다. 따라서 교란·삐뚤림을 배제할 수 있는 연구는 1번 실험연구.","basis":"lecture"},{"id":327,"year":"2021","num":3,"q":"우리나라에서 매년 발생하는 질환 중 점차 감소하는 질환은? ( )","c":["암","뇌혈관질환","심혈관질환","호흡기질환","감염성질환"],"a":5,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"ai","expl":"강의록·표준 지식상 만성질환(암·심뇌혈관·호흡기)은 증가 추세이나 감염성 질환은 위생·상수도 개선으로 감소 추세다. 따라서 정답은 5번(감염성질환).","basis":"general"},{"id":328,"year":"2021","num":4,"q":"두 가지 이상 물질이 혼합되는 혼합물에서 물질 상호간에 작 용이 협동적으로 증가되는 현상이며, 그 작용의 증가 정도가 산술적인 합 정도로 나타나는 현상은? ( )","c":["길항효과(Antagonistic effects)","상승효과(Synergistic effects)","잠재효과(Potentiating effects)","상가효과(Additive effects)","독립효과(Independent effects)"],"a":4,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"ai","expl":"두 물질의 작용이 협동적으로 증가하되 그 정도가 산술적 합 수준으로 나타나는 것은 상가(additive) 효과다. 강의록(2주차) 혼합물폭로 항목에 상가효과가 열거되어 정답은 4번.","basis":"lecture"},{"id":329,"year":"2021","num":5,"q":"직업성질환의 일차예방으로 적절한 것은?( )","c":["개별 검진, 진료","직업성질환 감시","의학적인 집단 검진","임상적인 치료, 재활","대체 혹은 제거, 공학적인 통제 명과 대조하신후 날시기 바랍니다. ◎◎ 학과 의학과 학년 2 학 학번 성명 점 ○ 수"],"a":5,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"ai","expl":"강의록: 직업성질환 1차예방은 유해요인의 대체 혹은 제거, 공학적 통제(5번)이다. 검진은 2차, 치료·재활은 3차예방.","basis":"lecture"},{"id":330,"year":"2021","num":6,"q":"다음 중 환경오염으로 발생하는 사망과 장애를 포괄하는 개념 은?( )","c":["중대재해","유병률","질병부담","생존률","복합이환률"],"a":3,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"ai","expl":"환경오염으로 발생하는 사망과 장애(조기사망+장애로 인한 손실)를 포괄하는 개념은 질병부담(질병부담, DALY 등)이다(3번). 강의록에 직접 정의는 없어 표준지식으로 판단.","basis":"general"},{"id":331,"year":"2021","num":7,"q":"물의 오염도를 나타내는 기준으로, 유기물(有機物) 등의 오염 물질을 산화제로 산화할 때 필요한 산소량은?( )","c":["용존산소(DO)","부유물질 (SS)","산소이온 농도(OC)","화학적 산소요구량(COD)","생물화학적 산소요구량(BOD)"],"a":4,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"ai","expl":"유기물 등 오염물질을 산화제로 산화할 때 필요한 산소량은 화학적 산소요구량(COD)이다. 미생물 분해에 필요한 양은 BOD이므로 정답은 4번(COD).","basis":"lecture"},{"id":332,"year":"2021","num":8,"q":"말라리아 및 뎅기열 증가, 슈퍼 태풍의 발생, 사막화 및 황사 발생 등의 피해가 야기되는 근본적인 원인은? ( )","c":["수질오염","기후변화","대기오염","유해화학물질 오염","폐기물 오염"],"a":2,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"ai","expl":"강의록: 말라리아·뎅기열, 슈퍼태풍, 사막화·황사 등은 기후변화(에너지위기·지구온난화)로 인한 피해. 정답 기후변화(2번).","basis":"lecture"},{"id":333,"year":"2021","num":9,"q":"음용수 처리시 사용되는 물질로 형성되어 암 발생 가능성을 높일 가능성이 있는 물질은?( )","c":["질산성질소","암모니아성 질소","페놀","벤젠","트리할로메탄류"],"a":5,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"ai","expl":"강의록(3주차) 소독부산물 항목에 염소소독으로 생성되는 트리할로메탄류(THMs)가 명시되며 강의 전사본에서 THMs가 암 발생과 연관된다고 설명한다. 정답은 5번(트리할로메탄류).","basis":"lecture"},{"id":334,"year":"2021","num":10,"q":"일본 폐광산에서 발생한 오염물질로 토양오염을 거쳐 노출된 사람들에게 신장 손상, 골다공증을 유발한 물질은? ( )","c":["수은","비소","납","카드뮴","망간"],"a":4,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"ai","expl":"강의록(카드뮴): 일본 도야마현 진즈가와강 유역 광산 폐수로 논이 오염되어 발생한 이타이이타이병(신장 세뇨관 손상, 골연화증·골절)의 원인 물질은 카드뮴이다. 정답 ④.","basis":"lecture"},{"id":335,"year":"2021","num":11,"q":"지구상의 물중 식수로 쓸 수 있는 담수의 비율은?( )","c":["0.5% 이하","0.5-1.0%","1.0-3.0%","3.0-5.0%","5.0-10.0%"],"a":2,"prof":"임종한","theme":"환경오염·지구환경","unc":0,"src":"ai","expl":"[정답 수정: 1번→2번] 강의록(3주차) '지구상의 물 중 식수로 쓸 수 있는 담수는 0.65%'로 명시되어 있다. 0.65%는 '0.5-1.0%' 구간에 해당하므로 정답은 2번이며, 현재 정답 1번(0.5% 이하)은 틀렸다.","basis":"lecture","a_orig":1},{"id":336,"year":"2021","num":12,"q":"다음중 기후 온난화 유발 효과가 가장 커서 기후변화의 대책 에 우선적인 감축 목표로 설정되는 물질은? ( )","c":["메탄","이산화탄소","오존","이산화질소","염화불화탄소"],"a":2,"prof":"임종한","theme":"위해성평가·온난화","unc":0,"src":"ai","expl":"강의록: 지구온난화 기여도가 가장 커서 우선적 감축 목표가 되는 핵심 물질은 이산화탄소이므로 2번이 옳다. 강의록은 원인물질 중 이산화탄소가 가장 큰 영향을 미치며 감축의 핵심임을 명시한다.","basis":"lecture"},{"id":337,"year":"2021","num":13,"q":"기후변화로 인한 건강영향중 가장 발생 가능성이 높은 것으 로 평가되는 것은?( )","c":["극한 기상현상으로 인한 사망과 질병, 부상의 증가","영양 결핍의 증가","아열대성 감염질환 증가","설사성질환의 질병부담 증가","대기오염수준의 변화로 인한 순환계-호흡기질환의 증가"],"a":1,"prof":"임종한","theme":"위해성평가·온난화","unc":0,"src":"ai","expl":"강의록의 건강피해 서술상 이상고온(폭염) 등 극한 기상현상으로 인한 사망·질병·부상 증가가 가장 발생 가능성이 높은 것으로 평가되므로 1번이 옳다. 감염질환·영양결핍 등도 언급되나 발생 확실성 측면에서 극한 기상 영향이 우선한다.","basis":"lecture"},{"id":338,"year":"2021","num":14,"q":"우리나라 온실가스 배출 중 가장 많은 비중을 차치하고 있는 것은? ( )","c":["교통","산업공정","에너지","농업","폐기물"],"a":3,"prof":"임종한","theme":"위해성평가·온난화","unc":0,"src":"ai","expl":"우리나라 온실가스 배출은 화석연료 연소 기반의 에너지 부문이 가장 큰 비중(약 87%)을 차지하므로 3번(에너지)이 옳다. 강의록은 화석연료 연소가 주 배출원이라 하나 부문별 통계를 직접 제시하지 않아 표준 국가 인벤토리 지식으로 판단한다.","basis":"general"},{"id":339,"year":"2021","num":15,"q":"기후변화로 이대로 탄소 배출이 이루어지면 지구 생태계는 회복불능의 상태에 빠질 것으로 예상됩니다. 이렇게 되지 않기 위해서 전문가들은 탄소 배출량을 제로(탄소 중립)로 만들 것 을 제안했는데, 우리나라도 최근 선언한 탄소 배출 제로 연도 는 언제인가? ( )","c":["2030년","2035년","2040년","2045년","2050년"],"a":5,"prof":"임종한","theme":"위해성평가·온난화","unc":0,"src":"ai","expl":"강의록: 미국·주요국이 2050년까지 넷 제로(탄소중립)를 목표로 제시했고 우리나라도 2050 탄소중립을 선언했으므로 5번(2050년)이 옳다.","basis":"lecture"},{"id":340,"year":"2021","num":16,"q":"중국에서 분유속에 발견된 오염물질로 영유아들에게서 신장 결석으로 사망사건까지 일으킨 유해물질은? ( )","c":["타르색소","MSG","아질산염","안식향산나트륨","멜라민"],"a":5,"prof":"임종한","theme":"식품오염·식중독","unc":0,"src":"ai","expl":"2008년 중국 분유 사건에서 단백질 함량을 위조하려 첨가된 멜라민이 영유아 신장결석·사망을 일으켰다. 강의록에 직접 서술은 없으나 대표적 식품오염 사례로, 정답 5번 멜라민.","basis":"general"},{"id":341,"year":"2021","num":17,"q":"다음 중 감염형 식중독으로 볼 수 있는 것은? ( )","c":["포도상 구균 식중독","장구균 식중독","보툴리누스 식중독","비브리오 식중독","크로스트리디엄 식중독"],"a":2,"prof":"임종한","theme":"식품오염·식중독","unc":0,"src":"ai","expl":"[정답 수정: 4번→2번] 강의록 분류상 감염형(food infection)은 살모넬라·호염균·장구균 식중독이고, 비브리오는 독소형에 포함되어 있다. 보기 중 감염형은 2번 장구균 식중독이므로 현재 정답 4번(비브리오)은 강의록 기준 오류로 판단, 2번으로 수정.","basis":"lecture","a_orig":4},{"id":342,"year":"2021","num":18,"q":"다음중 피레스로이드계 살충제로 신경독성, 발암성을 보이는 것은? ( )","c":["파라티온","말라티온","피프로닐","다이아지논","에티온"],"a":3,"prof":"임종한","theme":"식품오염·식중독","unc":1,"src":"ai_uncertain","expl":"강의록: 피레스로이드계 중 피프로닐(fipronil)은 신경독성·발암성을 보인다. 나머지 보기(파라티온·말라티온·다이아지논·에티온)는 유기인제이므로 정답 3번 피프로닐.","basis":"lecture"},{"id":343,"year":"2021","num":19,"q":"GMO 재배에 사용된 살충제로 그룹 2A 발암물질이고, 조산, 유산, 선천성기형, 불임을 야기할수 있다고 알려진 물질은?( )","c":["비펜트린","에톡사졸","피프로닐","피리다벤","글리포세이트"],"a":5,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"ai","expl":"글리포세이트(glyphosate)는 GMO 재배에 쓰이는 제초제로 IARC Group 2A로 분류되며 생식독성이 보고된다(정답 5).","basis":"general"},{"id":344,"year":"2021","num":20,"q":"다음중 방사선에 가장 민감성을 보이는 신체 부위는?( )","c":["타액선","혈관내피","골수 세포","위장관 상피세포","췌장 세포"],"a":3,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"ai","expl":"강의록(방사선): 세포분열이 왕성한 조직이 방사선에 민감(급성방사선증후군에서 골수 파괴 강조). 보기 중 골수세포(3번)가 가장 민감. Bergonié-Tribondeau 법칙과도 일치.","basis":"lecture"},{"id":345,"year":"2021","num":21,"q":"체르노빌 사고에서 방출된 방사선 오염물질로 반감기가 30년 이어서 지금도 방사선 오염의 위험을 보이고 있는 물질은?( )","c":["세슘","우라늄","삼중수소","몰리브덴","이리디엄"],"a":1,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"ai","expl":"강의록(방사선): 세슘137(Cs-137)은 반감기 30.2년으로 체르노빌 사고 후 장기간 잔류하며 식품오염을 통한 노출로 사회 이슈화. 정답 세슘(1번).","basis":"lecture"},{"id":346,"year":"2021","num":22,"q":"다음 중 식품에서의 방사성 오염을 표시할 때 사용되는 방 능의 양을 표시하는 단위는? ( )","c":["absorbed dose, D","exposure, X","equivalent dose, H","Bequerel, Bq","Roenten, R"],"a":4,"prof":"임종한","theme":"식품오염·식중독","unc":0,"src":"ai","expl":"방사능(방사성 붕괴)의 양을 나타내는 SI 단위는 베크렐(Bq, 초당 붕괴 수)이다. 흡수선량(Gy), 등가선량(Sv), 조사선량(R)과 구분되며, 강의록 직접 근거는 없으나 표준지식상 정답 4번 Bq.","basis":"general"},{"id":347,"year":"2021","num":23,"q":"송전선을 최근 도심에서는 지중화하는 작업을 진행하고 있 이들 지중화 송전선에서 나오는 극저주파(extremely lo frequency)의 발암등급은?( )","c":["1 등급","2A 등급","2B 등급","C 등급","분류 할 수 없음"],"a":3,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"ai","expl":"강의록(방사선): 극저주파(ELF)는 IARC 발암등급 2B(group IIB, 소아백혈병과 제한적 연관). 정답 2B등급(3번).","basis":"lecture"},{"id":348,"year":"2021","num":24,"q":"우리나라 대기오염물질 오염원중에서 대도시에서 특히 비 이 커지는 것은? ( )","c":["공장","자동차","화력발전소","난방","폐기물 소각"],"a":2,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"ai","expl":"강의록(대기오염): 대도시에서는 도시화·교통정체로 자동차(교통관련) 배출 비중이 커짐. 정답 자동차(2번).","basis":"lecture"},{"id":349,"year":"2021","num":25,"q":"대기오염으로 인한 사망(조기사망)으로 가장 흔하게 발생하 질환은? ( )","c":["뇌혈관질환","암","심혈관질환","만성호흡기질환","급성호흡기질환"],"a":3,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"ai","expl":"강의록(대기오염): 대기오염 조기사망은 심혈관질환 증가와 밀접(마무리글에서 암·심혈관·뇌혈관질환 위험 상승 강조). 보기 중 심혈관질환(3번)이 가장 흔한 사망으로 제시됨.","basis":"lecture"},{"id":350,"year":"2021","num":26,"q":"런던스모그의 주범인 대기오염물질로 가스상이지만, 미세분 형태로도 흡수되어 심각한 건강피해를 유발하는 물질은? ( )","c":["벤젠","아황산가스","이산화질소","일산화탄소","오존"],"a":2,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"ai","expl":"런던스모그(1952)의 주범은 아황산가스(SO2)로, 가스상이지만 미세분진에 흡착되어 심각한 호흡기 건강피해 유발. 정답 아황산가스(2번). 강의록에 런던 스모그 사례 제시되나 원인물질 명시는 표준지식 보완.","basis":"lecture"},{"id":351,"year":"2021","num":27,"q":"히말라야 산맥과 같은 높은 고지에서 생리적 변화를 일으키 게 하는 가장 중요한 요소는? ( )","c":["낮은 기온","낮은 압력","낮은 습도","낮은 산소 분압","자외선 조사량"],"a":4,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"ai","expl":"강의록: 고지대 생리변화를 일으키는 가장 중요한 요소는 산소분압 저하. 낮은 산소분압(4번)이 정답.","basis":"lecture"},{"id":352,"year":"2021","num":28,"q":"직업성 피부 질환 중 가장 흔한 피부 질환은 무엇인가? ( )","c":["접촉성 피부염","접촉 두드러기","건선","직업성 여드름","백반증"],"a":1,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"ai","expl":"가장 흔한 직업성 피부질환은 접촉성 피부염(정답 1).","basis":"general"},{"id":353,"year":"2021","num":29,"q":"다음은 소음 작업장에서 일하고 있는 근로자가 특수건강검진 을 시행하여 얻은 우측 귀의 주파수별 청력손실이다. 이 근로 자의 3분법에 의한 청력 손실 정도는 얼마인가?( ) 주파수(Hz) 250 500 1000 2000 4000 8000 청력손실(dB) 10 10 20 30 60 40","c":["20.0","30.0","35.0","40.0","50.0"],"a":1,"prof":"김양우","theme":"소음·진동","unc":0,"src":"ai","expl":"3분법=(a+2b+c)/4, 500/1k/2k Hz. (10+2×20+30)/4=80/4=20이므로 보기1(20.0)이 정답. 고주파 4000(60dB)에 현혹되지 말 것.","basis":"lecture"},{"id":354,"year":"2021","num":30,"q":"40세 여자가 시야흐름을 주증상으로 병원에 왔다. 직업력을 물어보니 휴대폰 제조회사에서 알루미늄판을 깎아 휴대전화 버 튼을 만드는 일을 하고 있다고 한다. 같은 일을 하는 동료도 시야 흐림 증상이 있다고 한다. 원인물질은? ( )","c":["메탄올","톨루엔","자일렌","노르말헥산","트리클로로 에틸렌"],"a":1,"prof":"김양우","theme":"유기용제","unc":0,"src":"ai","expl":"휴대폰 알루미늄판 절삭·세척 공정에서 동료도 함께 나타나는 양안 시야흐림(시신경 독성)은 메탄올 중독이다. 톨루엔·자일렌·노말헥산·TCE는 이 집단 시각장애를 설명 못함.","basis":"general"},{"id":355,"year":"2021","num":31,"q":"40세 남자가 3개월 전부터 호흡곤란이 나타나기 시작하여 증 상이 점차 심해져 병원에 왔다. 5년 전부터 악기 제조 작업을 하고 있었다. 작업관련성을 확진하기 위한 검사는?( )","c":["폐기능 검사","가슴 X선 촬영","가슴 컴퓨터단층촬영","특이 기관지 유발검사","기관지폐포 세척액검사"],"a":4,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"ai","expl":"5년간 악기 제조작업 후 진행성 호흡곤란 — 직업성 천식/과민성폐렴을 확진하려면 특이 기관지 유발검사(4번)로 원인물질에 대한 기도반응을 직접 확인한다. 표준 직업성 호흡기질환 진단으로 판단.","basis":"general"},{"id":356,"year":"2021","num":32,"q":"피로, 권태감 및 어지러움을 주증상으로 내원한 환자가 혈 검사 결과 빈혈소견과 백혈구의 감소를 보였다. 직업력상 벤 에 대한 폭로가 의심되었다. 원인물질 확인을 위한 추가 검 로 가장 적합한 것은? ( )","c":["신경전도검사","요중 마뇨산 검사","요중 메틸마뇨산 검사","요중 뮤콘산","골수검사"],"a":4,"prof":"김양우","theme":"유기용제","unc":0,"src":"ai","expl":"빈혈·백혈구감소로 벤젠 노출이 의심될 때 원인물질 확인에는 요중 뮤콘산이 가장 적합하다. 마뇨산(톨루엔)·메틸마뇨산(크실렌)·신경전도검사는 무관, 골수검사는 노출 확인용이 아님.","basis":"general"},{"id":357,"year":"2021","num":33,"q":"자동차 정비를 하는 30세 남자가 입사후 2개월 시점에 목 덩이가 생겨 생검을 한 결과 비호지킨 림프종으로 진단받아 재요양 신청을 하였다. 역학조사 결과 벤젠을 포함한 여러 지 발암물질에 노출된 것이 확인되었으나, 업무상질병판정위 회에서는 질병과 업무의 관련성은 낮은 것으로 평가하였다. 이유로 타당한 것은? ( )","c":["질병의 종류","근로자의 나이","근로자의 성별","노출 유해물질의 종류","입사 후 질병 발생까지의 기간"],"a":5,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"ai","expl":"입사 2개월 만에 비호지킨림프종이 진단되어, 벤젠 노출로 혈액암이 발생하기에는 잠복기(입사 후 질병 발생까지 기간)가 너무 짧아 업무관련성이 낮게 평가됐다(정답 5). 직업성 암은 대개 10년 이상의 잠복기가 필요.","basis":"general"},{"id":358,"year":"2021","num":34,"q":"직업병이 다수 발생한 경우 지방노동관서의 장의 명령에 라 사업주가 실시하는 건강진단은? ( )","c":["일반건강진단","수시건강진단","특수건강진단","배치전 건강진단","임시건강진단"],"a":5,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"ai","expl":"강의록: 직업병 유소견자가 다수 발생할 우려 등에 지방노동관서장의 명령에 따라 사업주가 실시하는 진단은 임시건강진단(5번)이다.","basis":"lecture"},{"id":359,"year":"2021","num":35,"q":"환자는 합성피혁을 제조하는 공장에 입사한지 2개월 되었 배치전 건강검진에서는 정상 간기능 소견을 보였다. 내원당 수행한 간기능 검사에서 AST 583, ALT 539, GGT 49 IU이 고, 입원 1일째 의식이 혼미해 졌다. 다음 중 가장 의심되 원인 물질은?( )","c":["염화비닐","이소프로필 알코올","다환적 방향족 탄화수소","디메틸 포름아마이드","메틸부틸케톤"],"a":4,"prof":"김양우","theme":"유기용제","unc":0,"src":"ai","expl":"합성피혁 제조에서 급성 독성간염(AST 583/ALT 539)+간성혼수를 일으키는 물질은 디메틸포름아마이드(DMF)이다. 이 문항은 보기4가 DMF로 정답 위치가 맞음. 염화비닐·이소프로필알코올·PAH·메틸부틸케톤은 부적합.","basis":"general"},{"id":360,"year":"2021","num":36,"q":"세계보건기구 산하 국제암연구기구(IARC)에 의해 인체발암 질(group 1)로 분류된 것은?( )","c":["수은","톨루엔","카페인","포름알데히드","휴대폰 전자파"],"a":4,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"ai","expl":"IARC Group 1은 포름알데히드이다(정답 4). 수은·톨루엔은 해당 없음, 카페인 Group 3, 휴대폰전자파 2B.","basis":"general"},{"id":361,"year":"2021","num":37,"q":"악기공장에서 일하는 30세 여성 근로자가 가슴이 답답하여 내원하였다. 우레탄 스프레이로 도장작업을 한지 1년이 되었 고, 휴가를 가면 증상이 좋아진다고 하였다. 흉부청진시 거품 소리가 들렸고, 폐기능 검사에서 FEV1은 70%이었다. 다음중 가장 적절한 조치는 무엇인가? ( )","c":["항생제를 사용한다.","근무시간을 줄인다.","비노출 부서로 옮긴다.","스프레이를 붓으로 바꾼다.","작업시 마스크를 착용한다."],"a":3,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"ai","expl":"우레탄 스프레이(이소시아네이트) 도장작업 후 휴가 시 호전되는 직업성 천식으로, 가장 근본적 조치는 원인 노출을 차단하는 비노출 부서 전환(3번)이다. 마스크·근무시간 단축은 소극적. 표준지식으로 판단.","basis":"general"},{"id":362,"year":"2021","num":38,"q":"알레르기 접촉성 피부염을 일으키는 가장 흔한 금속은?( )","c":["니켈","구리","주석","카드뮴","알루미늄"],"a":1,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"ai","expl":"알레르기 접촉피부염을 일으키는 가장 흔한 금속은 니켈(nickel)이다(정답 1).","basis":"general"},{"id":363,"year":"2021","num":39,"q":"살을 빼기 위해 2주 전부터 달리기를 시작한 40세 여자가 공 원을 달리던 중 갑자기 메스꺼움이 생기고, 머리가 아프고 몸 에 힘이 빠져 주저앉았다. 가쁜 숨을 내쉬는 여자의 체온은 3 8℃였고 피부는 땀으로 습한 상태였다. 날씨는 화창했고 기온 은 32℃, 상대습도는 70%였다. 가장 적합한 조치는? ( )","c":["그늘로 데리고 가서 쉬게 한다.","정맥주사로 수액을 공급한다.","급속히 냉탕에 넣어 몸을 식힌다.","옷을 벗기고 호흡을 유지한다.","생리 식염수를 먹인다."],"a":1,"prof":"박신구","theme":"기후·온열","unc":0,"src":"ai","expl":"체온 38도·발한(습한 피부)·오심·탈진은 열탈진으로, 최우선 처치는 그늘로 옮겨 휴식시키는 것(및 수분보충)이다. 고체온·무한증의 열사병이 아니어서 냉탕 급속냉각은 부적절. 강의록 근거 없어 표준지식.","basis":"general"},{"id":364,"year":"2021","num":40,"q":"준 종합병원 결핵병동에서 근무하던 간호사가 결핵에 걸린, 후 산재 승인을 받고, 치료를 위해 6개월간 휴직하였다. 이 간 호사는 산재보험에서 평균급여의 몇 %를 휴업급여로 받을 수 있는가?( )","c":["50%","70%","80%","90%","100%"],"a":2,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"ai","expl":"강의록: 휴업급여는 평균임금의 70%(2번)를 지급한다.","basis":"lecture"},{"id":365,"year":"2021","num":41,"q":"41세 남자 건설노동자가 무더운 여름철에 별도의 휴식 없이 장시간 야외 작업 중 의식을 잃고 쓰러졌다. 동료 근로자가 발 견하고 병원으로 옮겼으나 다음날 사망하였다. 병원으로 이송 당시 체온은 42℃였으며 피부는 뜨겁고 건조하였다. 진단으로 가장 적절한 것은? ( )","c":["열경련","열부종","열사병","열실신","열탈진"],"a":3,"prof":"박신구","theme":"기후·온열","unc":0,"src":"ai","expl":"체온 42도, 뜨겁고 건조한 피부(무한증), 의식소실 후 사망은 전형적 열사병이다. 열탈진·열경련 등은 고체온·중추신경 손상을 동반하지 않아 감별된다. 강의록 세부 근거 없어 표준지식.","basis":"general"},{"id":366,"year":"2021","num":42,"q":"감압병의 증상 중 가장 빈번하게 나타나는 증상은?( )","c":["현기증","호흡곤란","근골격계 통증","사지마비","고혈압"],"a":3,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"ai","expl":"감압병의 가장 빈번한 증상은 관절·근육 통증(근골격계 통증, 3번, bends)이다. 강의록에는 잠수·고압 환경 감압병 언급만 있어 세부는 표준지식으로 판단.","basis":"general"},{"id":367,"year":"2021","num":43,"q":"서해 해저 50m에서 잠수함이 조난되었다. 승조원들은 외 압력과 잠수함 내 압력을 같게 한 뒤 밖으로 탈출을 시도하 고, 숨을 참은 상태로 급히 수면으로 상승하였다. 발생할 있는 건강 상황은?( )","c":["질소 마취","폐과팽창증","저산소증","폐압착증","탄산가스 과다증"],"a":2,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"ai","expl":"강의록: 내외 압력을 같게 한 뒤 숨을 참고 급상승하면 상승 시 폐 기체가 팽창해 폐과팽창증(2번)이 발생. 폐압착증은 하강 시 손상이므로 오답 함정.","basis":"lecture"},{"id":368,"year":"2021","num":44,"q":"고온순화에 대한 설명으로 옳은 것은? ( )","c":["고온순화의 기간은 고온에 노출된 지 4-7일부터 시작되 12-14일 에 완성되는 것으로 알려져 있다.","고온에 노출이 중지되면 고온 순화에 의한 효과는 바로 사 진다.","고온에 순화되면 알도스테론(aldosterone)의 분비가 감소 다.","고온에 순화되면 직장온도가 증가한다.","한번 고온에 순화되었던 사람의 경우는 고온 노출 중단 후 개월 이상 경과하더라도 재순화 과정이 필요하지 않다."],"a":1,"prof":"박신구","theme":"기후·온열","unc":0,"src":"ai","expl":"고온순화는 노출 후 대개 수일부터 시작해 약 2주(12-14일)에 완성된다는 설명이 옳다. 노출 중단 후 효과는 서서히 소실되며, 순화 시 알도스테론은 증가(감소 아님), 직장온도는 감소, 장기 미노출 후엔 재순화가 필요하므로 나머지는 오답. 강의록 근거 없어 표준지식.","basis":"general"},{"id":369,"year":"2021","num":45,"q":"시차증후군에 대한 다음 설명 중 옳은 것은? ( )","c":["시차증후군 예방을 위해 비행 중에 식사의 양을 늘인다.","시차증후군은 날짜 변경선과 밀접한 관련이 있다.","한국에서 미국으로 여행할 때가 미국에서 한국으로 여행 때보다 적응이 쉽다.","동서 방향으로 2-3개 이상의 시간대를 넘을 때 발생한다.","영국에서 남아공을 여행할 때 시차증후군이 잘 발생한다."],"a":4,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"ai","expl":"강의록: 시차증후군은 동서 방향으로 여러 시간대를 빠르게 넘을 때 발생(4번). 날짜변경선 무관(2번 오답), 동쪽이 더 힘들어 3번 오답, 북남(영국⟷남아공) 미발생으로 5번 오답.","basis":"lecture"},{"id":370,"year":"2021","num":46,"q":"다음 중에서 우리나라에서 최근 10년 동안 가장 많이 요 승인된 작업관련성 질환은? ( )","c":["근골격계 질환","심뇌혈관 질환","진폐증","유기화합물 중독","중금속 중독"],"a":1,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"ai","expl":"표준지식: 우리나라 산재 승인 통계상 최근 근골격계 질환이 작업관련성 질환 중 가장 많이 승인된다. 강의록에는 통계 언급 없음. 정답 ①.","basis":"general"},{"id":371,"year":"2021","num":47,"q":"장시간의 연장 근무, 교대 근무, 정신적 업무 스트레스 등에 의해 유발되거나 혹은 악화될 가능성이 가장 높은 질환은?( )","c":["신경계질환","갑상샘 질환","콩팥질환","심혈관계 질환","호흡기 질환"],"a":4,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"ai","expl":"강의록 직무스트레스: 장시간 연장근무·교대근무·정신적 스트레스로 유발·악화되는 대표 질환은 심혈관계 질환(4번)이다.","basis":"lecture"},{"id":372,"year":"2021","num":48,"q":"잠수병은 잠수시에 조직에 과포화 되었던 불활성 기체가 급 부상하면서 폐를 통하여 배출하지 못하고 기포를 형성하면서 발생하는 것으로 생각된다. 그 치료법 가운데 기포 제거에 가 장 효과가 있을 것으로 생각되는 것은? ( )","c":["산소 흡입","수액정맥주사","스테로이드 투여","급격감압","재 가압"],"a":5,"prof":"박신구","theme":"이상기압·항공우주","unc":0,"src":"ai","expl":"강의록: 감압병 치료는 재가압산소요법. 재가압(5번)이 기포 제거에 가장 효과적.","basis":"lecture"},{"id":373,"year":"2021","num":49,"q":"화학물질을 사용하여 전자부품을 세척하는 작업장에서 직업 성 질환이 발생하였으며, 작업환경측정 평가결과는 허용기준을 초과하였다. 직업성질환 예방을 위하여 조치한 다음의 일반적 방법들 중에서 가장 소극적인 것은? ( )","c":["사용한 원인물질의 변경","작업장 환기시설 강화","개인보호구 착용 실시","작업공정의 격리","작업공정의 변경"],"a":3,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"ai","expl":"강의록 1주차 작업환경관리 원리는 대치·격리·환기·교육이며, 직업병 예방대책 중 개인보호구(PPE) 착용은 발생원 자체를 제거하지 못하는 가장 소극적 방법이다(3번). 원인물질 변경·공정 격리·환기가 더 근본적이다.","basis":"lecture"},{"id":374,"year":"2021","num":50,"q":"직업으로 인한 질병은 직업성 질환과 작업관련성 질환으로 구 분할 수 있다. 다음 중 작업관련성 질환으로 가장 적절한 것 은? ( )","c":["돈육가공 근로자의 손목굴증후군","채석 작업자의 규폐증","납제련 근로자의 납중독","인쇄소 근로자의 소음성 난청","전자부품세척 작업자의 노말헥산 중독"],"a":1,"prof":"김양우","theme":"소음·진동","unc":0,"src":"ai","expl":"강의록(PAGE 25, 52 등): 규폐증·납중독·소음성 난청·노말헥산 중독은 특정 유해인자가 직접 원인인 직업성(고유) 질환이다. 손목굴증후군(수근관증후군)은 다인자성 작업관련성 질환에 해당하므로 보기1이 정답.","basis":"general"},{"id":375,"year":"2021","num":51,"q":"직업성 암의 특성에 관한 다음 내용 중 옳은 것은?( )","c":["비직업성 암종보다 고연령층에서 발생하는 경향이 있다.","유발 잠복기간은 다양하지만 대부분의 경우 10년 미만이다.","혈액암이 직업성암 중 가장 흔한 암종이다.","일반주민들의 같은 부위에 생기는 암과 사망률은 유사하다.","발암물질 노출력을 조사하는 것이 무엇보다 중요하다."],"a":5,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"ai","expl":"직업성 암은 발암물질 노출력 조사가 가장 중요하다(정답 5). 나머지는 직업성 암 특성에 대한 반대 서술.","basis":"general"},{"id":376,"year":"2021","num":52,"q":"소음성난청에 대한 설명으로 옳은 것은? ( )","c":["대부분 편측성 난청으로 나타난다.","청력저하는 저주파 영역부터 발생한다.","소음노출을 중단한 후에는 대부분 청력저하가 진행되지 않 다.","이소골 손상, 고막 비후가 가장 흔한 원인이다.","골도 청력저하는 기도 청력저하와 동반되지 않는다."],"a":3,"prof":"김양우","theme":"소음·진동","unc":0,"src":"ai","expl":"강의록(PAGE 27, 36): 소음성 난청은 양측성, 고주파부터, SNHL이며 노출을 중단하면 대부분 청력저하가 진행되지 않으므로(NIHL 진행 정지) 보기3이 옳다. 이소골·고막(전음성) 원인은 틀림.","basis":"lecture"},{"id":377,"year":"2021","num":53,"q":"우리나라 산업재해의 현황이다. 올바른 것은? ( )","c":["최근 10년간 모든 산업재해지표(천인율, 건수율, 도수율) 증가와 감소를 반복한다.","재해지표(천인율, 건수율, 도수율)는 광업과 건설업보다 제 업에서 제일 높다.","대규모 산업장일수록 산업재해는 빈번하다.","입사 경력이 짧은 6개월 미만의 미숙련자에서 더 빈번하다.","오전10-12시경 보다 나른한 오후 2-4시경에 더 잘 일어 다."],"a":4,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"ai","expl":"강의록: 산업재해는 입사 6개월 미만 미숙련자(작업 미숙·지식 부족 등 인적요인)에서 더 빈번하다(4번). 재해지표는 광업·건설업에서 높고, 소규모 사업장에서 빈번하므로 2·3번 오답.","basis":"lecture"},{"id":378,"year":"2021","num":54,"q":"41세 남자가 배를 타고 바다낚시 중 배가 전복되어 바다에 표류하다가 구조되었다. 구조 당시 몸을 심하게 떨고 있었으 체온은 34.8℃, 혈압은 130/85mmHg이었다. 초기에 보이는 리적 변화는? ( )","c":["혈관 확장","소변량 증가","호흡수 감소","맥박수 감소","심박출량 감소"],"a":5,"prof":"박신구","theme":"이상기압·항공우주","unc":1,"src":"ai","expl":"저체온(34.8℃) 초기에는 열손실을 줄이기 위한 말초혈관 수축과 함께 심박출량 감소 등이 나타난다. 강의록에 저체온 세부 생리 서술은 없어 표준지식으로 판단하며 심박출량 감소(5번)가 정답. 초기에는 혈관 확장·소변량 증가는 아님.","basis":"general"},{"id":379,"year":"2021","num":55,"q":"거의 모든 근로자가 이 농도에 매일 하루 8시간 1주 40시 씩 계속 노출되더라도 건강상 아무런 유해작용이 나타나지 는 농도로 알려진 노출기준은?( )","c":["시간가중평균치(TLV-TWA)","단시간 노출기준치(TLV-STEL)","천정치(TLV-C)","생물학적 노출지수(BEIs)","허용농도(PELs)"],"a":1,"prof":"박신구","theme":"산업보건·관리","unc":0,"src":"ai","expl":"강의록(TLV-TWA): 매일 8시간·주 40시간 노출되어도 유해작용이 없는 농도는 시간가중평균치 TLV-TWA(1번)이다.","basis":"lecture"},{"id":380,"year":"2021","num":56,"q":"겨울철 캠핑장 텐트 안에서 난로를 피우고 잠자던 남성이 수상태로 발견되어 응급실에 내원하였다. 검사결과 혈중 카 복시헤모글로빈(COHb)은 50%로 측정되었다. 치료로 가장 절한 것은?( )","c":["수혈","수액투여","베타차단제","고압산소요법","심장율동전환"],"a":4,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"ai","expl":"강의록(CO 치료): COHb가 25% 이상, 의식소실·신경학적 결손이 있으면 고압산소요법(HBO)이 적응증이다. COHb 50% 혼수 환자에게 정답 ④ 고압산소요법.","basis":"lecture"},{"id":381,"year":"2021","num":57,"q":"진폐증의 종류에 포함되지 않는 것은? ( )","c":["석탄광부폐증","폐쇄세기관지염","흑연폐증","농부폐증","면폐증"],"a":2,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"ai","expl":"진폐증(석탄광부폐·흑연폐·면폐·농부폐 등 분진성 폐질환)에 포함되지 않는 것은 폐쇄세기관지염(2번)으로, 이는 분진 축적성 진폐가 아닌 세기관지 폐색 질환이다. 표준지식으로 판단.","basis":"general"},{"id":382,"year":"2021","num":58,"q":"연탄공장에서 30년간 일해 온 구00 님이 호흡곤란, 가래, 기 침이 지속되어 외래를 방문하였다. 진단에 있어 가장 중요한 검사는?( )","c":["흉부방사선 소견","가족력","폐기능검사","저선량흉부CT","객담도말검사"],"a":1,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"ai","expl":"연탄공장 30년 근무자의 진폐 진단에서 가장 중요한 것은 흉부방사선 소견(1번)이다. 진폐는 흉부X선 병형 판정이 진단 표준. 표준지식으로 판단.","basis":"general"},{"id":383,"year":"2021","num":59,"q":"광산에서 발생하는 석탄분진에 포함된 성분 중 폐섬유화를 동반하는 진폐증과 폐암의 발생에 가장 직접적인 원인이 되는 물질은?( )","c":["베릴륨","석면","콜타르피치","결정형유리규산","라돈"],"a":4,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"ai","expl":"석탄분진 중 폐섬유화·진폐·폐암의 직접 원인물질은 결정형 유리규산(4번)이다. 표준지식으로 판단하며 정답이 맞다.","basis":"general"},{"id":384,"year":"2021","num":60,"q":"진폐소견은 소음영과 대음영 소견으로 나누어 기술한다. 이 중 대음영에 해당되는 것은? ( )","c":["음영의 넓이 합이 폐상부면적을 넘는 경우","밀도가 2/2 인 경우","불규칙모양인 r음영이 다수 관찰되는 경우","원형음영이 3mm 초과 10mm 이하인 경우","폐성심 등 합병증이 동반되는 경우"],"a":1,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"ai","expl":"진폐 대음영은 소음영이 뭉쳐 형성된 큰 음영으로, ILO 분류상 넓이 기준(음영 넓이 합이 폐상부 면적을 넘는 경우, 1번)에 해당한다. 밀도 2/2·r음영 다수·원형 3~10mm는 소음영, 폐성심은 합병증이므로 오답. 표준 분류로 판단.","basis":"general"},{"id":385,"year":"2021","num":61,"q":"진폐증의 병형이 제1형 이상인 경우로서 요양급여 지급대상 질병에 해당되는 것은? ( )","c":["천식","대동맥박리","간암에서 전이된 폐암","협심증","활동성 폐결핵"],"a":5,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"ai","expl":"진폐 병형 1형 이상에서 요양급여 대상 합병증으로 보기 중 활동성 폐결핵(5번)이 해당한다. 천식·대동맥박리·전이성 폐암·협심증은 진폐 합병증이 아니다. 진폐법 합병증 기준으로 판단.","basis":"general"},{"id":386,"year":"2021","num":62,"q":"실내공기오염이 건강에 미치는 영향으로 옳은 것은? ( )","c":["빌딩증후군은 사회심리적 스트레스와 무관하다.","라돈은 폐암의 원인이 된다.","미세먼지가 심한 날에는 실내환기를 절대 하지 않는 것이 다.","빌딩증후군으로 피부 및 점막 자극은 생기지 않는다.","두통, 피로, 흉부압박감은 실내공기오염과는 관계가 없는 특이 증상이다."],"a":2,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"ai","expl":"라돈은 폐암의 원인이 된다(2번)가 옳다. 빌딩증후군은 심리사회적 스트레스와 관련 있고 피부·점막 자극·두통·피로 등 비특이 증상을 유발하며, 미세먼지 심한 날도 적절한 환기는 필요하므로 나머지는 틀리다. 표준지식으로 판단.","basis":"general"},{"id":387,"year":"2021","num":63,"q":"실내공기질 개선대책으로 옳은 것은? ( )","c":["환기는 하루 4회 정도로 하되 환기시간은 최소 10분 이상 다.","부유미생물 증식을 막기 위해 실내 습도는 가급적 높게 유 한다.","새집에 들어가기 3일 전부터는 베이크아웃을 중단해야 한다","커튼, 카펫의 세탁은 가급적 삼간다.","겨울철 오래된 집에서 내부 벽에 결로가 발생하면 환기를 간다."],"a":4,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"ai","expl":"실내공기질 개선으로 커튼·카펫 세탁은 삼가는 것이 옳다(4번). 환기는 하루 여러 번 충분히 하고 습도는 낮게 유지, 베이크아웃은 입주 전 시행, 결로 시 환기해야 하므로 나머지는 틀리다. 표준지식으로 판단. (다만 커튼·카펫은 오히려 자주 세탁·관리하라는 견해도 있어 문항 표현에 주의)","basis":"general"},{"id":388,"year":"2021","num":64,"q":"7세 남아가 기운이 없고 창백하고 복통이 심하여 내원하였 환아는 성분 미상의 환약을 복용하였다고 한다. X선에서 장 (long bone)에 이상선이 나타났다. 이에 대한 설명으로 옳 것은? ( )","c":["인체 내에서 생물학적 기능이 어느 정도 있다.","어린이의 지능발달 등 건강영향을 유발할 수 있다.","노출경로는 주로 흡입과 섭취이며 대부분 적혈구 등에 부 되어 태반은 통과하지 않는다.","세포 내 –SH기와 결합하여 heme 합성 등 효소를 방해한다.","노령이나 뼈질환, 임신, 갑상선기능항진이 있는 경우 골중 이동성이 떨어져 실제 노출수준보다 혈중납 농도가 낮게 측 된다."],"a":2,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"ai","expl":"강의록(납): 성분미상 환약(한약재) 복용 후 창백·복통·장골 이상선(lead lines)은 소아 납중독이다. 납은 명확한 안전 역치 없이 어린이 지능발달 등 건강영향을 유발한다(②정답). ①납은 비필수 원소로 생물학적 기능 없음, ③납은 태반을 통과함, ④heme 합성효소를 '억제'(활성화 아님), ⑤임신·갑상선기능항진·골질환 등 뼈 turnover 증가시 골중 납이 재방출되어 혈중납이 오히려 오르므로 모두 오답.","basis":"lecture"},{"id":389,"year":"2021","num":65,"q":"납 노출에 의한 검사 소견으로 옳은 것은? ( )","c":["혈색소량과 망상적혈구가 1차적으로 증가한다.","검사상 δ-ALA 또는 ZPP(zinc protoporphyrin) 증가로 확 한다.","근위세뇨관 손상, 고요산혈증, 통풍 등이 발생할 가능성은 다.","성욕감퇴, 남성불임, 정자생성 등 생식기능 장애는 발생하 않는다.","만성 노출 확인 방법 중 가장 확실한 방법은 MRI 촬영이"],"a":2,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"ai","expl":"강의록(납 진단): 납은 heme 합성효소(ALAD·ferrochelatase)를 억제하여 δ-ALA(소변)·ZPP가 증가하므로 이로 확인한다(②정답). ①빈혈이며 혈색소·망상적혈구는 증가하지 않음, ③고요산혈증·통풍·근위세뇨관 손상은 '발생', ④생식기능 장애가 '발생', ⑤진단은 MRI가 아니라 BLL·ZPP이므로 오답.","basis":"lecture"},{"id":390,"year":"2021","num":66,"q":"수은에 대한 설명으로 옳은 것은? ( )","c":["수은중독으로 인한 신전근(폄근) 마비가 대표적이다.","금속수은은 섭취시 상당량이 흡수된다.","급성중독시 신장기능의 악영향이 우려되므로 착화치료를 시 도하지 않는다.","비중격 천공을 유발한다.","만성노출시 신경독성이 발생할 가능성이 있다."],"a":5,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"ai","expl":"강의록(수은): 원소·무기·유기 수은 모두 만성 노출시 신경독성(떨림·erethism 또는 중추신경 손상)이 발생할 수 있다(⑤정답). ①신전근 마비는 납, ②금속(원소)수은은 섭취시 소화기 흡수 ≈0%, ③급성 무기수은 중독에는 DMSA/DMPS 킬레이션 시행, ④비중격 천공은 6가 크롬의 특징이므로 오답.","basis":"lecture"},{"id":391,"year":"2021","num":67,"q":"카드뮴에 대한 설명으로 옳은 것은? ( )","c":["일본에서 해산물 섭취로 인한 심각한 중독사례가 발생했다.","노출 후 수시간만에 간으로 섭취되어 혈중 농도는 급감하며 신장에서 재흡수된다.","폐부종 및 호흡부전과 같은 호흡기 증상은 드물다.","세뇨관 손상으로 인한 소변 β2-microglobulin 증가는 말기에 흔하게 나타난다.","뼈에 대한 작용으로 골연화증, 골절을 유발하므로 착화치료 를 조기에 실시한다."],"a":1,"prof":"김양우","theme":"유해금속·가스","unc":1,"src":"ai","expl":"강의록상 이타이이타이병은 해산물이 아니라 오염된 쌀·논 관개수에 의한 것이므로 ①은 사실과 배치된다. 강의록(카드뮴 동태학)은 흡수 후 간→신장 분포(②의 취지)를 지지하고, β2-MG 단백뇨는 초기 소견(④의 '말기'는 틀림), 카드뮴은 킬레이션 비권장(⑤ 틀림)이다. 정답 ①은 강의록과 상충하나 나머지 보기도 부분적 결함이 있어 명확한 대체정답을 단정하기 어려움.","basis":"lecture"},{"id":392,"year":"2021","num":68,"q":"25년 동안 용접작업을 하던 50세 남자가 보행장애, 손발 떨 림, 행동 저하를 주소로 내원하였다. 신경학적 검사에서 가면 양 얼굴, 수지진전, 하지 감각이상, 행동 저하 등의 소견이 관 찰되었다. 이 환자의 진단을 위해 필요한 검사로 가장 옳은 것 은? ( )","c":["소변 비소 검사","소변 카드뮴 검사","흉부 CT검사","뇌 MRI T1 강조영상","신경인지검사"],"a":4,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"ai","expl":"강의록(망간): 용접공의 가면양얼굴·수지진전·보행장애는 망간 중독(Manganism)이며, 진단은 기저핵(담창구) 고신호를 보이는 뇌 MRI T1 강조영상이 핵심이다. 정답 ④.","basis":"lecture"},{"id":393,"year":"2021","num":69,"q":"30년간 도금업무를 한 근로자에서 발생가능한 건강장애로 맞는 것은? ( )","c":["퇴사시 흉부CT검사에서 정상이면 추적검사는 불필요하다.","코중격 천공은 흔하지 않다.","6가 크롬보다 3가 크롬이 독성이 더 강하다.","천식 유발 가능성이 있다.","이 중금속에 의한 피부 궤양은 둥근 모양이고 깊으며 압통이 심하다."],"a":4,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"ai","expl":"강의록(6가 크롬): 도금공은 6가 크롬 노출로 직업성 천식이 유발될 수 있다(④정답). ①폐암 위험이 있어 추적검사 필요, ②비중격 천공은 오히려 특징적, ③3가보다 6가 크롬이 독성이 강함, ⑤크롬 홀은 통증 없는(무통성) 깊은 궤양이므로 오답.","basis":"lecture"},{"id":394,"year":"2021","num":70,"q":"내분비계 장애물질의 특징으로 옳은 것은? ( )","c":["자연적인 호르몬과 같이 쉽게 분해되고 불안정하다.","환경에서는 지속적으로 잔류하지만 생체 내에서는 잔류기간 이 짧은 편이다.","생물체의 지방이나 조직에 축적되는 특성은 강한 수용성 때 문이다.","임신이나 수유과정에서 적절한 차단기능이 있어 자손에 전달 되는 양은 미미하다.","먹이사슬의 마지막 단계에 있는 동물에게 문제가 된다."],"a":5,"prof":"김환철","theme":"내분비장애물질","unc":0,"src":"ai","expl":"강의록(PAGE 21)에서 POPs는 먹이사슬 상위(최종) 단계 동물의 지방조직에 고농도로 축적되므로 5번이 옳다. 1번(쉽게 분해), 2번(생체 잔류기간 짧음), 3번(수용성 때문), 4번(자손 전달 미미)은 모두 강의록 서술과 반대다.","basis":"lecture"},{"id":395,"year":"2021","num":71,"q":"내분비계 장애물질의 작용기전에 해당되는 것은? ( )","c":["자연적인 호르몬을 모방하여 비슷한 세포반응을 유발한다.","자연적인 호르몬과 결합할 수용체를 봉쇄한다.","납은 성장호르몬, 갑상선호르몬의 정상적인 기능을 방해하 발육, 지능발달을 저해한다.","단백질 수용체와 결합하여 비정상적인 연쇄 세포반응을 촉 한다.","모두 해당"],"a":5,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"ai","expl":"표준지식: 내분비계 장애물질의 작용기전에는 호르몬 모방, 수용체 봉쇄, 비정상 연쇄반응 촉진, (납 등에 의한)호르몬 기능 방해가 모두 포함된다. 정답 ⑤ 모두 해당.","basis":"general"},{"id":396,"year":"2021","num":72,"q":"내분비장애물질과 인체영향과의 연결이 옳은 것은? ( )","c":["DDT-생리이상, 발달저하, 미숙아","프탈레이트 – 남성생식기 결함 증가, 신경발달장애","비스페놀-A(BPA) - 정자수 감소, 성조숙증","PCBs – 피부암, 갑상선 기능문제, 불임","모두 해당"],"a":5,"prof":"김환철","theme":"내분비장애물질","unc":0,"src":"ai","expl":"강의록상 DDT는 생리이상·발달저하(PAGE 15), 프탈레이트는 남성생식기 결함·신경발달장애(PAGE 18), BPA는 정자수 감소·성조숙증(PAGE 17), PCBs는 갑상선·생식기능 문제(PAGE 14, 26)와 연관되어 각 연결이 모두 성립하므로 '모두 해당'(5번)이 정답.","basis":"lecture"},{"id":397,"year":"2021","num":73,"q":"잔류성 유기오염물질에 대한 설명으로 옳은 것은? ( )","c":["전통적인 잔류성유기오염물질은 현재는 거의 존재하지 않 때문에 신종 물질에만 주의를 기울이면 된다.","잔류성과 축적성을 갖는 이유는 할로겐 원자가 전기음성도 높아 강한 결합력을 갖기 때문이다.","환경에만 잔류하기 때문에 상대적으로 먹거리나 생활환경 서는 안심할 수 있다.","기존 물질을 대신하는 대체 물질은 위해성 정보가 충분하 때문에 안심할 수 있다.","연령에 따라 축적되므로 영유아는 민감집단에서 제외된다."],"a":2,"prof":"김환철","theme":"내분비장애물질","unc":0,"src":"ai","expl":"강의록(PAGE 22)에서 POPs의 잔류·축적 이유는 염소·브롬 등 할로겐이 치환된 안정한 탄소-할로겐 결합 때문이라고 설명하므로 2번이 옳다. 나머지(전통 POPs 소멸, 환경에만 잔류, 대체물질 안심, 영유아 제외)는 모두 강의록과 배치된다.","basis":"lecture"},{"id":398,"year":"2021","num":74,"q":"유해가스는 용해도에 따라 상기도와 하기도 침범 특성이 르게 나타난다. 다음 중 주로 침범하는 부위가 다른 가스는 ( )","c":["암모니아","아황산가스","알데히드","이산화질소","불소"],"a":4,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"ai","expl":"강의록(자극성 가스 수용성 법칙): 암모니아·아황산가스·알데히드·불소는 고수용성으로 주로 상기도를 침범하나, 이산화질소(NO₂)는 저수용성으로 하기도·폐포에 침투해 지연성 폐수종을 일으킨다. 따라서 침범 부위가 다른 것은 ④ 이산화질소.","basis":"lecture"},{"id":399,"year":"2021","num":75,"q":"단순질식가스에 대한 설명으로 옳은 것은? ( )","c":["생리학적으로 불활성가스이기 때문에 농도가 높아도 산소 도를 떨어뜨리지 않는다.","공기보다 무거운 물질은 낮은 자세로 작업하는 경우 문제 된다.","중추신경계 저해는 잘 발생하지 않는다.","각 가스별로 특이소견이 관찰되므로 치료에 중요하게 활용 다.","임상적 반응은 기체농도, 신체활동, 개인의 건강상태와 관 성이 낮다."],"a":2,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"ai","expl":"강의록(단순 질식제): 공기보다 무거운 가스(예 CO₂)는 바닥에 고여 낮은 자세로 작업할 때 위험하다(②정답). ①고농도에서는 산소분압을 떨어뜨려 저산소증 유발, ③저산소로 중추신경 저해 발생, ④단순 질식제는 특이소견이 없고, ⑤임상반응은 기체농도·신체활동·건강상태와 관련이 크므로 오답.","basis":"lecture"},{"id":400,"year":"2021","num":76,"q":"오존에 대한 설명 중 맞는 것은? ( )","c":["결막, 코 및 상기도 점막에서 주로 흡수되어 자극증상을 일 으킨다.","대기오염을 유발시킬 뿐 직업적 폭로는 발생하지 않는다.","폐부종을 유발할 가능성은 상대적으로 낮다.","용혈 및 황달을 유발할 수 있다.","발생원으로는 아크용접, 복사기 오작동 등이다."],"a":5,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"ai","expl":"오존은 산화력이 강해 상기도보다 폐 깊이 침투해 폐부종을 유발할 수 있으며, 아크용접·복사기 오작동 등에서 직업적으로 발생(5번). 나머지 보기는 오존 특성과 배치. 강의록 직접 근거 부족으로 표준지식 적용.","basis":"general"},{"id":401,"year":"2021","num":77,"q":"여름철 새벽 캠핑장 텐트 안에서 2명의 남성이 쓰러진 채로 발견되었다. 발견 당시 텐트 안에는 고기를 구워 먹은 숯불 흔 적이 남아 있었다. 이와 관련된 설명으로 옳은 것은? ( )","c":["야외이므로 가스 중독사고와는 무관할 것이다.","치료를 위해 Amyl Nitrate 흡입이 필요하다.","노출 후 지연된 무관심, 지남력상실, 기억상실 등이 발생할 수 있고 대부분 회복된다.","의식을 잃기 전에 운동마비는 없이 지각마비가 발생했을 것 이다.","진단을 위해 유용한 혈액검사는 없다."],"a":3,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"ai","expl":"강의록(CO): 숯불 연소로 인한 CO 중독으로, 급성 회복 후 2~40일 잠복기를 거쳐 지연성 신경학적 후유증(무관심·지남력상실·기억상실)이 발생하며 상당수는 부분 회복한다(③정답). ①야외 텐트 내 숯불로도 CO 중독 발생, ②Amyl nitrate는 시안 치료제, ④CO는 지각·운동마비 패턴이 아님, ⑤COHb 측정이 유용하므로 오답.","basis":"lecture"},{"id":402,"year":"2021","num":78,"q":"피혁공장 정화조를 청소하던 근로자가 의식을 잃고 쓰러졌다. 이에 대한 설명으로 옳은 것은? ( )","c":["당시 아무런 경고증상이 없었을 것이다.","이 가스는 cytochrome oxidase의 작용을 호흡중추에서 강력 히 억제하는 특성이 있다.","저농도 노출로는 점막자극증상만 있고 폐수종 등은 유발하지 않는다.","고압산소가 가장 효과적인 치료방법이다.","노출확인에 필요한 생물학적 노출지표가 특별히 없다."],"a":2,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"ai","expl":"강의록(황화수소): 피혁공장 정화조는 H₂S 노출 현장으로, H₂S는 시토크롬 c 산화효소(cytochrome oxidase)를 차단해 세포 질식을 일으킨다(②정답). ①고농도에서 후각 마비로 경고 없이 쓰러짐, ③저농도에서도 점막자극·폐수종 유발, ④치료의 핵심은 산소·아질산나트륨(고압산소는 보조), ⑤노출지표가 있으므로 오답.","basis":"lecture"},{"id":403,"year":"2021","num":79,"q":"인천항에서 수입 과일이 담긴 컨테이너를 훈증 소독하던 근 로자가 양하지 감각, 근력 저하를 주소로 내원하였다. 이 환자 의 이러한 증상과 관련 있는 노출물질로 가능성이 가장 높은 물질은? ( )","c":["메틸브로마이드","이황화탄소","벤젠","비소","아플라톡신"],"a":1,"prof":"김양우","theme":"유기용제","unc":0,"src":"ai","expl":"강의록(메틸브로마이드 훈증제 섹션): 수입 과일 컨테이너 훈증 소독제 메틸브로마이드는 중추/말초신경 독성으로 양하지 감각·근력저하를 유발한다. 이황화탄소·벤젠·비소는 훈증 소독 작업력과 직접 연결되지 않음.","basis":"lecture"},{"id":404,"year":"2021","num":80,"q":"발암기전 중 설명으로 옳은 것은? ( )","c":["촉진단계는 친전자성 발암물질 노출로 시작되며 DNA의 돌연 변이 발생과 관련있다.","개시단계에서는 비가역적, 누적효과를 보이는 문턱 용량이 존재한다.","개시단계는 용량-반응 관계에 있어 역치 모델을 따르지 않는 다.","염증매개체는 암 개시자로 작용한다.","증식단계에서는 종양 크기가 커지고 추가적인 돌연변이가 발 생하며, 주변 조직으로의 전이가 일어날 수 있다."],"a":3,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"ai","expl":"강의록(발암기전·용량반응): 개시단계는 소량에서도 확률적으로 암을 유발하는 역치 없는(no-threshold) 모델을 따른다(정답 3). 함정: 친전자성·DNA 돌연변이는 개시단계, 문턱용량은 촉진단계, 염증매개체는 촉진자, 전이는 진행(progression)단계 특성이라 나머지는 오답.","basis":"lecture"},{"id":405,"year":"2021","num":81,"q":"직업성암의 특징으로 옳은 것은? ( )","c":["비직업성암과 구별되는 영상의학적 특성이 발암물질별로 다.","발암성 물질의 작용부위와 무관한 부위에 발생한다.","처음 노출시점부터 암발생까지 필요한 기간은 고형암이 조 기계암보다 더 길다.","대부분 비직업성암에 비해 고령인 군에서 호발한다.","대체로 일반인구집단에 비해 직업성암의 발생률과 사망률 낮다."],"a":3,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"ai","expl":"직업성 암은 처음 노출부터 발암까지 필요한 잠복기가 고형암이 조혈계암(혈액암)보다 더 길다(정답 3). 오답: 영상학적 특이 소견은 없고, 발암물질 작용부위에 발생하며, 대체로 비직업성보다 젊은 연령에서 호발, 발생·사망률은 일반인보다 높다.","basis":"general"},{"id":406,"year":"2021","num":82,"q":"국제암연구소(IARC) 발암물질 분류에서 활용되는 근거 중 당되지 않는 것은?( )","c":["실험동물에서의 발암성","사람에서의 발암성","기전과 관련된 자료","물질 자체가 객관적으로 갖고 있는 해로운 성질인 유해 (Hazard)","인종별 암발생에 대한 취약성"],"a":5,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"ai","expl":"강의록(유해성 평가): IARC 발암성 분류는 사람 발암성·실험동물 발암성·기전 자료에 근거한다. 인종별 취약성은 분류 근거가 아니다(정답 5). 참고로 IARC 분류는 유해(hazard) 자체를 평가하며 4번은 IARC 관점상 근거로 인정되므로 정답은 5번 유지.","basis":"lecture"},{"id":407,"year":"2021","num":83,"q":"직업성암 예방을 위한 대책으로 옳은 것은? ( )","c":["고위험 작업자에게 암 발생 취약 유전자검사는 암 예방에 요한 역할을 한다.","발암성이 확실히 확인되지 않는 물질의 경우 우선 사용할 있다.","직업성암 조기발견을 위한 건강관리수첩제도는 전직자나 직자에게는 적용되지 않는 한계가 있다.","발암성물질 사용을 최소화하는 것이 중요하다.","가족 중 암 환자가 있는 근로자는 채용시 배제하는 것이 칙이다."],"a":4,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"ai","expl":"직업성 암 예방은 발암물질 사용 최소화(대치·제거)가 핵심이다(정답 4). 강의록의 직업병 예방대책(대치 우선) 원리와 일치. 유전자검사·채용배제는 차별이며 강의록상 고용차별 금지 원칙에 위배.","basis":"lecture"},{"id":408,"year":"2021","num":84,"q":"국제암연구소(IARC) 발암물질 분류에서 “인체에 발암 가능 이 높은 물질”은 다음 중 어느 것인가? ( )","c":["Group1","Group2A","Group2B","Group3","Group4"],"a":2,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"ai","expl":"IARC 분류에서 '인체 발암 가능성이 높은(발암 추정, probably carcinogenic)' 물질은 Group 2A이다(정답 2). Group 1은 확실, 2B는 발암 가능성 있음.","basis":"general"},{"id":409,"year":"2021","num":85,"q":"국제암연구소(IARC) 발암물질 분류에서 암 유발 부위가 다 한 가지 물질은 어느 것인가? ( )","c":["니켈화합물","트리클로로에틸렌","결정형유리규산","디젤엔진배출물","철과 강철 주조"],"a":2,"prof":"김환철","theme":"직업성암·발암물질","unc":1,"src":"ai_uncertain","expl":"니켈·결정형유리규산·디젤엔진배출물·철과강철주조는 모두 폐암과 관련되나, 트리클로로에틸렌(TCE)은 신장암(및 비호지킨림프종)을 유발해 부위가 다르다(정답 2). 강의록 명시 근거는 없어 불확실.","basis":"general"},{"id":410,"year":"2021","num":86,"q":"유기용제에 대한 설명으로 옳은 것은? ( )","c":["유기용제의 효능은 그 물질의 수용성에 의해 결정된다.","피부를 통한 흡수는 지용성만 관련 있다.","유기용제 흡수에 관여하는 인자로 작업 행태가 포함된다.","유기용제는 가장 흔한 흡수경로는 피부이다.","유기용제의 흡수량은 휴식시나 격한 업무시 감소한다."],"a":3,"prof":"김양우","theme":"유기용제","unc":0,"src":"ai","expl":"유기용제 흡수에 관여하는 인자로 작업 행태(작업 강도·호흡량)가 포함된다(보기3 정답). 강의록에 격한 업무 시 흡입량 증가가 시사됨. 유기용제 효능은 지용성이 결정(수용성 아님), 피부흡수는 지용성이 주로 관여, 주 흡수경로는 호흡기이므로 나머지는 오답.","basis":"lecture"},{"id":411,"year":"2021","num":87,"q":"다음 중 유기용제와 그 특이적인 독성이 바르게 연결된 것 은? ( )","c":["메탄올 – 감각신경성 난청과 같은 청각 장애","이황화탄소 – 독성간염, 스티븐슨존슨 증후군","노말헥산 – 독성뇌병증과 같은 중추신경 장애","2-브로모프로판 – 삼차신경병증","톨루엔 – 심실세동 같은 부정맥"],"a":5,"prof":"김양우","theme":"유기용제","unc":0,"src":"ai","expl":"톨루엔은 심근을 카테콜아민에 민감하게 해 심실세동 등 부정맥을 일으킨다(강의록 흡입제 sudden sniffing death 기전)—보기5가 옳은 연결. 메탄올-청각(오답,시신경), 이황화탄소-간염/SJS(오답), 노말헥산-중추신경(부분적, 주로 말초신경), 2-브로모프로판-생식독성(삼차신경병증 아님)은 잘못된 연결.","basis":"lecture"},{"id":412,"year":"2021","num":88,"q":"유기용제의 생물학적 모니터링에 대한 설명으로 옳은 것은? ( )","c":["환경측정이 더 정확하지만 검증용으로 생물학적 모니터링을 함께 한다.","피부 흡수가 큰 물질인 경우 더욱 더 필요하다.","흡수된 유기용제의 반감기에 크게 좌우되지 않는 장점이 있 다.","주로 혈액 중 대사산물이 유용하게 활용된다.","대사산물의 채취시간에 크게 좌우되지 않는다."],"a":2,"prof":"김양우","theme":"방사선·대기오염","unc":0,"src":"ai","expl":"생물학적 모니터링은 피부흡수가 큰 물질에서 환경(공기) 측정이 놓치는 경피 흡수분까지 반영하므로 더욱 필요함(2번). 소변 대사산물이 주로 쓰이고 반감기·채취시간에 좌우되므로 다른 보기는 오답. 강의록 직접 근거 부족으로 표준지식 적용.","basis":"general"},{"id":413,"year":"2021","num":89,"q":"유기용제로 인한 피부질환에 대한 설명으로 옳은 것은? ( )","c":["가장 흔한 타입은 알레르기성접촉피부염이다.","알레르기성접촉피부염은 동일 노출 작업이더라도 감작된 소 수 근로자에게서만 발생한다.","광과민증은 유기용제 노출로 인해 발생가능성이 거의 없다.","자극성접촉피부염 진단을 위해 첩포검사가 유용하다.","유기용제로 인한 피부염 예방을 위해 작업 후 유기용제로 잘 씻는다."],"a":2,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"ai","expl":"알레르기성 접촉피부염은 감작(sensitization)된 소수 근로자에게서만 발생한다(정답 2). 강의록의 감작 개념과 일치. 오답: 유기용제는 자극성 접촉피부염이 가장 흔하고, 첩포검사는 알레르기성 진단용이며, 유기용제로 씻는 것은 금기.","basis":"lecture"},{"id":414,"year":"2021","num":90,"q":"노트북 액정 프레임 생산업체에서 일하던 27세 여성 근로자 가 하체 힘이 빠지는 증상으로 내원하였다. 이에 대한 설명으 로 옳은 것은? ( )","c":["요중 대사산물 검사로 마뇨산 검사가 유용하다.","신경독성은 단발성, 편측성, 중심성에서 원위부위로 진행하는 특성이 있다.","감각신경과 운동신경의 손상이 관찰된다.","신경섬유 조직검사상 축삭이나 수초 모두 정상소견을 보이는 특징이 있다.","노출중단 후 증상은 호전되고 장애가 남는 경우는 거의 없 다."],"a":3,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"ai","expl":"노트북 액정 프레임 생산 노출로 인한 하지 위약은 n-헥산(핵산) 등에 의한 말초신경병증이 대표적이며 감각·운동신경 모두 손상된다(③정답). 강의록은 n-헥산을 지용성 신경독 물질로 언급. ①마뇨산은 톨루엔 대사산물, ②원위부·대칭성 진행이 특징(단발·편측 아님), ④축삭변성 등 병리 소견이 관찰됨, ⑤노출중단 후에도 장애가 남을 수 있어 오답. 강의록 근거는 부분적이라 basis general.","basis":"general"},{"id":415,"year":"2021","num":91,"q":"다음 중 말초혈액 검사가 건강장애 진단에 도움이 되는 것 은? ( )","c":["벤젠","사염화탄소","포름알데히드","유리섬유","석면"],"a":1,"prof":"김양우","theme":"유기용제","unc":0,"src":"ai","expl":"말초혈액검사(범혈구감소·재생불량성 빈혈)로 건강장애 진단에 도움이 되는 것은 골수독성 물질 벤젠이다. 사염화탄소(간·신장)·포름알데히드(비강·호흡기)·유리섬유·석면(폐)은 말초혈액검사와 무관.","basis":"general"},{"id":416,"year":"2021","num":92,"q":"금속부품을 유기용제로 세척하는 작업을 하던 48세 남자가 피부에 다양한 모양의 홍반이 생기고 피부색이 노랗다는 증상 을 호소하였다. 이에 대한 설명으로 옳은 것은? ( )","c":["일정기간 노출 회피하면 회복되므로 병가 후 천천히 복귀시 킨다.","유기용제로 인한 접촉성피부염이 의심되므로 이에 준해 치료 한다.","간기능검사가 필요하며 독성간염까지 진행될 수 있음을 염두 에 두어야 한다.","동일 환경 작업자 대부분 비슷한 증상을 나타낼 것이므로 즉 시 작업중단을 시킨다.","특징적으로 안면부위 신경에 영향을 미칠 수 있다. ---------------------------------------------- *"],"a":3,"prof":"김양우","theme":"유기용제","unc":0,"src":"ai","expl":"유기용제 세척 작업자의 다형홍반+황달은 독성간염을 시사하며, 특히 DMF·트리클로로에틸렌 등에서 약물반응양(DRESS/SJS 유사) 간손상으로 진행할 수 있다. 따라서 간기능검사가 필요하고 독성간염 진행 가능성을 염두에 두어야 한다(보기3 정답). 단순 접촉성피부염(보기2)으로 국한하면 안 됨.","basis":"general"},{"id":417,"year":"2022","num":1,"q":"20년 동안 유리공장에서 일한 60세 남성, 흉부전산화단층촬영영상에서 양측 폐문의 확장과 1mm 미만의 다발성 결절이 관찰되었다. 가장 적절한 진단은?","c":["규폐증","석면폐증","좁쌀결핵","철폐증","용접공폐증"],"a":1,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"20년 유리공장 근무자에서 양측 폐문 확장(계란껍질 석회화)과 1mm 미만 다발성 소결절은 규폐증(1번)의 전형적 소견이다. 유리 제조는 규산 노출 작업. 표준지식으로 판단.","basis":"general"},{"id":418,"year":"2022","num":2,"q":"진폐증 진단에 가장 중요한 것은?","c":["가족력","흉부 방사선 촬영","유기용제 노출 과거력","조직검사","혈액검사"],"a":2,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"진폐 진단에 가장 중요한 것은 흉부 방사선 촬영(2번)으로 병형을 판정한다. 조직검사는 표준이 아니다. 표준지식으로 판단.","basis":"general"},{"id":419,"year":"2022","num":3,"q":"광산에서 발생하는 석탄분진에 포함된 성분 중 폐섬유화를 동반하는 진폐증과 폐암의 발생에 가장 직접적인 원인이 되는 물질은?","c":["베릴륨","석면","콜타르피치","결정형유리규산","라돈"],"a":4,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"석탄분진 중 폐섬유화·진폐·폐암의 직접 원인물질은 결정형 유리규산(4번)이다. 표준지식으로 판단하며 정답이 맞다.","basis":"general"},{"id":420,"year":"2022","num":4,"q":"실내공기오염이 건강에 미치는 영향으로 옳은 것은?","c":["빌딩 증후군은 사회심리적 스트레스와 무관하다.","실외보다 실내가 오염물질이 폐에 전달될 위험성이 높다.","미세먼지가 심한 날에는 실내 환기를 절대 하지 않는 것이 좋다.","빌딩증후군으로 피부 및 점막 자극은 생기지 않는다."],"a":2,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"ai","expl":"실내는 재실 시간이 길어 실외보다 오염물질이 폐에 전달될 위험이 높다(2번)가 옳다. 빌딩증후군은 심리사회적 스트레스와 관련 있고 피부·점막 자극을 일으키며, 미세먼지 심한 날도 환기가 필요하므로 나머지는 틀리다. 표준지식으로 판단.","basis":"general"},{"id":422,"year":"2022","num":7,"q":"금속광산에서 채석공으로 15년째 일하는 40세 남성이 흉통과 호흡곤란을 호소했다. 카드뮴 중독으로 의심되고 가장 먼저 나타나는 증상은?","c":["요중 당 수치 증가","요중 아미노산 수치 증가","요중 알부민 수치 증가","요중 B2-microglobulin 수치 증가","요중 칼슘 수치 증가"],"a":4,"prof":"김환철","theme":"분진·진폐·실내공기","unc":0,"src":"pdf","expl":"강의록 카드뮴 슬라이드: 만성 카드뮴 노출은 근위세뇨관을 먼저 손상시켜 저분자량 단백뇨인 요중 β2-microglobulin 증가(4번)가 가장 먼저 나타난다(알부민뇨는 늦게 출현). 정답이 맞다.","basis":"lecture"},{"id":423,"year":"2022","num":11,"q":"유해가스의 자극 부위는 용해도에 따라 달라진다. 다음 중 하기도에 영향을 미치는 유해가스는?","c":["암모니아","아황산가스","염소","오존","불소"],"a":4,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록(자극성 가스 수용성): 암모니아·아황산가스·염소·불소는 고수용성으로 상기도를 자극하나, 오존(O₃)은 저수용성으로 하기도·폐포까지 침투한다. 정답 ④ 오존.","basis":"lecture"},{"id":424,"year":"2022","num":13,"q":"인천항에서 수입 과일이 담긴 컨테이너를 훈증 소독하던 근로자가 양하지 감각, 근력 저하를 주소로 내원하였다. 이 환자의 이러한 증상과 관련 있는 노출물질로 가능성이 가장 높은 물질은?","c":["메틸브로마이드","이황화탄소","벤젠","비소","아플라톡신"],"a":1,"prof":"김양우","theme":"유기용제","unc":0,"src":"pdf","expl":"강의록(메틸브로마이드 훈증제 섹션): 수입 과일 컨테이너 훈증 소독제 메틸브로마이드는 중추/말초신경 독성으로 양하지 감각·근력저하를 유발한다. 이황화탄소·벤젠·비소·아플라톡신은 훈증 작업력과 부합하지 않음.","basis":"lecture"},{"id":425,"year":"2022","num":14,"q":"썩은 계란 냄새가난나는 맨홀 뚜껑에서 작업하던 인부 2명이 의식을 소실했다. 다음 중 해야할 처치로 올바른 것은?","c":["즉시 MRI 촬영을 통해 손상부위 파악","amyl nitrate 흡입","신속한 구조를 위해 보호장비 없이 구조한다","정유공장, 고무공장, 정화조에서 나오는 가스와는 다르다","저농도로는 점막 자극 증상이 없고 폐수종을 유발하지 않는다."],"a":2,"prof":"김양우","theme":"유해금속·가스","unc":0,"src":"pdf","expl":"강의록(황화수소): 썩은 계란 냄새·맨홀 작업 중 집단 의식소실은 H₂S 중독으로, 치료는 산소와 함께 아질산나트륨/아질산아밀(amyl nitrate)로 MetHb를 유도하는 것이다(②정답). ①MRI는 부적절, ③보호장비 없는 구조는 2차 사망 위험으로 금기, ④정유·고무·정화조 가스와 동일 계열, ⑤저농도에서도 점막자극·폐수종 유발 가능하므로 오답.","basis":"lecture"},{"id":426,"year":"2022","num":15,"q":"직접적으로 DNA 손상을 주지 않고 비유전적 손상, 가역적 기전에 의하여 영향을 미치며, 일정 용량 이하에서는 암 발생에 영향을 주지 않는 것은 무엇인가?","c":["개시자 (initiator)","촉진자 (promotor)","억제자","돌연변이 유발자","증식 촉진자"],"a":2,"prof":"김환철","theme":"직업성암·발암물질","unc":0,"src":"pdf","expl":"강의록(발암기전): DNA에 직접 손상을 주지 않고 비유전적·가역적 기전으로 작용하며 역치(문턱용량) 이하에서는 암 발생에 영향을 주지 않는 것은 촉진자(promoter)이다(정답 2). 개시자는 DNA 직접 손상·비가역·무역치.","basis":"lecture"},{"id":427,"year":"2022","num":19,"q":"황달기, 피부에 수포성 반점이 점점 심해짐. 이에 대한 설명으로 옳은 것은?","c":["접촉성피부염일 가능성이 높아 습진에 준해 치료한다","심부정맥을 일으킬 가능성이 없다","스티븐존슨 증후군이 의심된다","예후가 좋다","직업환경의학과 의뢰는 불필요하다"],"a":3,"prof":"김양우","theme":"유기용제","unc":0,"src":"ai","expl":"황달+진행성 수포성 피부병변은 유기용제(예: 트리클로로에틸렌·DMF)에 의한 약물반응양 중증 피부반응으로, 스티븐-존슨 증후
